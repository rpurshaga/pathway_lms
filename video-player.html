<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<title>Pathway Media Player</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --pw-bg:#f0f2f5;
    --pw-well:#f4f2ef;
    --pw-track:#f4f2ef;
    --pw-text:#333;
    --pw-teal:#2a9d8f;
    --pw-teal-2:#38c4ba;
    --pw-yellow:#8a7a20;
  }
  /* ── BGMC brand theme ── */
  [data-theme="bgmc"]{
    --pw-bg:#1e1e1e;
    --pw-well:#2b2b2b;
    --pw-track:#2b2b2b;
    --pw-text:#f0f0f0;
    --pw-teal:#F5A800;
    --pw-teal-2:#E09900;
    --pw-yellow:#F5A800;
  }
  [data-theme="bgmc"] html,[data-theme="bgmc"] body,html[data-theme="bgmc"],html[data-theme="bgmc"] body{background:#1e1e1e;color:#f0f0f0;}
  [data-theme="bgmc"] .pw-copy-btn,[data-theme="bgmc"] .pw-my-notes-btn{
    background:linear-gradient(180deg,#333,#252525);
    color:#F5A800;
    border-color:rgba(245,168,0,.2);
    box-shadow:2px 2px 5px rgba(0,0,0,.4),-2px -2px 5px rgba(255,255,255,.04);
  }
  [data-theme="bgmc"] .pw-notes-card,[data-theme="bgmc"] .pw-notes-well textarea{
    background:#252525; color:#f0f0f0; border-color:rgba(245,168,0,.15);
  }
  [data-theme="bgmc"] .pw-notes-well textarea::placeholder{color:#666;}
  [data-theme="bgmc"] .pw-watermark{color:rgba(245,168,0,.35);}
  [data-theme="bgmc"] .pw-controls-card{background:#1e1e1e;}
  [data-theme="bgmc"] .pw-key{
    background:linear-gradient(180deg,#333,#252525);
    border-color:rgba(245,168,0,.15);
    box-shadow:3px 3px 7px rgba(0,0,0,.5),-3px -3px 7px rgba(255,255,255,.04),inset 0 1px 0 rgba(255,255,255,.06);
  }
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  html, body {
    background: transparent;
    font-family: 'IBM Plex Sans', sans-serif;
    color: var(--pw-text);
    -webkit-font-smoothing: antialiased;
  }
  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 30px 80px;
    overflow: invisible;
  }
  .pw-player-wrap{
    width:98%;
    max-width:1100px;
    overflow:visible;
  }

  /* ══ PROFESSOR NOTE CARD ══ */
  .pw-coach-card{
    width:94%;
    max-width:1020px;
    margin-left:auto; margin-right:auto;
    /* Slightly darker than the controls card */
    background:#e6e8ec;
    border-radius:18px;
    padding:14px 16px;
    margin-top:10px;
    box-shadow:
      0 8px 20px rgba(0,0,0,0.10),
      0 2px 6px rgba(0,0,0,0.06),
      inset 1px 1px 2px rgba(255,255,255,.4),
      inset -1px -1px 2px rgba(0,0,0,.05);
    /* Two-column: text left, buttons right */
    display:grid;
    grid-template-columns:1fr auto;
    grid-template-rows:auto auto;
    column-gap:16px;
    row-gap:6px;
    align-items:start;
    position:relative;
  }
  .pw-coach-card.minimized .pw-coach-body{ display:none !important; }

  /* Label row spans full width */
  .pw-coach-label-row{
    grid-column:1 / -1;
    display:flex; align-items:center; gap:6px;
    margin-bottom:2px;
  }
  .pw-coach-name{
    font-size:11px; font-weight:700;
    color:#555; letter-spacing:.05em; text-transform:uppercase;
    display:flex; align-items:center; gap:5px;
  }
  .pw-coach-name::before{ content:"📖"; font-size:12px; }

  /* Left: portrait + bubble */
  .pw-coach-left{
    display:flex; gap:12px; align-items:flex-start;
    min-width:0;
  }

  /* Right: action buttons stacked */
  .pw-coach-right{
    display:flex; flex-direction:column;
    gap:6px; align-items:flex-end;
    flex-shrink:0;
  }
  .pw-coach-action{
    height:28px; padding:0 12px;
    background:linear-gradient(180deg,#f4f2ef,#eae8e4);
    border:0.5px solid rgba(0,0,0,.08);
    border-radius:8px; cursor:pointer;
    font-size:11px; font-weight:600; color:#555;
    font-family:'IBM Plex Sans',sans-serif;
    box-shadow:2px 2px 5px rgba(0,0,0,.09),-2px -2px 5px rgba(255,255,255,.65);
    display:flex; align-items:center; gap:5px;
    transition:transform 80ms, box-shadow 80ms;
    white-space:nowrap;
    -webkit-tap-highlight-color:transparent;
  }
  .pw-coach-action:active{ transform:scale(.97); box-shadow:inset 2px 2px 4px rgba(0,0,0,.1),inset -2px -2px 4px rgba(255,255,255,.4); }
  .pw-coach-action svg{ width:11px; height:11px; fill:currentColor; }

  .pw-coach-replay{
    font-size:9px; color:var(--pw-teal); opacity:0;
    cursor:pointer; transition:opacity .2s;
    font-weight:600; letter-spacing:.04em;
    text-align:right;
  }
  .pw-coach-replay.visible{ opacity:1; }

  /* Portrait */
  .pw-portrait{
    flex:0 0 auto;
    width:72px; height:72px;
    border-radius:12px;
    overflow:hidden;
    background:linear-gradient(160deg,#3a4a66,#222);
    box-shadow:
      3px 3px 8px rgba(0,0,0,.14),
      -2px -2px 6px rgba(255,255,255,.55),
      inset 0 1px 0 rgba(255,255,255,.1);
    position:relative;
    image-rendering:pixelated;
    flex-shrink:0;
  }
  .pw-portrait img{
    width:100%; height:100%;
    object-fit:cover;
    object-position:center 18%;
    image-rendering:pixelated;
    display:block;
  }
  .pw-portrait.is-talking img{
    animation:pw-bob .32s steps(2) infinite;
  }
  @keyframes pw-bob{
    0%   { transform:translateY(0); }
    100% { transform:translateY(-2px); }
  }
  /* Silhouette placeholder */
  .pw-portrait[data-empty="1"]::after{
    content:"";
    position:absolute;
    inset:22% 30% 10% 30%;
    background:rgba(255,255,255,.18);
    clip-path:polygon(30% 0,70% 0,78% 28%,85% 65%,70% 100%,30% 100%,15% 65%,22% 28%);
  }

  /* Speech bubble */
  .pw-coach-speech{
    flex:1 1 auto; min-width:0;
    display:flex; flex-direction:column;
  }
  .pw-coach-bubble{
    flex:1;
    background:#dfe1e6;
    border-radius:12px;
    padding:10px 12px;
    font-size:13px; line-height:1.55;
    color:#3a3a3a;
    box-shadow:
      inset 2px 2px 5px rgba(0,0,0,.09),
      inset -2px -2px 5px rgba(255,255,255,.45);
    min-height:48px;
    cursor:pointer;
    white-space:pre-wrap;
    word-wrap:break-word;
  }
  /* Blinking cursor */
  .pw-cursor{
    display:inline-block;
    width:2px; height:14px;
    background:var(--pw-teal);
    vertical-align:text-bottom;
    margin-left:1px;
    animation:pw-blink .9s step-end infinite;
  }
  @keyframes pw-blink{ 50%{ opacity:0; } }

  /* ══ VIDEO CARD ══ */
  .pw-video-card{
    width:100%;
    background:#000;
    border-radius:22px;
    overflow:hidden;
    position:relative;
    z-index:2;
    box-shadow:
      0 30px 60px rgba(0,0,0,0.3),
      0 14px 28px rgba(0,0,0,0.18),
      0 50px 80px -10px rgba(0,0,0,0.2),
      6px 4px 18px rgba(0,0,0,0.06),
      -6px 4px 18px rgba(0,0,0,0.06);
    margin-bottom:-14px;
    margin-left:auto;
    margin-right:auto;
  }
  .pw-video{
    display:block;
    width:100%;
    height:auto;
    background:#000;
    border-radius:22px;
    margin:-1px 0;
  }
  .pw-video::-webkit-media-controls { display:none !important; }
  .pw-overlay{
    position:absolute; inset:0; z-index:2; cursor:pointer;
  }
  .pw-big-play{
    position:absolute; top:50%; left:50%;
    transform:translate(-50%, -50%);
    width:68px; height:68px; border:none; border-radius:50%;
    background:rgba(42,157,143,.9);
    box-shadow: 0 8px 24px rgba(42,157,143,.35), inset 1px 1px 2px rgba(255,255,255,.2);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; z-index:3;
    transition:transform .15s ease, opacity .2s ease;
  }
  .pw-big-play:hover{ transform:translate(-50%, -50%) scale(1.05); }
  .pw-big-play.hidden{ opacity:0; pointer-events:none; }
  .pw-big-play svg{ width:26px; height:26px; fill:#fff; margin-left:2px; }
  /* Fullscreen button */
  .pw-fs-btn{
    position:absolute; bottom:10px; right:10px; z-index:3;
    width:32px; height:32px; border-radius:8px;
    background:rgba(0,0,0,0.45); border:none; cursor:pointer;
    display:none; align-items:center; justify-content:center;
    transition:opacity .2s ease;
  }
  .pw-video-card:hover .pw-fs-btn.visible{ display:flex; }
  .pw-fs-btn svg{ width:14px; height:14px; fill:#fff; }

  /* ══ CONTROLS CARD ══ */
  .pw-controls-card{
    width:94%;
    max-width:1020px;
    margin-left:auto;
    margin-right:auto;
    background:var(--pw-bg);
    padding:50px 16px 10px;
    border-radius:0 0 20px 20px;
    position:relative;
    z-index:1;
    box-shadow:
      0 8px 20px rgba(0,0,0,0.08),
      0 2px 6px rgba(0,0,0,0.05),
      4px 0 12px rgba(0,0,0,0.03),
      -4px 0 12px rgba(0,0,0,0.03),
      inset 1px 1px 2px rgba(255,255,255,.45),
      inset -1px -1px 2px rgba(0,0,0,.04);
  }
  /* Buttons + volume row */
  .pw-btn-row{
    display:flex;
    align-items:center;
    justify-content:center;
    padding:0 10px;
    gap:12px;
  }
  .pw-btn-group{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:12px;
  }
  /* Volume overlay on video */
  .pw-vol-overlay{
    position:absolute;
    bottom:10px; left:10px;
    z-index:3;
    display:flex; align-items:center; gap:6px;
    opacity:0; transition:opacity 0.2s ease;
  }
  .pw-video-card:hover .pw-vol-overlay{ opacity:1; }
  .pw-vol-btn{
    width:30px; height:30px; border-radius:8px;
    background:rgba(0,0,0,0.45); border:none; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
  }
  .pw-vol-btn svg{ width:14px; height:14px; fill:#fff; }
  .pw-vol-slider{
    width:0; overflow:hidden;
    transition:width 0.2s ease;
    height:30px; border-radius:8px;
    background:rgba(0,0,0,0.45);
    display:flex; align-items:center; padding:0;
  }
  .pw-vol-overlay.expanded .pw-vol-slider{
    width:90px; padding:0 10px;
  }
  .pw-vol-track{
    width:100%; height:4px; border-radius:2px;
    background:rgba(255,255,255,0.3);
    position:relative; cursor:pointer; touch-action:none;
  }
  .pw-vol-fill{
    position:absolute; top:0; left:0; bottom:0;
    width:70%; border-radius:2px; background:#fff;
  }
  .pw-key{
    flex:0 0 62px; width:62px; height:62px;
    border:0.5px solid rgba(0,0,0,0.06); outline:none;
    border-radius:14px; cursor:pointer;
    background:linear-gradient(180deg, #f4f2ef, #eae8e4);
    box-shadow:
      3px 3px 7px rgba(0,0,0,.11),
      -3px -3px 7px rgba(255,255,255,.7),
      inset 0 1px 0 rgba(255,255,255,.45),
      inset 0 -1px 0 rgba(0,0,0,.04);
    display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:3px;
    transition:transform 80ms ease-out, box-shadow 80ms ease-out;
    -webkit-tap-highlight-color:transparent;
    user-select:none;
  }
  .pw-key:active, .pw-key.pressed{
    transform:scale(.97);
    box-shadow:
      inset 4px 4px 8px rgba(0,0,0,.12),
      inset -4px -4px 8px rgba(255,255,255,.45);
  }
  .pw-key svg{ width:20px; height:20px; flex-shrink:0; }
  .pw-leg{
    font-size:8px; font-weight:700;
    letter-spacing:.06em; text-transform:uppercase; line-height:1;
  }
  .pw-gray{ fill:#888; color:#777; }
  .pw-teal{ fill:var(--pw-teal); color:var(--pw-teal); }
  .pw-yellow{ fill:var(--pw-yellow); color:#7a6c1a; }
  .pw-green{ fill:#2a7a2a; color:#2a7a2a; }
  .pw-blue{ fill:#1a4a9c; color:#1a4a9c; }

  /* Small action key (CC, Download) */
  .pw-key-sm{
    flex:0 0 48px; width:48px; height:48px;
    border:0.5px solid rgba(0,0,0,0.06); outline:none;
    border-radius:12px; cursor:pointer;
    background:linear-gradient(180deg, #f4f2ef, #eae8e4);
    box-shadow:
      3px 3px 7px rgba(0,0,0,.11),
      -3px -3px 7px rgba(255,255,255,.7),
      inset 0 1px 0 rgba(255,255,255,.45),
      inset 0 -1px 0 rgba(0,0,0,.04);
    display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:2px;
    transition:transform 80ms ease-out, box-shadow 80ms ease-out;
    -webkit-tap-highlight-color:transparent;
    user-select:none;
    position:relative;
  }
  .pw-key-sm:active, .pw-key-sm.pressed{
    transform:scale(.97);
    box-shadow:
      inset 4px 4px 8px rgba(0,0,0,.12),
      inset -4px -4px 8px rgba(255,255,255,.45);
  }
  .pw-key-sm svg{ width:16px; height:16px; flex-shrink:0; }
  .pw-key-sm .pw-leg{ font-size:7px; }

  /* CC dropdown */
  .pw-cc-wrap{ position:relative; }
  .pw-cc-menu{
    display:none;
    position:absolute; bottom:calc(100% + 6px); left:50%;
    transform:translateX(-50%);
    background:#fff;
    border-radius:10px;
    box-shadow:0 8px 24px rgba(0,0,0,.14), 0 2px 6px rgba(0,0,0,.08);
    min-width:130px; z-index:100;
    overflow:hidden;
  }
  .pw-cc-menu.open{ display:block; }
  .pw-cc-item{
    padding:8px 14px; font-size:12px;
    cursor:pointer; white-space:nowrap;
    color:#444; font-family:'IBM Plex Sans',sans-serif;
    transition:background .1s;
  }
  .pw-cc-item:hover{ background:#f0f2f5; }
  .pw-cc-item.active{ font-weight:700; color:var(--pw-teal); }

  /* ══ SCRUB BAR ══ */
  .pw-scrub{
    padding:0 4px; margin-top:10px;
  }
  .pw-scrub-capsule{
    width:100%; height:28px; border-radius:14px;
    background:linear-gradient(90deg, #dedad2, #d1cec6);
    box-shadow:
      inset 3px 3px 8px rgba(0,0,0,.14),
      inset -2px -2px 5px rgba(255,255,255,.45),
      inset 0 3px 4px rgba(0,0,0,.09);
    display:flex; align-items:center; padding:0 7px;
    border:0.5px solid rgba(0,0,0,.07);
  }
  .pw-scrub-track{
    width:100%; height:10px; border-radius:5px;
    background:linear-gradient(90deg, #b5b2aa, #a8a59e);
    position:relative; cursor:pointer;
    box-shadow:
      inset 3px 3px 6px rgba(0,0,0,.28),
      inset -1px -1px 2px rgba(255,255,255,.15),
      inset 0 4px 4px rgba(0,0,0,.18);
    border:0.5px solid rgba(0,0,0,.1);
  }
  .pw-scrub-fill{
    position:absolute; top:0; left:0; height:100%;
    width:0%; border-radius:5px;
    background:linear-gradient(180deg, var(--pw-teal-2), var(--pw-teal));
    box-shadow:
      0 0 8px rgba(42,157,143,.35),
      inset 0 1px 1px rgba(255,255,255,.3),
      inset 0 -1px 1px rgba(0,0,0,.15);
    z-index:2;
  }
  .pw-scrub-blocked{
    position:absolute; top:0; bottom:0; right:0;
    background:rgba(0,0,0,.12);
    border-radius:0 5px 5px 0;
    pointer-events:none; z-index:1;
  }
  .pw-times{
    display:flex; justify-content:space-between;
    font-size:9px; color:#999; margin-top:3px; padding:0 2px;
  }

  /* Bottom row of controls card */
  .pw-ctrl-bottom{
    display:flex; align-items:center; justify-content:center;
    gap:10px; margin-top:8px; flex-wrap:wrap;
  }
  .pw-link-btn{
    display:flex; align-items:center; gap:5px;
    background:none; border:none; cursor:pointer;
    font-size:11px; font-weight:600; color:var(--pw-teal);
    font-family:'IBM Plex Sans',sans-serif;
    padding:4px 8px; border-radius:8px;
    transition:background .15s;
    text-decoration:none;
    -webkit-tap-highlight-color:transparent;
  }
  .pw-link-btn:hover{ background:rgba(42,157,143,.08); }
  .pw-link-btn svg{ width:13px; height:13px; fill:var(--pw-teal); }

  /* ══ SKIP WARNING ══ */
  .pw-skip-warn{
    position: fixed; top:35%; left:50%; transform:translateX(-50%);
    background:#fff; color:#c0392b;
    font-weight:700; font-size:13px;
    padding:12px 22px; border-radius:14px;
    text-align:center; line-height:1.5;
    box-shadow: 0 10px 30px rgba(0,0,0,.15), 0 4px 10px rgba(192,57,43,.15);
    border:1.5px solid rgba(192,57,43,.2);
    display:none; z-index:1000;
    animation: warnPulse 0.3s ease;
  }
  @keyframes warnPulse {
    0% { transform:translateX(-50%) scale(0.9); opacity:0; }
    50% { transform:translateX(-50%) scale(1.02); }
    100% { transform:translateX(-50%) scale(1); opacity:1; }
  }

  /* ══ NOTES CARD ══ */
  .pw-notes-card{
    width:94%;
    max-width:1020px;
    margin-left:auto; margin-right:auto;
    background:var(--pw-bg);
    padding:14px 16px 10px;
    border-radius:18px;
    margin-top:10px;
    position:relative;
    box-shadow:
      0 8px 20px rgba(0,0,0,0.08),
      0 2px 6px rgba(0,0,0,0.05),
      4px 0 12px rgba(0,0,0,0.03),
      -4px 0 12px rgba(0,0,0,0.03),
      inset 1px 1px 2px rgba(255,255,255,.45),
      inset -1px -1px 2px rgba(0,0,0,.04);
  }
  .pw-notes-header{
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:8px;
  }
  .pw-notes-title-group{
    display:flex; align-items:center; gap:5px;
  }
  .pw-notes-title-group svg{
    width:13px; height:13px; fill:var(--pw-teal);
  }
  .pw-notes-header .title{
    font-size:11px; font-weight:700; color:#555;
    letter-spacing:.04em; text-transform:uppercase;
  }
  .pw-saved{
    font-size:9px; font-weight:600; color:var(--pw-teal);
    opacity:0; transition:opacity .3s;
  }
  .pw-saved.show{ opacity:1; }
  .pw-notes-well{
    border-radius:12px;
    background:var(--pw-well);
    box-shadow:
      inset 2px 2px 5px rgba(0,0,0,.08),
      inset -2px -2px 5px rgba(255,255,255,.55);
    padding:3px;
  }
  .pw-notes-well textarea{
    width:100%; min-height:90px; resize:vertical;
    border:none; outline:none; background:transparent;
    border-radius:10px; padding:8px 10px;
    color:#444; font-size:13px; line-height:1.5;
    font-family:'IBM Plex Sans', sans-serif;
  }
  .pw-notes-well textarea::placeholder{ color:#aaa; }
  .pw-bottom-row{
    display:flex; align-items:center;
    position:relative; margin-top:5px; gap:8px;
  }
  .pw-copy-btn{
    height:28px; padding:0 14px;
    background:linear-gradient(180deg,#f4f2ef,#eae8e4);
    border:0.5px solid rgba(0,0,0,.08);
    border-radius:8px; cursor:pointer;
    font-size:11px; font-weight:600; color:#555;
    font-family:'IBM Plex Sans',sans-serif;
    box-shadow:2px 2px 5px rgba(0,0,0,.09),-2px -2px 5px rgba(255,255,255,.65);
    display:flex; align-items:center; gap:5px;
    transition:transform 80ms, box-shadow 80ms;
    -webkit-tap-highlight-color:transparent;
  }
  .pw-copy-btn:active{ transform:scale(.97); box-shadow:inset 2px 2px 4px rgba(0,0,0,.1),inset -2px -2px 4px rgba(255,255,255,.4); }
  .pw-copy-btn svg{ width:11px; height:11px; fill:currentColor; }
  .pw-copy-btn.copied{ color:var(--pw-teal); }
  .pw-my-notes-btn{
    height:28px; padding:0 14px;
    background:linear-gradient(180deg,#f4f2ef,#eae8e4);
    border:0.5px solid rgba(0,0,0,.08);
    border-radius:8px; cursor:pointer;
    font-size:11px; font-weight:600; color:var(--pw-teal);
    font-family:'IBM Plex Sans',sans-serif;
    box-shadow:2px 2px 5px rgba(0,0,0,.09),-2px -2px 5px rgba(255,255,255,.65);
    display:flex; align-items:center; gap:5px;
    transition:transform 80ms, box-shadow 80ms;
    -webkit-tap-highlight-color:transparent;
  }
  .pw-my-notes-btn:active{ transform:scale(.97); box-shadow:inset 2px 2px 4px rgba(0,0,0,.1),inset -2px -2px 4px rgba(255,255,255,.4); }
  .pw-my-notes-btn svg{ width:11px; height:11px; fill:var(--pw-teal); }
  .pw-watermark{
    font-size:9px; color:#bbb; font-weight:600;
    letter-spacing:.04em; margin-left:auto;
  }

  /* ══ MODAL — My Notes & Highlights ══ */
  .pw-modal-overlay{
    display:none; position:fixed; inset:0;
    background:rgba(0,0,0,.35); z-index:2000;
    align-items:center; justify-content:center;
    backdrop-filter:blur(2px);
  }
  .pw-modal-overlay.open{ display:flex; }
  .pw-modal{
    background:var(--pw-bg);
    border-radius:20px;
    box-shadow:0 30px 60px rgba(0,0,0,.2), 0 8px 20px rgba(0,0,0,.1);
    width:min(560px,95vw);
    max-height:80vh;
    display:flex; flex-direction:column;
    overflow:hidden;
  }
  .pw-modal-header{
    padding:14px 16px 10px;
    display:flex; align-items:center; justify-content:space-between;
    border-bottom:1px solid rgba(0,0,0,.06);
  }
  .pw-modal-title{
    font-size:12px; font-weight:700; color:#555;
    letter-spacing:.04em; text-transform:uppercase;
    display:flex; align-items:center; gap:6px;
  }
  .pw-modal-title svg{ width:14px; height:14px; fill:var(--pw-teal); }
  .pw-modal-close{
    background:none; border:none; cursor:pointer;
    font-size:16px; color:#aaa; line-height:1; padding:2px 6px;
    border-radius:6px; transition:background .15s;
  }
  .pw-modal-close:hover{ background:rgba(0,0,0,.06); color:#666; }
  .pw-modal-body{
    flex:1; overflow-y:auto; padding:12px 16px;
  }
  .pw-modal-footer{
    padding:10px 16px;
    display:flex; align-items:center; gap:8px; flex-wrap:wrap;
    border-top:1px solid rgba(0,0,0,.06);
  }
  .pw-modal-action{
    height:28px; padding:0 12px;
    background:linear-gradient(180deg,#f4f2ef,#eae8e4);
    border:0.5px solid rgba(0,0,0,.08);
    border-radius:8px; cursor:pointer;
    font-size:11px; font-weight:600; color:#555;
    font-family:'IBM Plex Sans',sans-serif;
    box-shadow:2px 2px 5px rgba(0,0,0,.09),-2px -2px 5px rgba(255,255,255,.65);
    display:flex; align-items:center; gap:5px;
    transition:transform 80ms;
  }
  .pw-modal-action:active{ transform:scale(.97); }
  .pw-modal-action svg{ width:11px; height:11px; fill:currentColor; }
  .pw-modal-count{ font-size:10px; color:#aaa; margin-left:auto; }

  /* Entry */
  .pw-entry{
    padding:10px 0;
    border-bottom:1px solid rgba(0,0,0,.06);
  }
  .pw-entry:last-child{ border-bottom:none; }
  .pw-entry-meta{
    display:flex; gap:8px; flex-wrap:wrap;
    font-size:9px; font-weight:700; text-transform:uppercase;
    letter-spacing:.04em; color:#aaa; margin-bottom:4px;
    align-items:center;
  }
  .pw-entry-meta .tag-note{ color:#2a7a2a; }
  .pw-entry-meta .tag-hl  { color:var(--pw-teal); }
  .pw-entry-text{ font-size:12px; color:#444; line-height:1.5; }
  .pw-entry-hl        { background:#ffff80; padding:1px 4px; border-radius:3px; }
  .pw-entry-hl.hl-green{ background:#b8f0b8; }
  .pw-entry-hl.hl-blue { background:#b8d8f8; }
  .pw-entry-hl.hl-red  { background:#f8b8b8; }
  .pw-entry-del{
    font-size:9px; color:#c0392b; cursor:pointer;
    text-decoration:underline; margin-left:6px;
    font-weight:600;
  }

  /* ══ RESPONSIVE ══
     Desktop  ≥720px : buttons left | professor note right (current)
     Tablet   480-719: professor note stacks ABOVE buttons
     Phone    <480px  : same stacking, smaller everything
  ══════════════════════════════════════════════════════ */

  /* Shared: prevent flex children from overflowing */
  .pw-player-wrap{ min-width:0; }
  .pw-controls-card{ min-width:0; }

  /* Touch: remove 300ms delay on all interactive elements */
  button, [role="button"], textarea, input {
    touch-action: manipulation;
  }

  /* ── Tablet portrait / large phone (480–719px) ── */
  @media (max-width:719px){
    body{ padding:20px 16px; }

    /* Professor note goes ABOVE the buttons row */
    #pwCoachCard{
      order:-1;          /* visually first inside the flex column */
      width:100% !important;
      margin-bottom:10px;
    }

    /* The top-row wrapper becomes a column so note is above buttons */
    .pw-controls-card > div[style*="display:flex"]{
      flex-direction:column !important;
      gap:10px !important;
    }

    /* Buttons group: center on mobile */
    .pw-btn-group{
      justify-content:center;
      flex-wrap:wrap;
    }

    /* Shrink portrait inside the note */
    #pwPortrait{ width:40px !important; height:40px !important; }

    /* Clamp bubble to 2 lines on tablet */
    #pwCoachBubble{
      -webkit-line-clamp:2 !important;
    }

    /* Notes textarea: don't grow too tall */
    #pwNotes{ max-height:100px; }

    /* Video border-radius: slightly smaller */
    .pw-video-card{ border-radius:16px; }
    .pw-video{ border-radius:16px; }
  }

  /* ── Phone (<480px) ── */
  @media (max-width:479px){
    body{ padding:10px 8px; }

    .pw-player-wrap{ width:100%; }

    /* Controls card: tighter padding */
    .pw-controls-card{ padding:36px 10px 8px; border-radius:0 0 14px 14px; }

    /* Smaller keys */
    .pw-key{ flex:0 0 52px; width:52px; height:52px; border-radius:12px; }
    .pw-key svg{ width:18px; height:18px; }
    .pw-key-sm{ flex:0 0 42px; width:42px; height:42px; border-radius:10px; }

    /* Buttons: tighter gap */
    .pw-btn-group{ gap:8px; }

    /* Professor note: compact */
    #pwCoachCard{
      padding:7px 10px 7px 12px !important;
      border-radius:12px !important;
      gap:8px !important;
    }
    #pwPortrait{ width:36px !important; height:36px !important; }
    #pwCoachBubble{
      font-size:11px !important;
      padding:5px 8px !important;
      -webkit-line-clamp:2 !important;
    }

    /* Notes card */
    .pw-notes-card{ padding:10px 10px 8px; border-radius:14px; }
    #pwNotes{ max-height:80px; font-size:12px; }

    /* Video */
    .pw-video-card{ border-radius:12px; }
    .pw-video{ border-radius:12px; }

    /* Modal */
    .pw-modal-inner{ width:96vw; max-height:88vh; border-radius:14px; }
  }

  /* ── Very small (< 360px, e.g. older Android) ── */
  @media (max-width:359px){
    body{ padding:8px 6px; }
    .pw-key{ flex:0 0 46px; width:46px; height:46px; }
    .pw-key-sm{ flex:0 0 38px; width:38px; height:38px; }
    .pw-btn-group{ gap:6px; }
  }
</style>

  function b64text(k) {
    var v = p(k); if (!v) return '';

  var NOTES_KEY = 'w98-notes-v1';   /* shared with W98 player */
  var HL_KEY    = 'w98-highlights-v2'; /* shared with W98 player */

  var maxWatched = 0, lastValid = 0;
  var notesTimer = null, skipTimer = null;
  var speeds = [1, 1.25, 1.5, 1.75, 2], speedIdx = 0;
  var video = null, videoReady = false;
  var manualFullscreen = false;
  var dragging = false, volDragging = false;

  /* ─── Helpers ─────────────────────────────────────────────────── */
  function loadJSON(k) { try { var r = localStorage.getItem(k); return r ? JSON.parse(r) : null; } catch(e) { return null; } }
  function saveJSON(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) {} }
  function getDone() { try { return localStorage.getItem(DK) === 'true'; } catch(e) { return false; } }
  function setDone(v) { try { localStorage.setItem(DK, v ? 'true' : 'false'); } catch(e) {} }
  function fmt(s) {
    if (!isFinite(s) || s < 0) return '0:00';
    var m = Math.floor(s/60), sec = Math.floor(s%60);
    return m+':'+(sec<10?'0':'')+sec;
  }
  function fmtDate(iso) {
    try { return new Date(iso).toLocaleString(undefined, { year:'numeric', month:'short', day:'numeric', hour:'numeric', minute:'2-digit' }); }
    catch(e) { return iso; }
  }
  function loadNotes() { try { return JSON.parse(localStorage.getItem(NOTES_KEY) || '[]'); } catch(e) { return []; } }
  function saveNotes(arr) { try { localStorage.setItem(NOTES_KEY, JSON.stringify(arr)); } catch(e) {} }
  function loadHLs() { try { return JSON.parse(localStorage.getItem(HL_KEY) || '[]'); } catch(e) { return []; } }

  /* ─── Skip warning ────────────────────────────────────────────── */
  function showSkip(msg) {
    skipWarn.innerHTML = msg || 'ummmm...you can\'t skip the video<br>and complete this part of the course';
    skipWarn.style.display = 'block';
    skipWarn.style.animation = 'none';
    skipWarn.offsetHeight;
    skipWarn.style.animation = 'warnPulse 0.3s ease';
    clearTimeout(skipTimer);
    skipTimer = setTimeout(function() { skipWarn.style.display = 'none'; }, 2500);
  }

  /* ─── Progress ────────────────────────────────────────────────── */
  function saveProgress() {
    if (!video) return;
    var dur = video.duration||0;
    saveJSON(PK, { time:video.currentTime||0, maxWatched:maxWatched, duration:dur, percent:dur>0?(video.currentTime/dur)*100:0, updatedAt:new Date().toISOString() });
  }
  function updatePlayUI(playing) {
    playIcon.innerHTML = playing ? '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>' : '<polygon points="8,5 19,12 8,19"/>';
    playLabel.textContent = playing ? 'Pause' : 'Play';
    bigPlay.classList.toggle('hidden', playing);
  }
  function updateBar() {
    var dur = video ? (video.duration||0) : 0;
    var cur = video ? (video.currentTime||0) : 0;
    var pct = dur>0 ? (cur/dur)*100 : 0;
    var maxPct = dur>0 ? Math.min((maxWatched/dur)*100, 100) : 0;
    fill.style.width = pct+'%';
    timeCur.textContent = fmt(cur);
    timeTotal.textContent = fmt(dur);
    if (getDone()) { blocked.style.display = 'none'; }
    else { blocked.style.display = 'block'; blocked.style.left = maxPct+'%'; }
    if (!getDone() && pct >= requiredPercent) { setDone(true); blocked.style.display = 'none'; }
  }

  /* ─── Seek ────────────────────────────────────────────────────── */
  function seekToX(clientX) {
    if (!video) return;
    var rect = track.getBoundingClientRect();
    var pct = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
    var target = pct * (video.duration||0);
    if (!getDone() && target > maxWatched+2) { showSkip(); return; }
    video.currentTime = target; updateBar();
  }

  /* ─── Volume ──────────────────────────────────────────────────── */
  function updateVol(clientX) {
    if (!video) return;
    var rect = volTrack.getBoundingClientRect();
    var pct = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
    var vol = Math.round(pct * 100);
    video.volume = pct;
    volFill.style.width = vol + '%';
    try { localStorage.setItem(VK, String(vol)); } catch(e) {}
    volIcon.innerHTML = vol === 0
      ? '<path d="M16.5 12A4.5 4.5 0 0 0 14 7.97v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51A8.8 8.8 0 0 0 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06a8.99 8.99 0 0 0 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>'
      : '<path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-3.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>';
  }

  /* ─── Lazy video creation ─────────────────────────────────────── */
  function createVideo() {
    if (videoReady) return;
    videoReady = true;
    video = document.createElement('video');
    video.className = 'pw-video';
    video.setAttribute('playsinline', '');
    video.setAttribute('webkit-playsinline', '');
    video.setAttribute('x5-playsinline', '');
    video.setAttribute('x5-video-player-type', 'h5');
    /* Override fullscreen methods to prevent auto-fullscreen on iOS/TalentLMS */
    video.webkitEnterFullscreen = function() {
      if (manualFullscreen) return HTMLVideoElement.prototype.webkitEnterFullscreen.call(video);
      return Promise.resolve();
    };
    video.requestFullscreen = function() {
      if (manualFullscreen) return HTMLVideoElement.prototype.requestFullscreen.call(video);
      return Promise.resolve();
    };
    video.webkitRequestFullscreen = function() {
      if (manualFullscreen) return HTMLVideoElement.prototype.webkitRequestFullscreen.call(video);
      return Promise.resolve();
    };
    video.preload = 'auto';
    placeholder.parentNode.replaceChild(video, placeholder);
    var _hlsMode = false;
    if (videoSrc) {
      if (videoSrc.indexOf('.m3u8') !== -1 && typeof Hls !== 'undefined' && Hls.isSupported()) {
        _hlsMode = true;
        var _hls = new Hls();
        _hls.loadSource(videoSrc);
        _hls.attachMedia(video);
      } else {
        video.src = videoSrc;
      }
    }
    /* Restore volume */
    try {
      var sv = parseInt(localStorage.getItem(VK)||'70', 10);
      video.volume = sv/100; volFill.style.width = sv+'%';
    } catch(e) { video.volume = 0.7; }
    /* Events */
    video.addEventListener('loadedmetadata', function() {
      timeTotal.textContent = fmt(video.duration);
      if (saved && saved.time > 0) {
        video.currentTime = Math.min(saved.time, Math.max((video.duration||0)-2, 0));
      }
      updateBar();
    });
    video.addEventListener('timeupdate', function() {
      var cur = video.currentTime||0;
      if (!getDone() && cur > lastValid+2 && cur > maxWatched+2) {
        video.currentTime = maxWatched; showSkip(); return;
      }
      if (cur > maxWatched) maxWatched = cur;
      lastValid = cur;
      saveProgress(); updateBar();
    });
    var isSnapping = false;
    video.addEventListener('seeking', function() {
      if (getDone() || isSnapping) return;
      var cur = video.currentTime||0;
      if (cur > maxWatched + 2) {
        isSnapping = true;
        video.currentTime = maxWatched;
        showSkip();
      }
    });
    video.addEventListener('seeked', function() { isSnapping = false; });
    var fsBtn = document.getElementById('pwFsBtn');
    video.addEventListener('play', function() {
      updatePlayUI(true);
      fsBtn.classList.add('visible');
    });
    video.addEventListener('pause', function() { updatePlayUI(false); saveProgress(); });
    video.addEventListener('ended', function() {
      maxWatched = video.duration||maxWatched;
      setDone(true); saveProgress(); updateBar(); updatePlayUI(false);
    });
    window.addEventListener('beforeunload', saveProgress);
    document.addEventListener('visibilitychange', function() { if (document.hidden) saveProgress(); });
    /* Fullscreen button — user-initiated only */
    fsBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      manualFullscreen = true;
      var p = video.requestFullscreen ? video.requestFullscreen()
            : video.webkitEnterFullscreen ? Promise.resolve(video.webkitEnterFullscreen())
            : Promise.resolve();
      p.catch(function(){}).finally(function(){ manualFullscreen = false; });
    });
    /* Block keyboard skipping */
    document.addEventListener('keydown', function(e) {
      if (!video) return;
      if (e.key === 'ArrowRight' || e.key === 'Right') {
        var target = (video.currentTime||0) + 5;
        if (!getDone() && target > maxWatched + 2) { e.preventDefault(); showSkip(); }
      }
    });
    if (_hlsMode) {
      _hls.on(Hls.Events.MANIFEST_PARSED, function() { video.play().catch(function(){}); });
    } else {
      video.play();
    }
  }

  /* ─── Restore saved state ─────────────────────────────────────── */
  var saved = loadJSON(PK);
  if (saved) { maxWatched = saved.maxWatched||0; }
  try { var sn = localStorage.getItem(NK); if (sn) notesArea.value = sn; } catch(e) {}
  try { var sv = parseInt(localStorage.getItem(VK)||'70', 10); volFill.style.width = sv+'%'; } catch(e) {}
  updatePlayUI(false); updateBar();

  /* ─── Playback controls ───────────────────────────────────────── */
  function togglePlay() {
    if (!videoReady) { createVideo(); return; }
    if (video.paused) video.play(); else video.pause();
  }
  bigPlay.addEventListener('click', function(e) { e.stopPropagation(); togglePlay(); });
  overlay.addEventListener('click', togglePlay);
  playBtn.addEventListener('click', togglePlay);
  backBtn.addEventListener('click', function() {
    if (!video) return;
    video.currentTime = Math.max(0, (video.currentTime||0)-15);
  });
  forwardBtn.addEventListener('click', function() {
    if (!video) return;
    var t = (video.currentTime||0)+15;
    if (!getDone() && t > maxWatched+2) { showSkip(); return; }
    video.currentTime = Math.min(video.duration||0, t);
  });
  speedBtn.addEventListener('click', function() {
    if (!video) return;
    speedIdx = (speedIdx+1)%speeds.length;
    video.playbackRate = speeds[speedIdx];
    speedLabel.textContent = speeds[speedIdx]+'×';
  });

  /* ─── Scrub bar ───────────────────────────────────────────────── */
  track.addEventListener('pointerdown', function(e) { dragging = true; seekToX(e.clientX); });
  document.addEventListener('pointermove', function(e) {
    if (dragging) seekToX(e.clientX);
    if (volDragging) updateVol(e.clientX);
  });
  document.addEventListener('pointerup', function() { dragging = false; volDragging = false; });

  /* ─── Volume ──────────────────────────────────────────────────── */
  volBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    volOverlay.classList.toggle('expanded');
  });
  volTrack.addEventListener('pointerdown', function(e) {
    volDragging = true; updateVol(e.clientX); e.stopPropagation();
  });
  document.addEventListener('click', function(e) {
    if (!volOverlay.contains(e.target)) volOverlay.classList.remove('expanded');
    if (!document.getElementById('pwCCMenu').contains(e.target) &&
        e.target !== document.getElementById('pwCC'))
      document.getElementById('pwCCMenu').classList.remove('open');
  });

  /* ─── CC / Subtitles ──────────────────────────────────────────── */
  /* For HLS streams, tracks are added to the video element after load */
  function setupCCFromVideo() {
    if (!video || !video.textTracks || video.textTracks.length === 0) return;
    var ccWrap = document.getElementById('pwCCWrap');
    var ccMenu = document.getElementById('pwCCMenu');
    ccWrap.style.display = 'flex';
    var off = document.createElement('div');
    off.className = 'pw-cc-item active'; off.textContent = 'Off'; off.dataset.idx = '-1';
    ccMenu.appendChild(off);
    for (var i = 0; i < video.textTracks.length; i++) {
      var t = video.textTracks[i];
      var item = document.createElement('div');
      item.className = 'pw-cc-item';
      item.textContent = t.label || t.language || ('Track ' + (i+1));
      item.dataset.idx = String(i);
      ccMenu.appendChild(item);
    }
    ccMenu.addEventListener('click', function(e) {
      var item = e.target.closest('.pw-cc-item');
      if (!item) return;
      ccMenu.querySelectorAll('.pw-cc-item').forEach(function(i) { i.classList.remove('active'); });
      item.classList.add('active');
      var idx = parseInt(item.dataset.idx, 10);
      for (var j = 0; j < video.textTracks.length; j++) {
        video.textTracks[j].mode = (j === idx) ? 'showing' : 'hidden';
      }
      document.getElementById('pwCCLabel').textContent = idx >= 0
        ? (video.textTracks[idx].language || 'CC').toUpperCase()
        : 'CC';
      ccMenu.classList.remove('open');
    });
  }
  document.getElementById('pwCC').addEventListener('click', function(e) {
    e.stopPropagation();
    document.getElementById('pwCCMenu').classList.toggle('open');
  });
  /* Check for tracks after video loads (HLS adds them asynchronously) */
  var ccCheckInterval = setInterval(function() {
    if (video && video.textTracks && video.textTracks.length > 0) {
      clearInterval(ccCheckInterval);
      setupCCFromVideo();
    }
  }, 1000);

  /* ─── Download ────────────────────────────────────────────────── */
  if (downloadUrl) {
    var dlBtn = document.getElementById('pwDownload');
    dlBtn.style.display = 'flex';
    dlBtn.addEventListener('click', function() {
      var a = document.createElement('a');
      a.href = downloadUrl;
      a.download = (ARTICLE.title || 'video').replace(/[^a-z0-9]/gi,'_') + '.mp4';
      a.click();
    });
  }

  /* ─── Watch Original ──────────────────────────────────────────── */
  if (originalUrl) {
    var ctrlBottom = document.getElementById('pwCtrlBottom');
    ctrlBottom.style.display = 'flex';
    document.getElementById('pwOriginal').addEventListener('click', function() {
      window.open(originalUrl, '_blank', 'noopener');
    });
  }

  /* ─── Notes — auto-save ───────────────────────────────────────── */
  notesArea.addEventListener('input', function() {
    clearTimeout(notesTimer);
    notesTimer = setTimeout(function() {
      try { localStorage.setItem(NK, notesArea.value); } catch(e) {}
      savedEl.classList.add('show');
      setTimeout(function() { savedEl.classList.remove('show'); }, 1500);
    }, 500);
  });

  /* ─── Copy Notes ──────────────────────────────────────────────── */
  copyBtn.addEventListener('click', function() {
    var text = notesArea.value; if (!text) return;
    var btn = this, orig = btn.innerHTML;
    var ok = '<svg viewBox="0 0 24 24" style="width:11px;height:11px;fill:currentColor;"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>Copied!';
    function flash() { btn.classList.add('copied'); btn.innerHTML = ok; setTimeout(function() { btn.classList.remove('copied'); btn.innerHTML = orig; }, 1800); }
    if (navigator.clipboard) { navigator.clipboard.writeText(notesArea.value).then(flash); }
    else { notesArea.select(); document.execCommand('copy'); flash(); }
  });

  /* ─── My Notes button — save + open modal ────────────────────── */
  document.getElementById('pwMyNotes').addEventListener('click', function() {
    var txt = notesArea.value.trim();
    if (txt) {
      var all = loadNotes();
      all.push({
        id:           'note-' + Date.now() + '-' + Math.random().toString(36).substr(2,4),
        courseId:     COURSE.id,
        courseName:   COURSE.name,
        articleId:    ARTICLE.id,
        articleTitle: ARTICLE.title,
        text:         txt,
        timestamp:    new Date().toISOString()
      });
      saveNotes(all);
      notesArea.value = '';
      try { localStorage.setItem(NK, ''); } catch(e) {}
    }
    buildModal();
    document.getElementById('pwNotesModal').classList.add('open');
  });

  /* ─── Modal ───────────────────────────────────────────────────── */
  function buildModal() {
    var notes = loadNotes().filter(function(n) { return n.courseId === COURSE.id; });
    var hls   = loadHLs().filter(function(h)   { return h.courseId === COURSE.id; });
    var entries = [];
    notes.forEach(function(n) { entries.push({ type:'note', data:n, ts:n.timestamp }); });
    hls.forEach(function(h)   { entries.push({ type:'hl',   data:h, ts:h.timestamp }); });
    entries.sort(function(a,b) { return a.ts < b.ts ? -1 : 1; });

    var body = document.getElementById('pwModalBody');
    body.innerHTML = '';
    document.getElementById('pwModalCount').textContent = entries.length + ' entr' + (entries.length===1?'y':'ies');

    if (entries.length === 0) {
      body.innerHTML = '<div style="color:#aaa;font-size:12px;">No notes or highlights yet.</div>';
      return;
    }
    entries.forEach(function(entry) {
      var div = document.createElement('div');
      div.className = 'pw-entry';

      var meta = document.createElement('div');
      meta.className = 'pw-entry-meta';
      var typeTag = document.createElement('span');
      typeTag.className = entry.type==='note' ? 'tag-note' : 'tag-hl';
      typeTag.textContent = entry.type==='note' ? '📝 Note' : '🖍 Highlight';
      var courseTag = document.createElement('span');
      courseTag.textContent = entry.data.courseName || COURSE.name;
      var sectionTag = document.createElement('span');
      sectionTag.textContent = entry.data.articleTitle || ARTICLE.title;
      var dateTag = document.createElement('span');
      dateTag.textContent = fmtDate(entry.ts);
      meta.appendChild(typeTag); meta.appendChild(courseTag);
      meta.appendChild(sectionTag); meta.appendChild(dateTag);

      var text = document.createElement('div');
      text.className = 'pw-entry-text';
      if (entry.type==='hl') {
        var mark = document.createElement('span');
        mark.className = 'pw-entry-hl hl-' + (entry.data.color||'green');
        mark.textContent = entry.data.text;
        text.appendChild(mark);
      } else {
        text.textContent = entry.data.text;
      }

      var del = document.createElement('span');
      del.className = 'pw-entry-del';
      del.textContent = 'remove';
      del.addEventListener('click', function() {
        if (!confirm('Remove this entry?')) return;
        if (entry.type==='note') {
          saveNotes(loadNotes().filter(function(n) { return n.id !== entry.data.id; }));
        } else {
          var all = loadHLs().filter(function(h) { return h.id !== entry.data.id; });
          try { localStorage.setItem(HL_KEY, JSON.stringify(all)); } catch(e) {}
        }
        buildModal();
      });

      div.appendChild(meta); div.appendChild(text); div.appendChild(del);
      body.appendChild(div);
    });
  }

  document.getElementById('pwModalClose').addEventListener('click', function() {
    document.getElementById('pwNotesModal').classList.remove('open');
  });
  document.getElementById('pwNotesModal').addEventListener('click', function(e) {
    if (e.target === document.getElementById('pwNotesModal'))
      document.getElementById('pwNotesModal').classList.remove('open');
  });

  /* Export */
  document.getElementById('pwModalExport').addEventListener('click', function() {
    var notes = loadNotes().filter(function(n) { return n.courseId === COURSE.id; });
    var hls   = loadHLs().filter(function(h)   { return h.courseId === COURSE.id; });
    var entries = [];
    notes.forEach(function(n) { entries.push({ type:'note', data:n, ts:n.timestamp }); });
    hls.forEach(function(h)   { entries.push({ type:'hl',   data:h, ts:h.timestamp }); });
    entries.sort(function(a,b) { return a.ts < b.ts ? -1 : 1; });
    var lines = ['MY NOTES & HIGHLIGHTS', '='.repeat(40), ''];
    entries.forEach(function(entry) {
      lines.push('[' + (entry.type==='note'?'NOTE':'HIGHLIGHT') + '] ' +
        (entry.data.courseName||'') + ' > ' + (entry.data.articleTitle||'') +
        ' — ' + fmtDate(entry.ts));
      lines.push(entry.data.text); lines.push('');
    });
    var blob = new Blob([lines.join('\n')], { type:'text/plain' });
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'notes_and_highlights.txt';
    a.click();
    setTimeout(function() { URL.revokeObjectURL(a.href); }, 1000);
  });

  /* Copy all */
  document.getElementById('pwModalCopy').addEventListener('click', function() {
    var notes = loadNotes().filter(function(n) { return n.courseId === COURSE.id; });
    var hls   = loadHLs().filter(function(h)   { return h.courseId === COURSE.id; });
    var entries = [];
    notes.forEach(function(n) { entries.push({ type:'note', data:n, ts:n.timestamp }); });
    hls.forEach(function(h)   { entries.push({ type:'hl',   data:h, ts:h.timestamp }); });
    entries.sort(function(a,b) { return a.ts < b.ts ? -1 : 1; });
    var lines = [];
    entries.forEach(function(entry) {
      lines.push('[' + (entry.type==='note'?'NOTE':'HIGHLIGHT') + '] ' +
        (entry.data.articleTitle||'') + ' — ' + fmtDate(entry.ts));
      lines.push(entry.data.text); lines.push('');
    });
    if (navigator.clipboard) {
      navigator.clipboard.writeText(lines.join('\n')).then(function() { alert('Copied!'); });
    } else {
      var ta = document.createElement('textarea');
      ta.value = lines.join('\n');
      document.body.appendChild(ta); ta.select();
      document.execCommand('copy'); document.body.removeChild(ta);
      alert('Copied!');
    }
  });

  /* Print */
  /* ── Theme toggle ── */
  (function(){
    var pwThemes = ['light', 'bgmc'];
    var PWTHEME_KEY = 'pw-video-theme';
    var pwThIdx = pwThemes.indexOf(localStorage.getItem(PWTHEME_KEY) || 'light');
    if (pwThIdx < 0) pwThIdx = 0;
    function applyPwTheme(idx) {
      var t = pwThemes[idx];
      document.documentElement.setAttribute('data-theme', t === 'light' ? '' : t);
      document.getElementById('pwThemeLabel').textContent = t === 'light' ? 'Theme' : 'BGMC';
      localStorage.setItem(PWTHEME_KEY, t);
    }
    applyPwTheme(pwThIdx);
    document.getElementById('pwThemeBtn').addEventListener('click', function() {
      pwThIdx = (pwThIdx + 1) % pwThemes.length;
      applyPwTheme(pwThIdx);
    });
  })();

  document.getElementById('pwModalPrint').addEventListener('click', function() {
    var notes = loadNotes().filter(function(n) { return n.courseId === COURSE.id; });
    var hls   = loadHLs().filter(function(h)   { return h.courseId === COURSE.id; });
    var entries = [];
    notes.forEach(function(n) { entries.push({ type:'note', data:n, ts:n.timestamp }); });
    hls.forEach(function(h)   { entries.push({ type:'hl',   data:h, ts:h.timestamp }); });
    entries.sort(function(a,b) { return a.ts < b.ts ? -1 : 1; });
    var rows = entries.map(function(entry) {
      var color = entry.type==='hl'
        ? ({green:'#b8f0b8',blue:'#b8d8f8',red:'#f8b8b8'}[entry.data.color]||'#ffff80')
        : '#ffffff';
      return '<tr style="background:'+color+'">' +
        '<td style="padding:4px 8px;border:1px solid #ddd;font-weight:700;">'+(entry.type==='note'?'NOTE':'HIGHLIGHT')+'</td>'+
        '<td style="padding:4px 8px;border:1px solid #ddd;">'+(entry.data.courseName||'')+'</td>'+
        '<td style="padding:4px 8px;border:1px solid #ddd;">'+(entry.data.articleTitle||'')+'</td>'+
        '<td style="padding:4px 8px;border:1px solid #ddd;">'+fmtDate(entry.ts)+'</td>'+
        '<td style="padding:4px 8px;border:1px solid #ddd;">'+entry.data.text+'</td>'+
        '</tr>';
    }).join('');
    var html = '<!DOCTYPE html><html><head><title>Notes &amp; Highlights</title>'+
      '<style>body{font-family:"IBM Plex Sans",sans-serif;font-size:12px;padding:20px}'+
      'table{border-collapse:collapse;width:100%}th{background:#2a9d8f;color:#fff;padding:6px 8px;border:1px solid #ddd;text-align:left}</style></head>'+
      '<body><h2>My Notes &amp; Highlights</h2>'+
      '<p style="font-size:11px;color:#999">Course: '+COURSE.name+' — Exported '+new Date().toLocaleString()+'</p>'+
      '<table><thead><tr><th>Type</th><th>Course</th><th>Section</th><th>Date</th><th>Content</th></tr></thead>'+
      '<tbody>'+rows+'</tbody></table></body></html>';
    var w = window.open('', '_blank');
    w.document.write(html); w.document.close();
    setTimeout(function() { w.print(); }, 250);
  });

  /* ─── Key press feedback ──────────────────────────────────────── */
  document.querySelectorAll('.pw-key, .pw-key-sm').forEach(function(btn) {
    btn.addEventListener('pointerdown', function() { btn.classList.add('pressed'); });
    btn.addEventListener('pointerup',   function() { btn.classList.remove('pressed'); });
    btn.addEventListener('pointerleave',function() { btn.classList.remove('pressed'); });
  });

  /* ─── PROFESSOR NOTE ────────────────────────────────────────── */
  (function() {
    /* Fully customisable via URL params — no hardcoded names or images.
       ?name=  or  ?name=<base64>   — professor's name (plain text or base64)
       ?msg=   or  ?text=<base64>   — the note text (base64 recommended)
       ?speed= — typing speed in ms per character (default 30)
       ?delay= — ms before typing starts (default 400)
       ?loop=1 — loop the typewriter on click
    */
    var coachName  = b64text('name') || p('name') || '';
    var coachText  = b64text('text') || p('text') || b64text('msg') || p('msg') || '';
    var coachSpeed = parseInt(p('speed')||'30', 10);
    var startDelay = parseInt(p('delay')||'400', 10);
    var coachLoop  = p('loop')==='1' || p('loop')==='true';

    var nameEl     = document.getElementById('pwCoachName');
    var bubbleEl   = document.getElementById('pwCoachBubble');
    var replayEl   = document.getElementById('pwCoachReplay');
    var minBtn     = document.getElementById('pwCoachMin');
    var cardEl     = document.getElementById('pwCoachCard');

    /* Show professor name only if provided */
    if (coachName) nameEl.textContent = '· ' + coachName;

    /* Typewriter */
    var cancelFn = null;
    function typewrite(fullText) {
      if (cancelFn) cancelFn();
      bubbleEl.textContent = '';
      replayEl.classList.remove('visible');
      var cursor = document.createElement('span');
      cursor.className = 'pw-cursor';
      bubbleEl.appendChild(cursor);
      var i = 0, cancelled = false;
      function step() {
        if (cancelled) return;
        if (i >= fullText.length) {
          replayEl.classList.add('visible');
          return;
        }
        var ch = fullText.charAt(i++);
        cursor.remove();
        bubbleEl.appendChild(document.createTextNode(ch));
        bubbleEl.appendChild(cursor);
        var pause = ',.!?;:'.indexOf(ch) >= 0 ? coachSpeed * 5 : coachSpeed;
        setTimeout(step, pause);
      }
      setTimeout(step, startDelay);
      cancelFn = function() { cancelled = true; };
    }

    /* Minimize */
    minBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      cardEl.classList.toggle('minimized');
      var isMin = cardEl.classList.contains('minimized');
      minBtn.innerHTML = isMin
        ? '<svg viewBox="0 0 24 24" style="width:11px;height:11px;fill:currentColor"><path d="M19 13H5v-2h14v2zm0-8H5v2h14V5zm0 12H5v2h14v-2z"/></svg> Expand'
        : '<svg viewBox="0 0 24 24" style="width:11px;height:11px;fill:currentColor"><path d="M19 13H5v-2h14v2z"/></svg> Minimize';
    });

    /* Click to replay */
    bubbleEl.addEventListener('click', function() {
      if (coachLoop || replayEl.classList.contains('visible')) typewrite(coachText);
    });
    replayEl.addEventListener('click', function() { typewrite(coachText); });

    /* Auto-start */
    var coachStarted = false;
    function startCoach() {
      if (coachStarted) return;
      coachStarted = true;
      typewrite(coachText);
    }
    if ('IntersectionObserver' in window) {
      var io = new IntersectionObserver(function(entries) {
        entries.forEach(function(en) { if (en.isIntersecting) { startCoach(); io.disconnect(); } });
      }, { threshold: 0.1 });
      io.observe(cardEl);
    }
    setTimeout(startCoach, 1000);
  })();

})();
</script>
</body>
</html>

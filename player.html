<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pathway Audio Player</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: transparent;
    font-family: 'IBM Plex Sans', sans-serif;
  }

  .player {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  /* ══════════════════════════════════════
     BASE KEYCAP — Uiverse structure
     ══════════════════════════════════════ */
  .keycap {
    position: relative;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 2px;
    width: 72px;
    height: 72px;
    border-radius: 10px;
    overflow: hidden;
    transition:
      transform 0.1s ease-in-out,
      box-shadow 0.1s ease-in;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    cursor: pointer;
    border: none;
    outline: none;
    padding: 0;
  }

  .keycap::before {
    content: "";
    position: absolute;
    top: 3px;
    left: 4px;
    bottom: 14px;
    right: 12px;
    border-radius: 10px;
    transition: all 0.1s ease-in-out;
  }

  .keycap svg {
    width: 20px;
    height: 20px;
    flex-shrink: 0;
    position: relative;
    z-index: 1;
    transition: transform 0.1s ease-in-out;
  }

  .keycap .legend {
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    position: relative;
    z-index: 1;
    transition: transform 0.1s ease-in-out;
  }

  .keycap:active {
    transform: translateY(2px);
  }

  .keycap:active::before {
    top: 5px;
    left: 5px;
    bottom: 11px;
    right: 11px;
  }

  .keycap:active svg,
  .keycap:active .legend {
    transform: translateY(1px);
  }

  /* ══════════════════════════════════════
     NEUTRAL (Back) — off-white / cream
     ══════════════════════════════════════ */
  .keycap.neutral {
    background: linear-gradient(180deg, #dedad2, #ccc8c0);
    box-shadow:
      inset -8px 0 8px rgba(0, 0, 0, 0.08),
      inset 0 -8px 8px rgba(0, 0, 0, 0.14),
      0 0 0 2px rgba(0, 0, 0, 0.18),
      10px 20px 25px rgba(0, 0, 0, 0.2);
  }

  .keycap.neutral::before {
    background: linear-gradient(90deg, #d4d0c8, #eae7e0);
    box-shadow:
      -10px -10px 10px rgba(255, 255, 255, 0.5),
      10px 5px 10px rgba(0, 0, 0, 0.1);
    border-left: 1px solid rgba(0,0,0,0.06);
    border-bottom: 1px solid rgba(0,0,0,0.06);
    border-top: 1px solid rgba(0,0,0,0.1);
  }

  .keycap.neutral:active {
    box-shadow:
      inset -4px 0 4px rgba(0, 0, 0, 0.06),
      inset 0 -4px 4px rgba(0, 0, 0, 0.1),
      0 0 0 2px rgba(0, 0, 0, 0.14),
      5px 10px 15px rgba(0, 0, 0, 0.15);
  }

  .keycap.neutral:active::before {
    box-shadow:
      -5px -5px 5px rgba(255, 255, 255, 0.35),
      5px 3px 5px rgba(0, 0, 0, 0.08);
  }

  .keycap.neutral svg { fill: #48453e; }
  .keycap.neutral .legend { color: #605c54; }

  /* ══════════════════════════════════════
     PATHWAY TEAL (Play)
     ══════════════════════════════════════ */
  .keycap.pathway {
    background: linear-gradient(180deg, #228b7e, #1a7268);
    box-shadow:
      inset -8px 0 8px rgba(0, 0, 0, 0.1),
      inset 0 -8px 8px rgba(0, 0, 0, 0.18),
      0 0 0 2px rgba(0, 0, 0, 0.3),
      10px 20px 25px rgba(0, 0, 0, 0.22);
  }

  .keycap.pathway::before {
    background: linear-gradient(90deg, #1e8476, #34b8a8);
    box-shadow:
      -10px -10px 10px rgba(255, 255, 255, 0.3),
      10px 5px 10px rgba(0, 0, 0, 0.12);
    border-left: 1px solid rgba(0,0,0,0.1);
    border-bottom: 1px solid rgba(0,0,0,0.1);
    border-top: 1px solid rgba(0,0,0,0.18);
  }

  .keycap.pathway:active {
    box-shadow:
      inset -4px 0 4px rgba(0, 0, 0, 0.08),
      inset 0 -4px 4px rgba(0, 0, 0, 0.12),
      0 0 0 2px rgba(0, 0, 0, 0.24),
      5px 10px 15px rgba(0, 0, 0, 0.16);
  }

  .keycap.pathway:active::before {
    box-shadow:
      -5px -5px 5px rgba(255, 255, 255, 0.2),
      5px 3px 5px rgba(0, 0, 0, 0.1);
  }

  .keycap.pathway svg { fill: #e0f4f0; }
  .keycap.pathway .legend { color: #b0e0d8; }
  .keycap.pathway .icon-play { margin-left: 2px; }

  /* ══════════════════════════════════════
     YELLOW (Speed) — light warm yellow
     ══════════════════════════════════════ */
  .keycap.yellow {
    background: linear-gradient(180deg, #e4da92, #d0c87c);
    box-shadow:
      inset -8px 0 8px rgba(0, 0, 0, 0.08),
      inset 0 -8px 8px rgba(0, 0, 0, 0.14),
      0 0 0 2px rgba(0, 0, 0, 0.18),
      10px 20px 25px rgba(0, 0, 0, 0.2);
  }

  .keycap.yellow::before {
    background: linear-gradient(90deg, #dcd088, #f0e8b0);
    box-shadow:
      -10px -10px 10px rgba(255, 255, 255, 0.45),
      10px 5px 10px rgba(0, 0, 0, 0.1);
    border-left: 1px solid rgba(0,0,0,0.06);
    border-bottom: 1px solid rgba(0,0,0,0.06);
    border-top: 1px solid rgba(0,0,0,0.1);
  }

  .keycap.yellow:active {
    box-shadow:
      inset -4px 0 4px rgba(0, 0, 0, 0.06),
      inset 0 -4px 4px rgba(0, 0, 0, 0.1),
      0 0 0 2px rgba(0, 0, 0, 0.14),
      5px 10px 15px rgba(0, 0, 0, 0.15);
  }

  .keycap.yellow:active::before {
    box-shadow:
      -5px -5px 5px rgba(255, 255, 255, 0.3),
      5px 3px 5px rgba(0, 0, 0, 0.08);
  }

  .keycap.yellow svg { fill: #5c5428; }
  .keycap.yellow .legend { color: #7a7040; }

  @media (max-width: 260px) {
    .keycap { width: 58px; height: 58px; }
    .player { gap: 6px; }
    .keycap svg { width: 16px; height: 16px; }
    .keycap .legend { font-size: 7px; }
  }
</style>
</head>
<body>

<div class="player">
  <!-- Back 15s -->
  <button class="keycap neutral" id="btnBack" title="Back 15 seconds" aria-label="Back 15 seconds">
    <svg viewBox="0 0 24 24"><path d="M11.99 5V1l-5 5 5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6h-2c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/><text x="12" y="16" text-anchor="middle" font-size="8" font-weight="700" font-family="IBM Plex Sans" style="fill:inherit">15</text></svg>
    <span class="legend">Back</span>
  </button>

  <!-- Play / Pause -->
  <button class="keycap pathway" id="btnPlay" title="Play" aria-label="Play">
    <svg viewBox="0 0 24 24" class="icon-play" id="iconPlay"><polygon points="8,5 19,12 8,19"/></svg>
    <svg viewBox="0 0 24 24" id="iconPause" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
    <span class="legend" id="playLabel">Play</span>
  </button>

  <!-- Speed -->
  <button class="keycap yellow" id="btnSpeed" title="Playback speed" aria-label="Playback speed">
    <svg viewBox="0 0 24 24"><path d="M20.38 8.57l-1.23 1.85a8 8 0 0 1-.22 7.58H5.07A8 8 0 0 1 15.58 6.85l1.85-1.23A10 10 0 0 0 3.35 19a2 2 0 0 0 1.72 1h13.85a2 2 0 0 0 1.74-1 10 10 0 0 0-.27-10.44z"/><path d="M10.59 15.41a2 2 0 0 0 2.83 0l5.66-8.49-8.49 5.66a2 2 0 0 0 0 2.83z"/></svg>
    <span class="legend" id="speedLabel">1×</span>
  </button>
</div>

<audio id="audio" preload="metadata"></audio>

<script>
(function() {
  const $ = id => document.getElementById(id);
  const audio = $('audio');

  const params = new URLSearchParams(window.location.search);
  const src = params.get('src');
  if (src) audio.src = src;

  window.addEventListener('message', e => {
    if (e.data?.audioSrc) audio.src = e.data.audioSrc;
  });

  const speeds = [1, 1.25, 1.5, 1.75, 2, 0.75];
  let speedIdx = 0;

  function setPlaying(p) {
    $('iconPlay').style.display = p ? 'none' : 'block';
    $('iconPause').style.display = p ? 'block' : 'none';
    $('playLabel').textContent = p ? 'Pause' : 'Play';
    $('btnPlay').title = p ? 'Pause' : 'Play';
  }

  audio.addEventListener('ended', () => setPlaying(false));

  $('btnPlay').onclick = () => {
    if (audio.paused) { audio.play(); setPlaying(true); }
    else { audio.pause(); setPlaying(false); }
  };

  $('btnBack').onclick = () => audio.currentTime = Math.max(0, audio.currentTime - 15);

  $('btnSpeed').onclick = () => {
    speedIdx = (speedIdx + 1) % speeds.length;
    audio.playbackRate = speeds[speedIdx];
    $('speedLabel').textContent = speeds[speedIdx] + '×';
  };

  document.addEventListener('keydown', e => {
    if (e.code === 'Space') { e.preventDefault(); $('btnPlay').click(); }
    if (e.code === 'ArrowLeft') audio.currentTime = Math.max(0, audio.currentTime - 15);
  });
})();
</script>
</body>
</html>

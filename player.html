<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pathway Media Player</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --pw-bg:#ebe9e5;
    --pw-well:#e4e1dc;
    --pw-track:#d4d1cc;
    --pw-text:#333;
    --pw-muted:#8f8f8f;
    --pw-teal:#2a9d8f;
    --pw-teal-2:#38c4ba;
    --pw-yellow:#8a7a20;
    --pw-shadow-dark: rgba(0,0,0,0.12);
    --pw-shadow-light: rgba(255,255,255,0.82);
  }

  *, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }

  html, body {
    background: transparent;
    font-family: 'IBM Plex Sans', sans-serif;
    color: var(--pw-text);
    -webkit-font-smoothing: antialiased;
  }

  body{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    padding:16px 12px 20px;
  }

  .pw-header{
    width:100%;
    max-width:900px;
    text-align:center;
    margin-bottom:12px;
  }
  .pw-header h1{
    font-size:17px;
    font-weight:700;
    color:var(--pw-text);
  }
  .pw-header .sub{
    font-size:10px;
    color:#999;
    margin-top:2px;
    letter-spacing:.04em;
  }

  .pw-player-wrap{
    width:100%;
    max-width:900px;
  }

  .pw-video-card{
    width:100%;
    background:#111;
    border-radius:22px;
    overflow:hidden;
    position:relative;
    z-index:2;
    box-shadow:
      0 18px 48px rgba(0,0,0,0.26),
      0 8px 18px rgba(0,0,0,0.16),
      0 28px 60px -12px rgba(0,0,0,0.22);
    margin-bottom:-8px;
  }

  .pw-video{
    display:block;
    width:100%;
    height:auto;
    background:#000;
  }

  .pw-video::-webkit-media-controls {
    display:none !important;
  }

  .pw-overlay{
    position:absolute;
    inset:0;
    z-index:2;
    cursor:pointer;
  }

  .pw-big-play{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
    width:70px;
    height:70px;
    border:none;
    border-radius:50%;
    background:rgba(42,157,143,.9);
    box-shadow:0 8px 24px rgba(42,157,143,.35);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    z-index:3;
    transition:transform .15s ease, opacity .2s ease;
  }
  .pw-big-play:hover{
    transform:translate(-50%, -50%) scale(1.05);
  }
  .pw-big-play.hidden{
    opacity:0;
    pointer-events:none;
  }
  .pw-big-play svg{
    width:28px;
    height:28px;
    fill:#fff;
    margin-left:2px;
  }

  .pw-controls-card,
  .pw-notes-card{
    width:94%;
    max-width:840px;
    margin-left:auto;
    margin-right:auto;
    background:var(--pw-bg);
    box-shadow:
      8px 8px 22px var(--pw-shadow-dark),
      -8px -8px 22px var(--pw-shadow-light),
      inset 0 1px 2px rgba(255,255,255,.35);
  }

  .pw-controls-card{
    padding:20px 16px 12px;
    border-radius:0 0 20px 20px;
    position:relative;
    z-index:1;
  }

  .pw-btn-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:14px;
  }

  .pw-btn-group{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:12px;
    flex-wrap:wrap;
    flex:1;
  }

  .pw-key{
    width:68px;
    height:68px;
    border:none;
    outline:none;
    border-radius:16px;
    cursor:pointer;
    background:var(--pw-bg);
    box-shadow:
      4px 4px 10px rgba(0,0,0,.1),
      -4px -4px 10px rgba(255,255,255,.72),
      inset 0 1px 1px rgba(255,255,255,.4);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:3px;
    transition:transform 80ms ease-out, box-shadow 80ms ease-out;
    -webkit-tap-highlight-color:transparent;
    user-select:none;
  }
  .pw-key:active,
  .pw-key.pressed{
    transform:scale(.97);
    box-shadow:
      inset 3px 3px 6px rgba(0,0,0,.12),
      inset -3px -3px 6px rgba(255,255,255,.5);
  }

  .pw-key svg{
    width:22px;
    height:22px;
    flex-shrink:0;
  }

  .pw-leg{
    font-size:10px;
    font-weight:700;
    letter-spacing:.06em;
    text-transform:uppercase;
    line-height:1;
  }
  .pw-gray{ fill:#777; color:#666; }
  .pw-teal{ fill:var(--pw-teal); color:var(--pw-teal); }
  .pw-yellow{ fill:var(--pw-yellow); color:#7a6c1a; }

  .pw-vol-wrap{
    width:44px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:6px;
  }

  .pw-speaker{
    width:16px;
    height:16px;
    fill:#777;
  }

  .pw-vol-capsule{
    width:38px;
    height:90px;
    border-radius:19px;
    background:var(--pw-well);
    box-shadow:
      inset 2px 2px 5px rgba(0,0,0,.08),
      inset -2px -2px 5px rgba(255,255,255,.72);
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .pw-vol-track{
    width:10px;
    height:64px;
    border-radius:5px;
    background:var(--pw-track);
    position:relative;
    cursor:pointer;
    touch-action:none;
    box-shadow:
      inset 2px 2px 6px rgba(0,0,0,.18),
      inset -2px -2px 6px rgba(255,255,255,.45),
      inset 0 1px 2px rgba(0,0,0,.12);
  }

  .pw-vol-fill{
    position:absolute;
    left:0;
    right:0;
    bottom:0;
    height:70%;
    border-radius:5px;
    background:linear-gradient(0deg, var(--pw-teal), var(--pw-teal-2));
    box-shadow:
      0 -1px 4px rgba(42,157,143,.4),
      0 0 8px rgba(42,157,143,.25),
      inset 0 1px 1px rgba(255,255,255,.3);
  }

  .pw-vol-label{
    font-size:9px;
    font-weight:600;
    color:#999;
  }

  .pw-scrub{
    padding:0 2px;
    margin-top:10px;
  }

  .pw-scrub-capsule{
    width:100%;
    height:32px;
    border-radius:16px;
    background:var(--pw-well);
    box-shadow:
      inset 2px 2px 5px rgba(0,0,0,.08),
      inset -2px -2px 5px rgba(255,255,255,.72);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:0 8px;
  }

  .pw-scrub-track{
    width:100%;
    height:10px;
    border-radius:5px;
    background:var(--pw-track);
    position:relative;
    cursor:pointer;
    box-shadow:
      inset 2px 2px 6px rgba(0,0,0,.2),
      inset -2px -2px 6px rgba(255,255,255,.45),
      inset 0 1px 2px rgba(0,0,0,.12);
  }

  .pw-scrub-fill{
    position:absolute;
    top:0;
    left:0;
    height:100%;
    width:0%;
    border-radius:5px;
    background:linear-gradient(90deg, var(--pw-teal), var(--pw-teal-2));
    box-shadow:
      0 1px 4px rgba(42,157,143,.45),
      0 0 8px rgba(42,157,143,.25),
      inset 0 1px 1px rgba(255,255,255,.3);
    z-index:2;
  }

  .pw-scrub-blocked{
    position:absolute;
    top:0;
    bottom:0;
    right:0;
    background:rgba(0,0,0,.14);
    border-radius:0 5px 5px 0;
    pointer-events:none;
    z-index:1;
  }

  .pw-scrub-knob{
    position:absolute;
    top:50%;
    left:0%;
    width:16px;
    height:16px;
    transform:translate(-50%, -50%);
    border-radius:50%;
    background:#fff;
    box-shadow:0 2px 6px rgba(0,0,0,.24);
    z-index:3;
    pointer-events:none;
  }

  .pw-times{
    display:flex;
    justify-content:space-between;
    font-size:10px;
    color:#999;
    margin-top:4px;
    padding:0 2px;
  }

  .pw-meta{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:8px;
    gap:10px;
    font-size:10px;
    color:#8b8b8b;
  }

  .pw-skip-warn{
    position:fixed;
    top:16px;
    left:50%;
    transform:translateX(-50%);
    z-index:1000;
    background:rgba(255,255,255,.96);
    color:#c0392b;
    font-size:12px;
    font-weight:600;
    padding:8px 14px;
    border-radius:12px;
    box-shadow:0 4px 16px rgba(0,0,0,.12);
    display:none;
  }

  .pw-notes-card{
    padding:16px;
    border-radius:18px;
    margin-top:12px;
  }

  .pw-notes-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:8px;
  }

  .pw-notes-header .title{
    font-size:11px;
    font-weight:700;
    color:#555;
    letter-spacing:.04em;
    text-transform:uppercase;
  }

  .pw-saved{
    font-size:9px;
    font-weight:600;
    color:var(--pw-teal);
    opacity:0;
    transition:opacity .3s;
  }
  .pw-saved.show{
    opacity:1;
  }

  .pw-notes-well{
    border-radius:12px;
    background:var(--pw-well);
    box-shadow:
      inset 2px 2px 5px rgba(0,0,0,.08),
      inset -2px -2px 5px rgba(255,255,255,.72);
    padding:3px;
  }

  .pw-notes-well textarea{
    width:100%;
    min-height:90px;
    resize:vertical;
    border:none;
    outline:none;
    background:transparent;
    border-radius:10px;
    padding:8px 10px;
    color:#444;
    font-size:12px;
    line-height:1.5;
    font-family:'IBM Plex Sans', sans-serif;
  }

  .pw-copy-row{
    display:flex;
    justify-content:center;
    margin-top:10px;
  }

  .pw-copy-btn{
    border:none;
    outline:none;
    border-radius:10px;
    padding:6px 14px;
    cursor:pointer;
    background:var(--pw-bg);
    color:#777;
    font-size:10px;
    font-weight:600;
    font-family:'IBM Plex Sans', sans-serif;
    box-shadow:
      3px 3px 6px rgba(0,0,0,.08),
      -3px -3px 6px rgba(255,255,255,.6);
    transition:all 80ms ease-out;
    display:flex;
    align-items:center;
    gap:4px;
  }
  .pw-copy-btn:active{
    box-shadow:
      inset 2px 2px 4px rgba(0,0,0,.1),
      inset -2px -2px 4px rgba(255,255,255,.4);
  }
  .pw-copy-btn.copied{
    color:var(--pw-teal);
  }

  @media (max-width:640px){
    body{ padding:12px 8px 18px; }
    .pw-key{ width:58px; height:58px; }
    .pw-leg{ font-size:9px; }
    .pw-btn-row{ align-items:flex-start; }
    .pw-btn-group{ gap:10px; }
  }
</style>
</head>
<body>

<div class="pw-header">
  <h1 id="pwTitle">Lesson Video</h1>
  <div class="sub">Pathway Media Player</div>
</div>

<div class="pw-player-wrap">
  <div class="pw-video-card">
    <video id="pwVideo" class="pw-video" playsinline preload="metadata"></video>
    <div class="pw-overlay" id="pwOverlay"></div>

    <button class="pw-big-play" id="pwBigPlay" aria-label="Play video">
      <svg viewBox="0 0 24 24"><polygon points="8,5 19,12 8,19"/></svg>
    </button>
  </div>

  <div class="pw-controls-card">
    <div class="pw-btn-row">
      <div class="pw-btn-group">
        <button class="pw-key" id="pwBack" type="button">
          <svg viewBox="0 0 24 24" class="pw-gray">
            <path d="M11.99 5V1l-5 5 5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6h-2c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/>
            <text x="12" y="16" text-anchor="middle" font-size="8" font-weight="700" font-family="IBM Plex Sans" fill="#777">15</text>
          </svg>
          <span class="pw-leg pw-gray">Back</span>
        </button>

        <button class="pw-key" id="pwPlay" type="button">
          <svg viewBox="0 0 24 24" id="pwPlayIcon" class="pw-teal">
            <polygon points="8,5 19,12 8,19"/>
          </svg>
          <span class="pw-leg pw-teal" id="pwPlayLabel">Play</span>
        </button>

        <button class="pw-key" id="pwForward" type="button">
          <svg viewBox="0 0 24 24" class="pw-gray">
            <path d="M12.01 5V1l5 5-5 5V7c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6h2c0 4.42-3.58 8-8 8s-8-3.58-8-8 3.58-8 8-8z"/>
            <text x="12" y="16" text-anchor="middle" font-size="8" font-weight="700" font-family="IBM Plex Sans" fill="#777">15</text>
          </svg>
          <span class="pw-leg pw-gray">Forward</span>
        </button>

        <button class="pw-key" id="pwSpeed" type="button">
          <svg viewBox="0 0 24 24" class="pw-yellow">
            <path d="M20.38 8.57l-1.23 1.85a8 8 0 0 1-.22 7.58H5.07A8 8 0 0 1 15.58 6.85l1.85-1.23A10 10 0 0 0 3.35 19a2 2 0 0 0 1.72 1h13.85a2 2 0 0 0 1.74-1 10 10 0 0 0-.27-10.44z"/>
            <path d="M10.59 15.41a2 2 0 0 0 2.83 0l5.66-8.49-8.49 5.66a2 2 0 0 0 0 2.83z"/>
          </svg>
          <span class="pw-leg pw-yellow" id="pwSpeedLabel">1×</span>
        </button>
      </div>

      <div class="pw-vol-wrap">
        <svg viewBox="0 0 24 24" class="pw-speaker" id="pwSpeakerIcon">
          <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-3.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
        </svg>

        <div class="pw-vol-capsule">
          <div class="pw-vol-track" id="pwVolTrack">
            <div class="pw-vol-fill" id="pwVolFill"></div>
          </div>
        </div>

        <span class="pw-vol-label" id="pwVolLabel">70%</span>
      </div>
    </div>

    <div class="pw-scrub">
      <div class="pw-scrub-capsule">
        <div class="pw-scrub-track" id="pwTrack">
          <div class="pw-scrub-fill" id="pwScrubFill"></div>
          <div class="pw-scrub-blocked" id="pwBlocked"></div>
          <div class="pw-scrub-knob" id="pwKnob"></div>
        </div>
      </div>

      <div class="pw-times">
        <span id="pwTimeCur">0:00</span>
        <span id="pwTimeTotal">0:00</span>
      </div>

      <div class="pw-meta">
        <span id="pwLastWatched">Last watched: 0:00</span>
        <span id="pwMaxWatched">Max watched: 0:00</span>
      </div>
    </div>
  </div>

  <div class="pw-notes-card">
    <div class="pw-notes-header">
      <span class="title">Notes</span>
      <span class="pw-saved" id="pwSaved">Saved</span>
    </div>

    <div class="pw-notes-well">
      <textarea id="pwNotes" placeholder="Take notes while watching..."></textarea>
    </div>

    <div class="pw-copy-row">
      <button class="pw-copy-btn" id="pwCopy" type="button">Copy Notes</button>
    </div>
  </div>
</div>

<div class="pw-skip-warn" id="pwSkipWarn">You can only skip to parts you've already watched.</div>

<script>
(function () {
  var params = new URLSearchParams(window.location.search);

  // Universal config
  var videoSrc =
    window.PATHWAY_VIDEO_SRC ||
    document.body.getAttribute('data-video-src') ||
    params.get('src') ||
    '';

  var lessonTitle =
    window.PATHWAY_LESSON_TITLE ||
    document.body.getAttribute('data-title') ||
    params.get('title') ||
    'Lesson Video';

  var lessonId =
    window.PATHWAY_LESSON_ID ||
    document.body.getAttribute('data-lesson-id') ||
    params.get('id') ||
    'default';

  var requiredPercent = parseInt(
    window.PATHWAY_REQUIRED_PERCENT ||
    document.body.getAttribute('data-required') ||
    params.get('req') ||
    '90',
    10
  );

  var video = document.getElementById('pwVideo');
  var overlay = document.getElementById('pwOverlay');
  var bigPlay = document.getElementById('pwBigPlay');
  var titleEl = document.getElementById('pwTitle');

  var playBtn = document.getElementById('pwPlay');
  var playIcon = document.getElementById('pwPlayIcon');
  var playLabel = document.getElementById('pwPlayLabel');
  var backBtn = document.getElementById('pwBack');
  var forwardBtn = document.getElementById('pwForward');
  var speedBtn = document.getElementById('pwSpeed');
  var speedLabel = document.getElementById('pwSpeedLabel');

  var track = document.getElementById('pwTrack');
  var fill = document.getElementById('pwScrubFill');
  var blocked = document.getElementById('pwBlocked');
  var knob = document.getElementById('pwKnob');
  var timeCur = document.getElementById('pwTimeCur');
  var timeTotal = document.getElementById('pwTimeTotal');

  var lastWatchedEl = document.getElementById('pwLastWatched');
  var maxWatchedEl = document.getElementById('pwMaxWatched');
  var skipWarn = document.getElementById('pwSkipWarn');

  var volTrack = document.getElementById('pwVolTrack');
  var volFill = document.getElementById('pwVolFill');
  var volLabel = document.getElementById('pwVolLabel');
  var speakerIcon = document.getElementById('pwSpeakerIcon');

  var notesArea = document.getElementById('pwNotes');
  var savedEl = document.getElementById('pwSaved');
  var copyBtn = document.getElementById('pwCopy');

  titleEl.textContent = lessonTitle;

  var STORE_KEY = 'pw-progress-' + lessonId;
  var NOTES_KEY = 'pw-notes-' + lessonId;
  var DONE_KEY = 'pw-done-' + lessonId;
  var VOL_KEY = 'pw-vol-' + lessonId;

  var maxWatched = 0;
  var lastWatched = 0;
  var lastValid = 0;
  var dragging = false;
  var volDragging = false;
  var notesTimer = null;
  var skipTimer = null;

  var speeds = [1, 1.25, 1.5, 1.75, 2];
  var speedIdx = 0;

  function loadJSON(key) {
    try {
      var raw = localStorage.getItem(key);
      return raw ? JSON.parse(raw) : null;
    } catch (e) {
      return null;
    }
  }

  function saveJSON(key, value) {
    try {
      localStorage.setItem(key, JSON.stringify(value));
    } catch (e) {}
  }

  function getDone() {
    try {
      return localStorage.getItem(DONE_KEY) === 'true';
    } catch (e) {
      return false;
    }
  }

  function setDone(v) {
    try {
      localStorage.setItem(DONE_KEY, v ? 'true' : 'false');
    } catch (e) {}
  }

  function fmt(sec) {
    if (!isFinite(sec) || sec < 0) return '0:00';
    var m = Math.floor(sec / 60);
    var s = Math.floor(sec % 60);
    return m + ':' + (s < 10 ? '0' : '') + s;
  }

  function showSkipWarn() {
    skipWarn.style.display = 'block';
    clearTimeout(skipTimer);
    skipTimer = setTimeout(function () {
      skipWarn.style.display = 'none';
    }, 2500);
  }

  function saveProgress() {
    var duration = video.duration || 0;
    var percent = duration > 0 ? (video.currentTime / duration) * 100 : 0;

    saveJSON(STORE_KEY, {
      lastWatched: video.currentTime || 0,
      maxWatched: maxWatched || 0,
      duration: duration,
      percent: percent,
      updatedAt: new Date().toISOString()
    });
  }

  function updateMeta() {
    lastWatchedEl.textContent = 'Last watched: ' + fmt(lastWatched);
    maxWatchedEl.textContent = 'Max watched: ' + fmt(maxWatched);
  }

  function updatePlayUI(isPlaying) {
    if (isPlaying) {
      playIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
      playLabel.textContent = 'Pause';
      bigPlay.classList.add('hidden');
    } else {
      playIcon.innerHTML = '<polygon points="8,5 19,12 8,19"/>';
      playLabel.textContent = 'Play';
      bigPlay.classList.remove('hidden');
    }
  }

  function updateProgressUI() {
    var duration = video.duration || 0;
    var current = video.currentTime || 0;
    var pct = duration > 0 ? (current / duration) * 100 : 0;
    var maxPct = duration > 0 ? Math.min((maxWatched / duration) * 100, 100) : 0;

    fill.style.width = pct + '%';
    knob.style.left = pct + '%';
    timeCur.textContent = fmt(current);
    timeTotal.textContent = fmt(duration);

    if (getDone()) {
      blocked.style.display = 'none';
    } else {
      blocked.style.display = 'block';
      blocked.style.left = maxPct + '%';
    }

    if (!getDone() && pct >= requiredPercent) {
      setDone(true);
      blocked.style.display = 'none';
    }

    updateMeta();
  }

  function togglePlay() {
    if (video.paused) {
      video.play();
    } else {
      video.pause();
    }
  }

  function seekToClientX(clientX) {
    var rect = track.getBoundingClientRect();
    var pct = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
    var target = pct * (video.duration || 0);

    if (!getDone() && target > maxWatched + 2) {
      showSkipWarn();
      return;
    }

    video.currentTime = target;
    updateProgressUI();
  }

  function updateVolume(clientY) {
    var rect = volTrack.getBoundingClientRect();
    var pct = Math.max(0, Math.min(100, ((rect.bottom - clientY) / rect.height) * 100));
    var vol = Math.round(pct);

    video.volume = vol / 100;
    try { localStorage.setItem(VOL_KEY, String(vol)); } catch (e) {}

    volFill.style.height = vol + '%';
    volLabel.textContent = vol + '%';

    if (vol === 0) {
      speakerIcon.innerHTML = '<path d="M16.5 12A4.5 4.5 0 0 0 14 7.97v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51A8.8 8.8 0 0 0 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06a8.99 8.99 0 0 0 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>';
    } else {
      speakerIcon.innerHTML = '<path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-3.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>';
    }
  }

  if (!videoSrc) {
    titleEl.textContent = 'Missing video source';
  } else {
    video.src = videoSrc;
  }

  var savedProgress = loadJSON(STORE_KEY);
  if (savedProgress) {
    maxWatched = typeof savedProgress.maxWatched === 'number' ? savedProgress.maxWatched : 0;
    lastWatched = typeof savedProgress.lastWatched === 'number' ? savedProgress.lastWatched : 0;
  }

  try {
    var savedNotes = localStorage.getItem(NOTES_KEY);
    if (savedNotes) notesArea.value = savedNotes;
  } catch (e) {}

  try {
    var savedVol = parseInt(localStorage.getItem(VOL_KEY) || '70', 10);
    if (!isNaN(savedVol)) {
      video.volume = Math.max(0, Math.min(1, savedVol / 100));
      volFill.style.height = savedVol + '%';
      volLabel.textContent = savedVol + '%';
      if (savedVol === 0) {
        speakerIcon.innerHTML = '<path d="M16.5 12A4.5 4.5 0 0 0 14 7.97v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51A8.8 8.8 0 0 0 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06a8.99 8.99 0 0 0 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>';
      }
    }
  } catch (e) {
    video.volume = 0.7;
    volFill.style.height = '70%';
    volLabel.textContent = '70%';
  }

  updateMeta();
  updatePlayUI(false);
  updateProgressUI();

  video.addEventListener('loadedmetadata', function () {
    timeTotal.textContent = fmt(video.duration);

    if (savedProgress && savedProgress.lastWatched > 0 && !getDone()) {
      video.currentTime = Math.min(savedProgress.lastWatched, Math.max((video.duration || 0) - 2, 0));
    }

    updateProgressUI();
  });

  video.addEventListener('timeupdate', function () {
    var cur = video.currentTime || 0;

    if (!getDone() && cur > lastValid + 3 && cur > maxWatched + 2) {
      video.currentTime = maxWatched;
      showSkipWarn();
      return;
    }

    if (cur > maxWatched) {
      maxWatched = cur;
    }

    lastWatched = cur;
    lastValid = cur;

    saveProgress();
    updateProgressUI();
  });

  video.addEventListener('play', function () {
    updatePlayUI(true);
  });

  video.addEventListener('pause', function () {
    updatePlayUI(false);
    saveProgress();
  });

  video.addEventListener('ended', function () {
    maxWatched = video.duration || maxWatched;
    lastWatched = video.duration || lastWatched;
    setDone(true);
    saveProgress();
    updateProgressUI();
    updatePlayUI(false);
  });

  bigPlay.addEventListener('click', function (e) {
    e.stopPropagation();
    togglePlay();
  });

  overlay.addEventListener('click', function () {
    togglePlay();
  });

  playBtn.addEventListener('click', togglePlay);

  backBtn.addEventListener('click', function () {
    video.currentTime = Math.max(0, (video.currentTime || 0) - 15);
  });

  forwardBtn.addEventListener('click', function () {
    var target = (video.currentTime || 0) + 15;

    if (!getDone() && target > maxWatched + 2) {
      showSkipWarn();
      return;
    }

    video.currentTime = Math.min(video.duration || 0, target);
  });

  speedBtn.addEventListener('click', function () {
    speedIdx = (speedIdx + 1) % speeds.length;
    video.playbackRate = speeds[speedIdx];
    speedLabel.textContent = speeds[speedIdx] + '×';
  });

  track.addEventListener('pointerdown', function (e) {
    dragging = true;
    seekToClientX(e.clientX);
  });

  document.addEventListener('pointermove', function (e) {
    if (dragging) seekToClientX(e.clientX);
    if (volDragging) updateVolume(e.clientY);
  });

  document.addEventListener('pointerup', function () {
    dragging = false;
    volDragging = false;
  });

  volTrack.addEventListener('pointerdown', function (e) {
    volDragging = true;
    updateVolume(e.clientY);
  });

  notesArea.addEventListener('input', function () {
    clearTimeout(notesTimer);
    notesTimer = setTimeout(function () {
      try {
        localStorage.setItem(NOTES_KEY, notesArea.value);
      } catch (e) {}

      savedEl.classList.add('show');
      setTimeout(function () {
        savedEl.classList.remove('show');
      }, 1500);
    }, 500);
  });

  copyBtn.addEventListener('click', function () {
    var text = notesArea.value;
    if (!text) return;

    var btn = this;
    var original = btn.innerHTML;
    var success = '<svg viewBox="0 0 24 24" style="width:11px;height:11px;fill:currentColor;"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>Copied!';

    function flashCopied() {
      btn.classList.add('copied');
      btn.innerHTML = success;
      setTimeout(function () {
        btn.classList.remove('copied');
        btn.innerHTML = original;
      }, 1800);
    }

    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(flashCopied);
    } else {
      notesArea.select();
      document.execCommand('copy');
      flashCopied();
    }
  });

  document.querySelectorAll('.pw-key').forEach(function (btn) {
    btn.addEventListener('pointerdown', function () {
      btn.classList.add('pressed');
    });
    btn.addEventListener('pointerup', function () {
      btn.classList.remove('pressed');
    });
    btn.addEventListener('pointerleave', function () {
      btn.classList.remove('pressed');
    });
  });
})();
</script>

</body>
</html>

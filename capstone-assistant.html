// APP STATE
// ══════════════════════════════════════════
let courseId=null, mode='build', docIdx=0, secIdx=0;
let answers={};

function storageKey(){return 'pathway_'+COURSES[courseId].key+'_answers'}
function loadAnswers(){try{answers=JSON.parse(localStorage.getItem(storageKey()))||{}}catch(e){answers={}}}
function saveAnswers(){localStorage.setItem(storageKey(),JSON.stringify(answers))}
function getAnswer(id){return answers[id]||''}
function setAnswer(id,v){answers[id]=v;saveAnswers();updateSidebar();updateStatus()}

function getCourse(){return COURSES[courseId]}
function getDocs(){return getCourse().docs}
function getCurrentDoc(){return getDocs()[docIdx]}
function getCurrentSec(){return getCurrentDoc().secs[secIdx]}
function allSections(){const a=[];getDocs().forEach(d=>d.secs.forEach(s=>a.push({...s,docId:d.id})));return a}
function sectionState(sid){const v=(answers[sid]||'').trim();if(!v)return'empty';const wc=v.split(/\s+/).length;return wc>=20?'done':'partial'}
function totalProgress(){const all=allSections();const done=all.filter(s=>sectionState(s.id)==='done').length;return{done,total:all.length}}

function navigate(dIdx,sIdx){
  docIdx=dIdx;secIdx=sIdx;
  renderMode();
  document.querySelector('.main-panel')&&(document.querySelector('.main-panel').scrollTop=0);
}

// ══════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════
function renderApp(){
  const p=new URLSearchParams(window.location.search);
  const cid=parseInt(p.get('course'));
  const secsParam=p.get('secs'); // e.g. "calling,win,pathway"
  const compile=p.get('view')==='compile';
  if(cid&&COURSES[cid]){
    courseId=cid;loadAnswers();
    if(secsParam){renderMini(secsParam.split(',').map(s=>s.trim()).filter(Boolean))}
    else if(compile){renderMain();setMode('download')}
    else renderMain();
  } else renderSelector();
}

// ── MINI WIDGET (per-section embed) ────────────────────────────
function findSec(id){
  for(const doc of getDocs()){const s=doc.secs.find(x=>x.id===id);if(s) return{sec:s,doc}}
  return null;
}

function renderMini(secIds){
  const c=getCourse();
  const found=secIds.map(id=>findSec(id)).filter(Boolean);
  if(!found.length){document.getElementById('app').innerHTML=`<p style="padding:16px;color:red">Section not found: ${secIds.join(',')}</p>`;return;}

  let html=`<div class="mini-wrap">
  <div class="mini-header outset">
    <div class="tbar"><span class="tbar-txt">📘 ${c.title} — Capstone Builder</span>
    <button class="tbtn2" style="width:26px;height:22px;font-size:12px" onclick="toggleDark()" id="darkBtn">🌙</button></div>
  </div>`;

  found.forEach(({sec,doc},i)=>{
    html+=`<div class="mini-card outset" id="miniCard_${sec.id}">
    <div class="mini-card-hdr">
      <span class="mini-doc-badge">${doc.num}</span>
      <span class="mini-sec-title">${sec.title}</span>
      <span class="mini-wc-chip" id="mwc_${sec.id}">0 wds</span>
    </div>
    <div class="mini-trigger">⏰ <em>${sec.trigger}</em></div>
    <div class="mini-desc">${sec.desc.replace(/\n/g,'<br>')}</div>
    <div class="mini-field-lbl">✍️ Your Notes First <span class="req-badge">THINK FIRST</span></div>
    <textarea class="mini-ta" id="mta_${sec.id}" rows="6" placeholder="${sec.ph}">${esc(getAnswer(sec.id))}</textarea>
    <div class="mini-wc-row">
      <span id="mwclbl_${sec.id}">0 words</span>
      <div class="wc-bar-outer" style="flex:1;margin:0 8px"><div class="wc-bar-inner" id="mwcbar_${sec.id}" style="width:0%"></div></div>
      <span style="color:var(--muted)">~${sec.wt} target</span>
    </div>
    ${!sec.noAI?`<div class="ai-block outset" style="margin-top:8px">
      <div class="ai-hdr" onclick="toggleAI(this)">🤖 Thinking Partner Prompt <span style="font-size:10px;font-weight:normal">(use AFTER writing above) ▼</span></div>
      <div class="ai-body">
        <div class="ai-ethics-note"><strong>Write your own notes first.</strong> Use this prompt to test and deepen your thinking — not to generate content from scratch.</div>
        <div class="ai-prompt-box">${esc(sec.ai)}</div>
        <button class="copy-btn" onclick="copyPrompt('mta_${sec.id}',this)">📋 Copy Prompt</button>
      </div>
    </div>`:`<div class="ai-block outset" style="margin-top:8px"><div class="ai-hdr">🚫 No AI Prompt — This section must come entirely from you</div></div>`}
    </div>`;
  });

  const prog=totalProgress();
  html+=`<div class="mini-footer outset">
    <span>💾 Auto-saved · ${prog.done}/${prog.total} sections complete across this course</span>
    <span class="mini-footer-hint">Complete all sections → go to <strong>Final Capstone</strong> to download</span>
  </div></div>`;

  document.getElementById('app').innerHTML=html;

  // Wire up each textarea
  found.forEach(({sec})=>{
    const ta=document.getElementById('mta_'+sec.id);
    if(ta){
      miniUpdateWC(sec.id,ta.value);
      ta.addEventListener('input',e=>{
        setAnswer(sec.id,e.target.value);
        miniUpdateWC(sec.id,e.target.value);
        // update footer progress
        const p=totalProgress();
        const ft=document.querySelector('.mini-footer span');
        if(ft) ft.textContent=`💾 Auto-saved · ${p.done}/${p.total} sections complete across this course`;
      });
    }
  });
}

function miniUpdateWC(id,v){
  const w=(!v||v.trim()==='')?0:v.trim().split(/\s+/).length;
  const sec=findSec(id);
  const target=sec?sec.sec.wt:100;
  const lbl=document.getElementById('mwclbl_'+id);
  const bar=document.getElementById('mwcbar_'+id);
  const chip=document.getElementById('mwc_'+id);
  if(lbl) lbl.textContent=w+' word'+(w!==1?'s':'');
  if(bar) bar.style.width=Math.min(100,Math.round(w/target*100))+'%';
  if(chip){chip.textContent=w+' wds';chip.style.color=w>=target?'#2e7d32':w>0?'var(--blue-lt)':'var(--muted)'}
}

function copyPrompt(taId,btn){
  const box=btn.parentElement.querySelector('.ai-prompt-box');
  if(box){navigator.clipboard.writeText(box.textContent).then(()=>{btn.textContent='✅ Copied!';setTimeout(()=>btn.textContent='📋 Copy Prompt',2000)});}
}

function buildSidebarHTML(prefix){
  let html='';
  getDocs().forEach((doc,di)=>{
    const docDone=doc.secs.filter(s=>sectionState(s.id)==='done').length;
    html+=`<div class="doc-group">
      <div class="doc-hdr" onclick="toggleDocSecs('${prefix}',${di})">
        <span>${doc.num}: ${doc.title}</span>
        <span style="font-size:9px;font-weight:normal;color:var(--muted)">${docDone}/${doc.secs.length}</span>
      </div>
      <div id="${prefix}DocSecs_${di}">`;
    doc.secs.forEach((sec,si)=>{
      const st=sectionState(sec.id);
      const active=(di===docIdx&&si===secIdx&&(mode==='build'||mode==='guide'));
      html+=`<div class="sec-item ${active?'active':''}" onclick="navigate(${di},${si});setMode(mode==='guide'?'guide':'build');closeMobileSidebar()">
        <div class="sec-dot ${st}"></div>
        <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${sec.title}</span>
      </div>`;
    });
    html+='</div></div>';
  });
  return html;
}

function updateSidebar(){
  if(!courseId) return;
  const prog=totalProgress();
  // Desktop sidebar
  const sbp=document.getElementById('sbProg');
  if(sbp) sbp.textContent=prog.done+'/'+prog.total;
  const sb=document.getElementById('sbScroll');
  if(sb) sb.innerHTML=buildSidebarHTML('sb');
  // Mobile drawer
  const dp=document.getElementById('drawerProg');
  if(dp) dp.textContent=prog.done+'/'+prog.total;
  const dr=document.getElementById('drawerScroll');
  if(dr) dr.innerHTML=buildSidebarHTML('dr');
  // Mobile top nav labels
  const sec=getCurrentSec(),doc=getCurrentDoc();
  const ml=document.getElementById('mobileDocLabel');
  const mt=document.getElementById('mobileSectionTitle');
  const mp=document.getElementById('mobileProg');
  if(ml) ml.textContent=doc.num;
  if(mt) mt.textContent=sec.title;
  if(mp) mp.textContent=prog.done+'/'+prog.total;
}

function toggleDocSecs(prefix,di){
  const el=document.getElementById(prefix+'DocSecs_'+di);
  if(el) el.style.display=el.style.display==='none'?'':'none';
}

function openMobileSidebar(){
  document.getElementById('sbOverlay').classList.add('open');
  document.getElementById('sbDrawer').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeMobileSidebar(){
  document.getElementById('sbOverlay').classList.remove('open');
  document.getElementById('sbDrawer').classList.remove('open');
  document.body.style.overflow='';
}

function toggleDoc(di){
  const el=document.getElementById('docSecs_'+di);
  if(el) el.style.display=el.style.display==='none'?'':'none';
}

function setMode(m){mode=m;renderMode();updateSidebar()}

function renderMode(){
  const mc=document.getElementById('mainContent');
  if(!mc) return;
  document.querySelectorAll('.mbtn').forEach((b,i)=>{
    const modes=['guide','build','preview','download'];
    b.classList.toggle('active',modes[i]===mode);
  });
  if(mode==='build') mc.innerHTML=renderBuild();
  else if(mode==='guide') mc.innerHTML=renderGuide();
  else if(mode==='preview') mc.innerHTML=renderPreview();
  else if(mode==='download') mc.innerHTML=renderDownload();
  if(mode==='build'){
    const ta=document.getElementById('secTA');
    if(ta) ta.addEventListener('input',e=>{setAnswer(getCurrentSec().id,e.target.value);updateWC(e.target.value,getCurrentSec().wt)});
  }
  updateStatus();
}

function renderBuild(){
  const doc=getCurrentDoc(), sec=getCurrentSec();
  const val=getAnswer(sec.id);
  let html=`<div class="build-wrap">`;
  if(doc.interviewReq&&sec.interviewReq){
    html+=`<div class="interview-req"><strong>⚠️ Interview Required</strong> — Before completing this section, you must interview a district official (Secretary, DYD, or Sectional Presbyter). Minimum 15–20 minutes. Schedule early in the course.</div>`;
  }
  if(doc.spreadsheetNote){
    html+=`<div class="spreadsheet-note"><strong>📊 Spreadsheet Note</strong> — Doc 7 includes a working .xlsx spreadsheet as a separate deliverable. Use this tool to draft your narrative content. The spreadsheet with formulas and real dollar amounts is submitted alongside these notes.</div>`;
  }
  html+=`<div class="sec-badge">${doc.num} › Section ${secIdx+1}</div>
  <div class="sec-title">${sec.title}</div>
  <div class="trigger-box">⏰ <em>${sec.trigger}</em></div>
  <div class="sec-desc">${sec.desc.replace(/\n/g,'<br>')}</div>
  <div class="field-label">✍️ Your Notes First <span class="req-badge">THINK FIRST</span></div>

  <div class="wc-row">
    <span id="wcLabel">0 words</span>
    <div class="wc-bar-outer"><div class="wc-bar-inner" id="wcBar" style="width:0%"></div></div>
    <span style="color:var(--muted)">target: ~${sec.wt}</span>
  </div>`;

  if(!sec.noAI){
    html+=`<div class="ai-block outset">
      <div class="ai-hdr" onclick="toggleAI(this)">
        🤖 Thinking Partner Prompt <span style="font-size:10px;font-weight:normal">(use AFTER writing above) ▼</span>
      </div>
      <div class="ai-body" id="aiBody">
        <div class="ai-ethics-note"><strong>Ethical use:</strong> Write your own notes first. Use this prompt to test and deepen your thinking — not to generate content from scratch. AI cannot know your story, your community, or your convictions.</div>
        <div class="ai-prompt-box">${esc(sec.ai)}</div>
        <button class="copy-btn" onclick="copyAI()">📋 Copy Prompt</button>
      </div>
    </div>`;
  } else {
    html+=`<div class="ai-block outset">
      <div class="ai-hdr">🚫 No AI Prompt for This Section</div>
      <div class="ai-body open" style="display:block">
        <div class="ai-ethics-note"><strong>This section must come entirely from you.</strong> ${sec.ai||'No AI prompt available for this section.'}</div>
      </div>
    </div>`;
  }

  // Navigation
  const allSecs=allSections();
  const flatIdx=allSecs.findIndex(s=>s.id===sec.id);
  const prevSec=flatIdx>0?allSecs[flatIdx-1]:null;
  const nextSec=flatIdx<allSecs.length-1?allSecs[flatIdx+1]:null;
  let prevDocIdx=docIdx,prevSecIdx=secIdx-1;
  if(prevSecIdx<0){if(docIdx>0){prevDocIdx=docIdx-1;prevSecIdx=getDocs()[prevDocIdx].secs.length-1}}
  let nextDocIdx=docIdx,nextSecIdx=secIdx+1;
  if(nextSecIdx>=getCurrentDoc().secs.length){nextDocIdx=docIdx+1;nextSecIdx=0}

  html+=`<div class="nav-row">

    <button class="win-btn primary" onclick="${nextSec?`navigate(${nextDocIdx},${nextSecIdx})`:`setMode('preview')`}">${nextSec?'Next ›':'👁️ Preview'}</button>
  </div>`;
  html+='</div>';

  setTimeout(()=>{
    const ta=document.getElementById('secTA');
    if(ta){ta.addEventListener('input',e=>{setAnswer(sec.id,e.target.value);updateWC(e.target.value,sec.wt)});updateWC(getAnswer(sec.id),sec.wt)}
  },0);
  return html;
}

  let html=`<div class="guide-wrap">
  <h2>${sec.title}</h2>
  <div style="font-size:10px;color:var(--muted);margin-bottom:8px;font-style:italic">⏰ ${sec.trigger}</div>`;
  if(g.what) html+=`<p>${g.what}</p>`;
  if(g.qs&&g.qs.length){
    html+=`<div class="kq-box"><strong>🔑 Ask Yourself:</strong><ul>${g.qs.map(q=>`<li>${q}</li>`).join('')}</ul></div>`;
  }
  if(g.strong){
    html+=`<div class="ex-box good"><div class="ex-label">✅ STRONG</div>${g.strong}${g.sNote?`<div class="ex-note">💡 ${g.sNote}</div>`:''}`;
    html+=`</div>`;
  }
  if(g.weak){
    html+=`<div class="ex-box bad"><div class="ex-label">❌ WEAK</div>${g.weak}${g.wNote?`<div class="ex-note">💡 ${g.wNote}</div>`:''}`;
    html+=`</div>`;
  }
  html+=`<h3>Format</h3><p style="font-size:10px;color:var(--muted)">${doc.format}</p>`;
  html+=`<div style="margin-top:12px"><button class="win-btn primary" onclick="setMode('build')">✍️ Write This Section</button></div>`;
  html+='</div>';
  return html;
}

function renderPreview(){
  const c=getCourse();
  let html=`<div class="preview-wrap">`;
  getDocs().forEach((doc,di)=>{
    if(doc.id.startsWith('dx')&&di>0) html+=`<div style="margin-top:8px"></div>`;
    html+=`<div class="page">
    <div class="page-title">${doc.title}</div>
    <div class="page-sub">${c.title} — ${doc.desc}</div>
    <div class="page-meta">Pathway Ministry Institute · Northern California & Nevada District · Assemblies of God</div>
    <hr>`;
    doc.secs.forEach(sec=>{
      const val=(answers[sec.id]||'').trim();
      html+=`<div class="page-sh">${sec.title}</div>`;
      html+=val?`<p class="page-body">${esc(val).replace(/\n/g,'<br>')}</p>`:`<p class="page-empty">[Complete this section in Build mode]</p>`;
    });
    const wc=doc.secs.reduce((t,s)=>{const v=(answers[s.id]||'').trim();return t+(v?v.split(/\s+/).length:0)},0);
    html+=`<div class="page-num">Word count: ${wc} | ${doc.num}: ${doc.title}</div></div>`;
  });
  html+='</div>';
  return html;
}

function renderDownload(){
  const c=getCourse();
  const prog=totalProgress();
  return`<div class="dl-wrap">
  <h2 style="font-family:'VT323',monospace;font-size:16px;color:var(--blue);margin-bottom:8px">Download Your Draft</h2>
  <p style="font-size:11px;color:var(--muted);margin-bottom:10px">Sections complete: <strong>${prog.done}/${prog.total}</strong></p>
  ${c.docs.filter(d=>!d.id.startsWith('dx')).map((doc,i)=>`
  <button class="dl-btn" onclick="dlDoc(${i})">
    <div class="dl-icon">💾</div>
    <div class="dl-info"><strong>Download ${doc.num}: ${doc.title}</strong><span>${doc.desc} · ${doc.format}</span></div>
  </button>`).join('')}
  <button class="dl-btn" onclick="dlAll()" style="margin-top:4px">
    <div class="dl-icon">📦</div>
    <div class="dl-info"><strong>Download All Documents</strong><span>Complete capstone package as one .docx file</span></div>
  </button>
  <div class="steps-box">
    <h3>📋 Next Steps After Downloading</h3>
    <ol>
      <li><strong>Open in Word or Google Docs</strong> — your draft is a starting point, not a finished paper.</li>
      <li><strong>Rewrite into polished paragraphs</strong> — turn raw notes into connected, flowing prose that sounds like you.</li>
      <li><strong>Voice check:</strong> read every paragraph aloud. If it doesn't sound like how you actually talk, rewrite it.</li>
      <li><strong>Check format:</strong> ${c.id===1?'Doc 1: paragraph form, 1–2 pages, double-spaced, 12pt TNR. Doc 2: structured outline/table.':c.id===2?'Doc 3: 2 pages with district interview notes attached. Doc 4: 2 pages. Doc 5: 1 page.':'Doc 6: 2 pages + appended templates. Doc 7: narrative + .xlsx spreadsheet. Doc 8: 3 pages.'}</li>
      <li><strong>Complete peer/pastor review</strong> as required by your instructor.</li>
      <li><strong>Submit in Talent LMS</strong> using the upload button in your course — NOT back to this tool.</li>
    </ol>
  </div>
  <div class="remind-card">
    <div class="remind-tbar">⚠️ Submit in Talent LMS — Not Here</div>
    <div class="remind-body">
      <div class="remind-icon">📤</div>
      <div class="remind-txt"><strong>Upload your final edited version to Talent LMS</strong>
      <p>This tool helps you collect and draft your ideas. After downloading and editing your final document in Word or Google Docs, submit it using the assignment upload button in your Talent LMS course. Your instructor will grade it there.</p></div>
    </div>
  </div>
  </div>`;
}

// ══════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════
function esc(t){return(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function toggleAI(hdr){const b=hdr.nextElementSibling;b.classList.toggle('open')}
function copyAI(){const box=document.querySelector('.ai-prompt-box');if(box){navigator.clipboard.writeText(box.textContent).then(()=>{const btn=document.querySelector('.copy-btn');if(btn){btn.textContent='✅ Copied!';setTimeout(()=>btn.textContent='📋 Copy Prompt',2000)}})}}
function updateWC(v,target){
  const w=(v||'').trim()===''?0:(v||'').trim().split(/\s+/).length;
  const wcl=document.getElementById('wcLabel');
  const wcb=document.getElementById('wcBar');
  if(wcl) wcl.textContent=w+' word'+(w!==1?'s':'');
  if(wcb) wcb.style.width=Math.min(100,Math.round(w/(target||100)*100))+'%';
}
function updateStatus(){
  const sl=document.getElementById('stLeft'),sr=document.getElementById('stRight');
  if(!sl||!courseId) return;
  const sec=getCurrentSec();
  sl.textContent=(mode==='build'||mode==='guide')?sec.title:'Mode: '+mode;
  const allWC=allSections().reduce((t,s)=>{const v=(answers[s.id]||'').trim();return t+(v?v.split(/\s+/).length:0)},0);
  if(sr) sr.textContent=allWC+' wds total';
}
function toggleDark(){
  const h=document.documentElement;
  const d=h.getAttribute('data-theme')==='dark';
  h.setAttribute('data-theme',d?'light':'dark');
  const btn=document.getElementById('darkBtn');
  if(btn){btn.textContent=d?'🌙':'☀️';btn.classList.toggle('on',!d)}
}

// ══════════════════════════════════════════
// DOCX GENERATION
// ══════════════════════════════════════════
function buildDocx(docs){
  const D=docx,ch=[];
  const c=getCourse();
  ch.push(new D.Paragraph({alignment:D.AlignmentType.CENTER,spacing:{after:60},children:[new D.TextRun({text:c.title,bold:true,size:32,font:'Times New Roman'})]}));
  ch.push(new D.Paragraph({alignment:D.AlignmentType.CENTER,spacing:{after:40},children:[new D.TextRun({text:c.subtitle,size:24,font:'Times New Roman',color:'444444'})]}));
  ch.push(new D.Paragraph({alignment:D.AlignmentType.CENTER,spacing:{after:40},children:[new D.TextRun({text:c.tagline,size:20,font:'Times New Roman',color:'888888',italics:true})]}));
  ch.push(new D.Paragraph({alignment:D.AlignmentType.CENTER,spacing:{after:200},children:[new D.TextRun({text:'Pathway Ministry Institute · Northern California & Nevada District · Assemblies of God',size:18,font:'Times New Roman',color:'888888'})]}));
  ch.push(new D.Paragraph({spacing:{after:240},border:{bottom:{style:'single',size:6,color:'CCCCCC',space:1}},children:[]}));

  docs.forEach((doc,di)=>{
    if(di>0) ch.push(new D.Paragraph({pageBreakBefore:true,children:[new D.TextRun({text:''})]}));
    ch.push(new D.Paragraph({spacing:{before:200,after:80},children:[new D.TextRun({text:`${doc.num}: ${doc.title}`,bold:true,size:28,font:'Times New Roman'})]}));
    ch.push(new D.Paragraph({spacing:{after:200},border:{bottom:{style:'single',size:4,color:'CCCCCC',space:1}},children:[new D.TextRun({text:doc.desc+' · '+doc.format,size:18,font:'Times New Roman',color:'888888',italics:true})]}));
    doc.secs.forEach(sec=>{
      const val=(answers[sec.id]||'').trim();
      ch.push(new D.Paragraph({spacing:{before:240,after:80},children:[new D.TextRun({text:sec.title,bold:true,size:24,font:'Times New Roman'})]}));
      if(val){
        val.split(/\n\n+/).forEach((p,pi)=>{const t=p.trim();if(t) ch.push(new D.Paragraph({spacing:{line:480},indent:pi>0?{firstLine:720}:undefined,children:[new D.TextRun({text:t,size:24,font:'Times New Roman'})]}))});
      } else {
        ch.push(new D.Paragraph({spacing:{line:480},children:[new D.TextRun({text:'[Complete this section]',size:24,font:'Times New Roman',color:'BBBBBB',italics:true})]}));
      }
    });
  });

  return new D.Document({sections:[{properties:{page:{size:{width:12240,height:15840},margin:{top:1440,right:1440,bottom:1440,left:1440}}},children:ch}]});
}

function dlDoc(docIdx){
  const doc=getDocs()[docIdx];
  const wc=doc.secs.reduce((t,s)=>{const v=(answers[s.id]||'').trim();return t+(v?v.split(/\s+/).length:0)},0);
  if(wc===0){alert('Complete some sections first.');return}
  const d=buildDocx([doc]);
  docx.Packer.toBlob(d).then(b=>saveAs(b,`Pathway_${getCourse().key}_${doc.id}.docx`)).catch(e=>{console.error(e);alert('Download error. Try again.')});
}

function dlAll(){
  const prog=totalProgress();
  if(prog.done===0){alert('Complete some sections first.');return}
  const d=buildDocx(getDocs());
  docx.Packer.toBlob(d).then(b=>saveAs(b,`Pathway_${getCourse().key}_Capstone_All.docx`)).catch(e=>{console.error(e);alert('Download error. Try again.')});
}

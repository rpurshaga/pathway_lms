<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Pathway Capstone Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/docx/8.5.0/docx.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#008080;--silver:#c0c0c0;--dark:#808080;--white:#dfdfdf;--black:#000;
--blue:#000080;--blue-lt:#1084d0;--hi:#0a246a;--bd:#404040;--inset:#808080;
--cbg:#fff;--txt:#000;--muted:#555;--hint:#777;
--note:#fffde8;--noteb:#cca;--good:#e8f5e8;--bad:#fdecea;
--tbar1:#000080;--tbar2:#1084d0;--wiz1:#000080;--wiz2:#000050;
--rem1:#cc6600;--rem2:#ff9933;--sl:#2e7d32;--wl:#c62828;
--inp:#fff;--scr:#e8e8e8;--req:#f5f5f5;--reqb:#ddd;
}
body{background:transparent;font-family:'Segoe UI',Tahoma,sans-serif;font-size:11px;color:var(--txt);min-height:100vh;display:flex;justify-content:center;align-items:flex-start;padding:6px}
.app{width:820px;max-width:100%}
.outset{border:2px solid;border-color:var(--white) var(--bd) var(--bd) var(--white);box-shadow:1px 1px 0 var(--black)}
.inset{border:2px solid;border-color:var(--inset) var(--white) var(--white) var(--inset)}
.tbar{background:linear-gradient(90deg,var(--tbar1),var(--tbar2));padding:3px 5px;display:flex;align-items:center;justify-content:space-between;user-select:none}
.tbar-txt{color:#fff;font-size:11px;font-weight:bold;display:flex;align-items:center;gap:5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tbar-btns{display:flex;gap:2px;flex-shrink:0}
.tbtn{width:16px;height:14px;background:var(--silver);border:1px solid;border-color:var(--white) var(--bd) var(--bd) var(--white);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:9px;font-weight:bold}
.win-btn{min-width:62px;height:23px;background:var(--silver);border:2px solid;border-color:var(--white) var(--bd) var(--bd) var(--white);font-family:inherit;font-size:11px;cursor:pointer;padding:0 8px;color:var(--txt)}
.win-btn:active,.win-btn.active{border-color:var(--bd) var(--white) var(--white) var(--bd)}
.win-btn.primary{font-weight:bold}
.win-btn:disabled{opacity:.4;cursor:not-allowed}
.util{display:flex;gap:4px;margin-bottom:4px;flex-wrap:wrap}
.modebar{background:var(--silver);padding:3px;display:flex;gap:3px;border:2px solid;border-color:var(--white) var(--bd) var(--bd) var(--white);flex:1}
.mbtn{height:26px;background:var(--silver);border:2px solid;border-color:var(--white) var(--bd) var(--bd) var(--white);font-family:inherit;font-size:11px;cursor:pointer;padding:0 8px;display:flex;align-items:center;gap:4px;flex:1;justify-content:center;white-space:nowrap;color:var(--txt)}
.mbtn.active{border-color:var(--bd) var(--white) var(--white) var(--bd);background:#acacac;font-weight:bold}
.toolbar{background:var(--silver);padding:3px;display:flex;gap:3px;border:2px solid;border-color:var(--white) var(--bd) var(--bd) var(--white);flex-shrink:0}
.tbtn2{width:26px;height:26px;background:var(--silver);border:2px solid;border-color:var(--white) var(--bd) var(--bd) var(--white);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px}
.tbtn2:active,.tbtn2.on{border-color:var(--bd) var(--white) var(--white) var(--bd)}
.panel{display:none;background:var(--silver)}.panel.vis{display:block}
.statusbar{background:var(--silver);border-top:1px solid var(--dark);padding:2px 4px;display:flex;font-size:10px;color:var(--txt)}
.ss{border:1px solid;border-color:var(--inset) var(--white) var(--white) var(--inset);padding:1px 5px;flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.ss.sm{flex:0 0 auto;min-width:50px;text-align:center}
/* --- BODY LAYOUT --- */
.body-wrap{display:flex;min-height:480px}
/* --- SIDEBAR --- */
.sidebar{width:172px;min-width:172px;background:var(--cbg);border-right:2px solid var(--dark);display:flex;flex-direction:column;overflow:hidden}
.sb-hdr{background:var(--silver);padding:3px 6px;font-size:10px;font-weight:bold;border-bottom:1px solid var(--dark);font-family:'VT323',monospace;color:var(--blue);display:flex;justify-content:space-between;align-items:center}
.sb-prog{font-size:9px;color:var(--muted);font-family:inherit}
.sb-scroll{flex:1;overflow-y:auto}
.doc-group{border-bottom:1px solid var(--reqb)}
.doc-hdr{background:var(--req);padding:4px 6px 3px;font-size:10px;font-weight:bold;font-family:'VT323',monospace;color:var(--blue);cursor:pointer;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--reqb)}
.doc-hdr:hover{background:#e8e8f8}
.sec-item{padding:3px 6px 3px 14px;cursor:pointer;font-size:10px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;gap:5px;color:var(--txt);transition:background .1s}
.sec-item:hover{background:var(--hi);color:#fff}
.sec-item.active{background:var(--blue);color:#fff;font-weight:bold}
.sec-dot{width:8px;height:8px;border-radius:50%;border:1px solid var(--muted);flex-shrink:0;background:transparent}
.sec-dot.partial{background:var(--blue-lt);border-color:var(--blue-lt)}
.sec-dot.done{background:#2e7d32;border-color:#2e7d32}
.sec-item.active .sec-dot{border-color:#fff;background:transparent}
.sec-item.active .sec-dot.done{background:#8f8}
.sb-ethics{margin:6px;padding:6px 7px;background:var(--note);border:1px solid var(--noteb);font-size:9px;line-height:1.5;color:var(--txt)}
.sb-ethics strong{font-family:'VT323',monospace;color:var(--blue);font-size:10px}
/* --- MAIN PANEL --- */
.main-panel{flex:1;overflow-y:auto;background:var(--cbg);min-height:480px}
/* BUILD */
.build-wrap{padding:12px 14px}
.sec-badge{display:inline-flex;align-items:center;gap:5px;background:var(--blue);color:#fff;padding:2px 7px;font-family:'VT323',monospace;font-size:12px;margin-bottom:6px}
.sec-title{font-family:'VT323',monospace;font-size:17px;color:var(--blue);margin-bottom:3px}
.trigger-box{background:var(--note);border:1px solid var(--noteb);padding:4px 8px;font-size:10px;color:var(--muted);margin-bottom:8px;display:flex;align-items:center;gap:4px}
.sec-desc{font-size:11px;line-height:1.6;margin-bottom:10px;color:var(--txt)}
.field-label{font-family:'VT323',monospace;font-size:12px;color:var(--blue);margin-bottom:3px;display:flex;align-items:center;gap:5px}
.field-label .req-badge{background:#c62828;color:#fff;font-size:8px;padding:1px 4px;font-family:inherit;border-radius:0}
textarea{width:100%;background:var(--inp);border:2px solid;border-color:var(--inset) var(--white) var(--white) var(--inset);font-family:inherit;font-size:11px;padding:6px;resize:none;line-height:1.5;color:var(--txt);overflow-y:hidden;min-height:52px;box-sizing:border-box}
textarea:focus{outline:none;box-shadow:inset 0 0 0 1px var(--blue)}
textarea::placeholder{color:var(--hint);font-style:italic}
.wc-row{display:flex;justify-content:space-between;align-items:center;margin-top:3px;margin-bottom:10px;font-size:10px;color:var(--muted)}
.wc-bar-outer{height:4px;background:var(--reqb);flex:1;margin:0 8px;border:1px solid var(--reqb)}
.wc-bar-inner{height:100%;background:var(--blue-lt);transition:width .3s;max-width:100%}
/* AI PROMPT */
.ai-block{border:2px solid;border-color:var(--white) var(--bd) var(--bd) var(--white);margin-bottom:10px}
.ai-hdr{background:var(--silver);padding:4px 8px;font-family:'VT323',monospace;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;color:var(--blue)}
.ai-hdr:hover{background:#b8b8c8}
.ai-body{padding:8px 10px;display:none;background:var(--cbg)}
.ai-body.open{display:block}
.ai-ethics-note{background:#fff3e0;border:1px solid #ffb74d;padding:5px 8px;font-size:10px;margin-bottom:7px;line-height:1.5}
.ai-ethics-note strong{color:#e65100}
.ai-prompt-box{background:var(--note);border:1px solid var(--noteb);padding:7px 9px;font-size:10.5px;line-height:1.6;white-space:pre-wrap;font-family:'Courier New',monospace;color:var(--txt);margin-bottom:6px}
.copy-btn{background:var(--silver);border:2px solid;border-color:var(--white) var(--bd) var(--bd) var(--white);cursor:pointer;padding:2px 10px;font-size:10px;font-family:inherit;color:var(--txt)}
.copy-btn:active{border-color:var(--bd) var(--white) var(--white) var(--bd)}
.nav-row{display:flex;justify-content:space-between;margin-top:8px}
/* GUIDE */
.guide-wrap{padding:12px 14px}
.guide-wrap h2{font-family:'VT323',monospace;font-size:17px;color:var(--blue);margin-bottom:5px;border-bottom:2px solid var(--blue);padding-bottom:3px}
.guide-wrap h3{font-family:'VT323',monospace;font-size:13px;color:var(--blue-lt);margin:10px 0 4px}
.guide-wrap p{font-size:11.5px;line-height:1.65;margin-bottom:8px}
.ex-box{padding:9px 11px;font-size:11px;line-height:1.7;border-left:4px solid;margin:6px 0}
.ex-box.good{background:var(--good);border-color:#4caf50}
.ex-box.bad{background:var(--bad);border-color:#e53935}
.ex-label{font-family:'VT323',monospace;font-size:12px;font-weight:bold;margin-bottom:3px}
.ex-box.good .ex-label{color:var(--sl)}
.ex-box.bad .ex-label{color:var(--wl)}
.ex-note{font-size:10px;color:var(--muted);font-style:italic;margin-top:4px}
.kq-box{background:var(--note);border:1px solid var(--noteb);padding:7px 9px;margin:7px 0;font-size:11px}
.kq-box strong{font-family:'VT323',monospace;color:var(--blue);font-size:12px}
.kq-box ul{margin:3px 0 0 16px;padding:0}
.kq-box li{margin-bottom:2px}
.checklist-item{display:flex;align-items:flex-start;gap:6px;padding:3px 0;font-size:11px}
.checklist-item input{margin-top:1px;flex-shrink:0}
/* PREVIEW */
.preview-wrap{padding:10px 14px;background:var(--dark);min-height:400px}
.page{background:var(--cbg);padding:26px 30px 22px;margin-bottom:10px;box-shadow:2px 2px 4px rgba(0,0,0,.3);position:relative}
.page-title{font-family:'Times New Roman',serif;font-size:13pt;font-weight:bold;text-align:center;color:var(--txt);margin-bottom:2px}
.page-sub{font-family:'Times New Roman',serif;font-size:10pt;text-align:center;color:var(--muted);margin-bottom:2px}
.page-meta{font-family:'Times New Roman',serif;font-size:9pt;text-align:center;color:var(--hint);margin-bottom:8px;font-style:italic}
.page hr{border:none;border-top:1px solid #ccc;margin:6px 0}
.page-sh{font-family:'Times New Roman',serif;font-size:11pt;font-weight:bold;color:var(--txt);margin:9px 0 2px}
.page-body{font-family:'Times New Roman',serif;font-size:11pt;line-height:2;color:var(--txt)}
.page-empty{font-family:'Times New Roman',serif;font-size:11pt;line-height:2;color:var(--hint);font-style:italic}
.page-num{position:absolute;bottom:8px;left:0;right:0;text-align:center;font-size:8px;color:var(--hint);font-family:'Times New Roman',serif}
/* DOWNLOAD */
.dl-wrap{padding:12px 14px}
.dl-btn{width:100%;padding:10px 12px;background:var(--silver);border:2px solid;border-color:var(--white) var(--bd) var(--bd) var(--white);box-shadow:1px 1px 0 var(--black);cursor:pointer;display:flex;align-items:center;gap:10px;font-family:inherit;text-align:left;color:var(--txt);margin-bottom:6px}
.dl-btn:active{border-color:var(--bd) var(--white) var(--white) var(--bd);box-shadow:none}
.dl-icon{font-size:22px;flex-shrink:0}
.dl-info{display:flex;flex-direction:column;gap:1px}
.dl-info strong{font-size:12px;font-family:'VT323',monospace;color:var(--blue)}
.dl-info span{font-size:10px;color:var(--muted)}
.steps-box{background:var(--note);border:2px solid var(--noteb);padding:10px 12px;margin:8px 0;font-size:11px;line-height:1.65}
.steps-box h3{font-family:'VT323',monospace;font-size:13px;color:var(--blue);margin-bottom:5px}
.steps-box ol{margin:0 0 0 16px}
.steps-box li{margin-bottom:4px}
.remind-card{border:2px solid;border-color:var(--white) var(--bd) var(--bd) var(--white);box-shadow:1px 1px 0 var(--black)}
.remind-tbar{background:linear-gradient(90deg,var(--rem1),var(--rem2));padding:3px 8px;font-size:11px;font-weight:bold;color:#fff}
.remind-body{padding:8px 10px;display:flex;gap:8px;align-items:flex-start;background:var(--silver)}
.remind-icon{font-size:22px;flex-shrink:0}
.remind-txt{flex:1;font-size:10px;line-height:1.5}
.remind-txt strong{font-family:'VT323',monospace;font-size:12px;color:var(--blue);display:block;margin-bottom:2px}
/* COURSE SELECTOR */
.selector{padding:20px;background:var(--cbg);min-height:400px}
.selector h2{font-family:'VT323',monospace;font-size:20px;color:var(--blue);margin-bottom:4px}
.selector p{font-size:11px;color:var(--muted);margin-bottom:14px}
.course-cards{display:flex;flex-direction:column;gap:8px}
.course-card{padding:10px 12px;border:2px solid;border-color:var(--white) var(--bd) var(--bd) var(--white);background:var(--silver);cursor:pointer;display:flex;align-items:center;gap:12px;box-shadow:1px 1px 0 var(--black)}
.course-card:hover{background:#d8d8e8}
.course-card:active{border-color:var(--bd) var(--white) var(--white) var(--bd);box-shadow:none}
.cc-icon{font-size:24px;flex-shrink:0}
.cc-info h3{font-family:'VT323',monospace;font-size:14px;color:var(--blue);margin-bottom:2px}
.cc-info p{font-size:10px;color:var(--muted)}
.cc-docs{font-size:9px;color:var(--blue-lt);margin-top:2px}
/* SCROLLBAR */
.sb-scroll::-webkit-scrollbar,.main-panel::-webkit-scrollbar,.preview-wrap::-webkit-scrollbar{width:14px}
.sb-scroll::-webkit-scrollbar-track,.main-panel::-webkit-scrollbar-track,.preview-wrap::-webkit-scrollbar-track{background:var(--scr)}
.sb-scroll::-webkit-scrollbar-thumb,.main-panel::-webkit-scrollbar-thumb,.preview-wrap::-webkit-scrollbar-thumb{background:var(--silver);border:1px outset var(--silver)}
.interview-req{background:#fff3e0;border:2px solid #e65100;padding:7px 9px;margin-bottom:10px;font-size:10.5px;line-height:1.5}
.interview-req strong{color:#e65100;font-family:'VT323',monospace;font-size:12px}
.spreadsheet-note{background:#e8f5e8;border:2px solid #2e7d32;padding:7px 9px;margin-bottom:10px;font-size:10.5px;line-height:1.5}
.spreadsheet-note strong{color:#1b5e20;font-family:'VT323',monospace;font-size:12px}
/* ── MOBILE NAV BAR (hidden on desktop) ── */
.mobile-topnav{display:none;background:var(--silver);border-bottom:2px solid var(--dark);padding:4px 6px;align-items:center;gap:6px}
.ham-btn{width:36px;height:36px;background:var(--silver);border:2px solid;border-color:var(--white) var(--bd) var(--bd) var(--white);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;flex-shrink:0}
.ham-btn:active{border-color:var(--bd) var(--white) var(--white) var(--bd)}
.mobile-sec-info{flex:1;min-width:0;overflow:hidden}
.mobile-sec-label{font-size:10px;color:var(--muted);font-family:'VT323',monospace}
.mobile-sec-title{font-size:12px;font-weight:bold;color:var(--blue);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mobile-prog{font-size:10px;color:var(--muted);flex-shrink:0}
/* ── SIDEBAR OVERLAY (mobile) ── */
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999}
.sb-overlay.open{display:block}
.sidebar-drawer{position:fixed;top:0;left:-100%;width:80%;max-width:300px;height:100%;background:var(--cbg);z-index:1000;transition:left .25s ease;display:flex;flex-direction:column;box-shadow:3px 0 12px rgba(0,0,0,.3)}
.sidebar-drawer.open{left:0}
.sb-drawer-hdr{background:linear-gradient(90deg,var(--tbar1),var(--tbar2));padding:10px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.sb-drawer-hdr span{color:#fff;font-family:'VT323',monospace;font-size:14px}
.sb-close-btn{width:32px;height:32px;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}

@media(max-width:650px){
  html,body{overflow-x:hidden;max-width:100vw}
  body{padding:0;align-items:stretch}
  .app{width:100%;max-width:100vw;min-width:0}
  /* util bar: stack modebar and toolbar on same row, constrained */
  .util{flex-wrap:nowrap;gap:3px;padding:3px;background:var(--silver)}
  .modebar{flex:1;min-width:0;padding:2px;gap:2px}
  .mbtn{font-size:9px;padding:0 3px;min-width:0;height:32px;gap:2px}
  .mbtn span{font-size:14px;flex-shrink:0}
  .toolbar{padding:2px;gap:2px;flex-shrink:0}
  .tbtn2{width:32px;height:32px}
  /* panel: prevent overflow */
  .panel.vis{max-width:100vw;overflow-x:hidden}
  /* hide desktop sidebar inside body-wrap */
  .body-wrap>.sidebar{display:none}
  /* show mobile nav bar */
  .mobile-topnav{display:flex}
  /* full-width content, no overflow */
  .body-wrap{overflow-x:hidden}
  .main-panel{width:100%;min-width:0;overflow-x:hidden}
  /* bigger touch targets */
  .win-btn{height:40px;min-width:0;font-size:12px;padding:0 10px}
  /* content padding */
  .build-wrap,.guide-wrap,.dl-wrap{padding:12px 10px}
  /* larger readable text */
  .sec-badge{font-size:11px}
  .sec-title{font-size:17px}
  .sec-desc{font-size:13px;line-height:1.7}
  .trigger-box{font-size:11px;white-space:normal;word-break:break-word}
  .field-label{font-size:13px}
  textarea{font-size:15px;min-height:150px;width:100%}
  .wc-row{font-size:11px;flex-wrap:wrap;gap:4px}
  .wc-bar-outer{min-width:80px}
  .ai-hdr{font-size:12px;padding:10px 8px}
  .ai-ethics-note{font-size:11px}
  .ai-prompt-box{font-size:11px;overflow-x:auto}
  .copy-btn{height:40px;font-size:12px;padding:0 14px;width:100%;margin-top:4px}
  /* nav row — 3 equal buttons */
  .nav-row{gap:6px;flex-wrap:nowrap}
  .nav-row .win-btn{flex:1;height:44px;font-size:12px;padding:0 4px;text-align:center}
  /* guide */
  .guide-wrap h2{font-size:17px}
  .guide-wrap h3{font-size:13px}
  .guide-wrap p,.ex-box{font-size:12px;line-height:1.65}
  .kq-box{font-size:12px}
  .kq-box li{margin-bottom:4px}
  /* preview page */
  .preview-wrap{padding:6px;overflow-x:hidden}
  .page{padding:14px 10px 20px;max-width:100%;overflow-x:hidden}
  .page-title{font-size:11pt}
  .page-body,.page-empty,.page-sh{font-size:10pt}
  /* download */
  .dl-btn{padding:10px;gap:8px}
  .dl-icon{font-size:18px}
  .dl-info strong{font-size:11px}
  .steps-box{font-size:12px}
  .steps-box li{margin-bottom:6px}
  .remind-body{flex-direction:column;gap:4px}
  /* statusbar */
  .statusbar{font-size:10px}
  .ss{padding:2px 4px}
  /* title bar */
  .tbar-btns{display:none}
  .tbar-txt{font-size:10px}
  /* mobile top nav */
  .ham-btn{width:40px;height:40px;font-size:18px}
  /* interview/spreadsheet notes */
  .interview-req,.spreadsheet-note{font-size:11px}
  /* mobile drawer */
  .sb-drawer-hdr span{font-size:13px}
  .sec-item{padding:8px 8px 8px 14px;font-size:12px}
  .doc-hdr{padding:6px 8px;font-size:11px}
}
@media(max-width:380px){
  .mbtn span{font-size:12px}
  .mbtn{height:30px}
  .build-wrap,.guide-wrap,.dl-wrap{padding:8px}
  textarea{font-size:14px}
}
/* ── MINI WIDGET ── */
.mini-wrap{display:flex;flex-direction:column;gap:6px;padding:4px 0;max-width:760px;margin:0 auto}
.mini-header{background:var(--silver)}
.mini-card{background:var(--cbg)}
.mini-card-hdr{background:var(--silver);padding:5px 10px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--dark);flex-wrap:wrap}
.mini-doc-badge{background:var(--blue);color:#fff;padding:1px 7px;font-family:'VT323',monospace;font-size:11px;flex-shrink:0}
.mini-sec-title{font-family:'VT323',monospace;font-size:14px;color:var(--blue);flex:1;min-width:0}
.mini-wc-chip{font-size:10px;color:var(--muted);flex-shrink:0;font-family:'VT323',monospace}
.mini-trigger{background:var(--note);border-bottom:1px solid var(--noteb);padding:4px 10px;font-size:10px;color:var(--muted);font-style:italic}
.mini-desc{padding:10px 10px 6px;font-size:12px;line-height:1.65;color:var(--txt)}
.mini-field-lbl{padding:0 10px 4px;font-family:'VT323',monospace;font-size:12px;color:var(--blue);display:flex;align-items:center;gap:5px}
.mini-ta{display:block;width:calc(100% - 20px);margin:0 10px;background:var(--inp);border:2px solid;border-color:var(--inset) var(--white) var(--white) var(--inset);font-family:inherit;font-size:13px;padding:7px;resize:none;line-height:1.5;color:var(--txt);overflow-y:hidden;min-height:52px;box-sizing:border-box}
.mini-ta:focus{outline:none;box-shadow:inset 0 0 0 1px var(--blue)}
.mini-ta::placeholder{color:var(--hint);font-style:italic}
.mini-wc-row{padding:4px 10px 8px;display:flex;align-items:center;font-size:10px;color:var(--muted)}
.mini-card .ai-block{margin:0 10px 10px}
.mini-footer{background:var(--silver);padding:6px 10px;display:flex;flex-direction:column;gap:2px;font-size:10px;color:var(--txt)}
.mini-footer-hint{color:var(--muted);font-style:italic}
@media(max-width:650px){
  .mini-wrap{padding:2px 0;gap:4px}
  .mini-desc{font-size:13px}
  .mini-ta{font-size:15px;min-height:52px;width:calc(100% - 16px);margin:0 8px}
  .mini-card-hdr{padding:6px 8px}
  .mini-sec-title{font-size:13px}
  .mini-trigger{font-size:11px;padding:5px 8px}
  .mini-field-lbl{padding:0 8px 4px;font-size:13px}
  .mini-wc-row{padding:4px 8px 8px;font-size:11px}
  .mini-card .ai-block{margin:0 8px 8px}
  .ai-hdr{padding:10px 8px;font-size:13px}
  .copy-btn{width:calc(100%);height:42px;font-size:13px}
}
</style>

<body>
<div class="app" id="app"></div>
<script>
// ══════════════════════════════════════════
// COURSE DATA
// ══════════════════════════════════════════
const COURSES = {
1:{
  id:1, title:"Course 1 Capstone", subtitle:"Theology, Identity & Formation",
  tagline:"Your First Three Years of Ministry — Built Before You Start",
  key:"c1",
  docs:[
    {id:"d1",num:"Doc 1",title:"Ministry Blueprint",desc:"Who You Are & What You Believe",
     format:"Paragraph form • 1–2 pages • Double-spaced",
     secs:[
      {id:"calling",title:"Personal Calling Statement",
       trigger:"After Section 1 — Vitals of NextGen Ministry",
       desc:"Why are you in NextGen ministry? Not \"I love kids\" — what burden do you carry? Name a real moment, person, or call that confirms this. Write as if telling your senior pastor why this role matters.",
       ph:"Start with a specific moment — a place, a person, a conversation...",
       ai:`After writing your own draft above, copy this into ChatGPT or Claude:

"In Section 1 I studied what healthy NextGen ministry looks like — the biblical framework for why the church must reach the next generation, how the 'vitals' reveal whether a ministry is alive or just active, and what a real philosophy of ministry looks like underneath the programs. Here is my calling statement draft:
[PASTE YOUR NOTES]

(1) Section 1 made the case that effective NextGen ministry requires a specific burden — not just enthusiasm. Does my statement reveal a real burden, or does it describe a general preference for working with young people? (2) The vitals framework distinguishes between outputs (what we do) and outcomes (what changes). Does my calling statement reflect a desired outcome in students, or does it describe activities? (3) The section asked: why does the church need NextGen ministry? Does my calling answer that question with urgency, or does it stay personal without connecting to the larger need? Do NOT rewrite it — just question it."`,
       guide:{
         what:"A specific, personal account of why you're called to NextGen ministry. Theology of purpose, not résumé.",
         qs:["What moment confirmed this calling?","Who invested in you — name them?","What problem in the church does this address?"],
         strong:"I was sixteen when my youth pastor Dave Mitchell at Valley Assembly asked me to lead junior high small group. First time anyone saw potential in me. Two years later, watching a seventh grader get baptized in the Spirit at camp, I knew.",
         sNote:"Real name, real church, real moment. Testimony, not résumé.",
         weak:"I have always felt called to work with young people. God placed a passion in my heart for the next generation.",
         wNote:"No names, no places. Could describe anyone."
       },wt:150},
      {id:"theology",title:"Core Theological Convictions",
       trigger:"After Section 2 — Biblical Literacy",
       desc:"Name 2–3 theological convictions that shape how you do NextGen ministry. Don't just list doctrines — articulate why they matter to a 14-year-old sitting in your youth room. Ground this in Scripture.",
       ph:"What doctrines are non-negotiable in how you teach and disciple young people?",
       ai:`After writing your own draft:

"In Section 2 I studied how to develop biblical literacy in students — lesson planning methods, gospel fluency, Christian worldview formation, and how to make Scripture accessible without making it shallow. Here are my theological convictions: [PASTE YOURS]

(1) Section 2 covered gospel fluency — the ability to speak the gospel into everyday situations. Does my theology include a conviction about students being able to do this, or is it something only I do for them? (2) The section pushed leaders to develop a Christian worldview in students, not just Bible knowledge. Do my theological convictions equip students to think differently about culture, or do they stay inside the church walls? (3) The section challenged leaders to engage Scripture with depth, not just accessibility. Does each conviction reflect real biblical engagement, or am I restating a doctrinal position without showing how I arrived there? Push me to connect conviction to practice."`,
       guide:{
         what:"Not a doctrinal exam — show how theology shapes what you actually do.",
         qs:["Which truths most shape your ministry?","How does Scripture affect a Wednesday night?","Why does this matter to a 14-year-old?"],
         strong:"Scripture is living and active — not just historically true but presently powerful. I don't simplify the Bible for teenagers; the Spirit illuminates text to a fourteen-year-old like He does for a seminary student.",
         sNote:"Each conviction connects to ministry implication.",
         weak:"I believe in the Bible as God's Word. I affirm the 16 Fundamental Truths.",
         wNote:"A checklist, not a philosophy."
       },wt:150},
      {id:"win",title:"Ministry Win Definition",
       trigger:"After Section 1 — Vitals of NextGen Ministry",
       desc:"Define what a win looks like at three scales: Weekly (what happened Wednesday that tells you it's working?), Monthly (what trend are you watching?), At graduation (what kind of 18-year-old are you sending out?). Be specific enough that someone could observe for a month and tell you whether you're winning.",
       ph:"Weekly: ... Monthly: ... At graduation: ...",
       ai:`After writing your own draft:

"In Section 1 I used the vitals framework as an evaluation tool — a way to assess whether a ministry is producing genuine spiritual growth or just activity. Here is my ministry win definition: [PASTE YOURS]

(1) The vitals framework distinguishes outputs (things that happen in ministry) from outcomes (things that change in students). Look at each of my three wins — are they outputs or outcomes? Flag every win that describes something I do rather than something that changes in a student. (2) The section introduced the idea of a vitals-based evaluation — could someone observe my ministry for a month and confirm whether I am winning by my own definition? Or are my wins only visible to me? (3) Do my graduation-level wins match the kind of student Section 1 described as the goal of NextGen ministry — someone who owns their faith and transitions well to adult community? Point out where the logic breaks down."`,
       guide:{
         what:"Formation outcomes, not attendance numbers. What does a healthy student look like after 3 years?",
         qs:["Could another leader recognize your win?","Is it measurable at all three scales?"],
         strong:"A student who opens their Bible and finds God. A senior who transitions to young adult community instead of walking away. I measure by who follows Jesus two years after leaving.",
         sNote:"Concrete, observable, long-term.",
         weak:"A win is when a student grows closer to God.",
         wNote:"Unmeasurable."
       },wt:120},
      {id:"discipleship",title:"Discipleship Philosophy",
       trigger:"After Section 6 — Spiritual Disciplines and Mentoring",
       desc:"What does a mature (not perfect) student look like? What are the markers? How does your ministry intentionally produce those markers rather than hoping they happen? Describe your philosophy of discipleship — not your programs, but the conviction underneath them.",
       ph:"What does a formed student look like, and how does your ministry produce that formation?",
       ai:`After writing your own draft:

"Section 6 was the most extensive section in Course 1 — covering spiritual disciplines, mentoring relationships, teaching students to pray for others, rites of passage, and how structured practice produces faith development over time. Here is my discipleship philosophy: [PASTE YOURS]

(1) Section 6 showed that discipleship requires both structured spiritual practices AND relational mentoring — does my philosophy rely on one at the expense of the other, or does it intentionally hold both together? (2) The section covered rites of passage as intentional formation milestones — does my philosophy include specific markers that a student moves through, or is it purely relational with no defined progression? (3) Teaching students to pray for others — not just to be prayed for — was a major theme. Is intercessory practice part of my discipleship framework, or is it something I hope happens naturally? Ask me questions that push toward specificity."`,
       guide:{
         what:"The conviction underneath your programs. Showing up → owning faith.",
         qs:["What's your named framework?","What does the first-visit-to-student-leader journey look like?"],
         strong:"Three postures: belong, believe, become. Groups of 6–8, trained adults committed one year. Some students spend two years in 'belong' — that's okay.",
         sNote:"Named framework, details, patience.",
         weak:"I believe in relational discipleship and walking alongside students.",
         wNote:"No structure."
       },wt:150},
      {id:"development",title:"Developmental Strategy",
       trigger:"After Section 3 — Age-Appropriate Hermeneutics",
       desc:"Create a developmental framework for kids (5–10), middle school (11–13), and high school (14–18). For each: 2–3 sentences on how you adapt communication, expectations, and environment. What can a 7-year-old handle that a 15-year-old would outgrow?",
       ph:"Kids (5-10): ... Middle (11-13): ... High School (14-18): ...",
       ai:`After writing your draft:

"In Section 3 I studied how cognitive and psychosocial development stages shape how young people receive Scripture. I learned about Piaget's stages of cognitive development (concrete vs. formal operational thinking), Erikson's psychosocial stages (identity vs. role confusion in adolescence), Bronfenbrenner's ecological systems model (family, school, and community all shaping the student), and how age-appropriate teaching strategies must be built on these foundations. Here is my developmental strategy: [PASTE YOURS]

(1) Piaget's framework tells us that kids under 11 think concretely while adolescents can handle abstraction — does my kids approach stay in narrative and image while my high school approach opens into dialogue and complexity, or do all three age levels use the same basic approach? (2) Erikson's identity stage (12–18) means that adolescents are actively forming who they are — does my middle and high school strategy account for this identity work, or does it treat teens as older children rather than emerging adults? (3) The ecological systems model reminded us that students exist in family, school, and peer contexts that shape their spiritual formation — does my strategy account for environment, or does it only respond to age? Could a new volunteer read this and know how to actually talk differently to a 7th grader than a 10th grader?"`,
       guide:{
         what:"Show that you understand the humans you minister to across three life stages.",
         qs:["How does programming shift by age?","What does leadership development look like at different stages?"],
         strong:"Middle school: high-energy, concrete, narrative. High school: dialogue, harder texts. Leadership ladder: setup teams → assist small groups → co-lead with ownership.",
         sNote:"Developmental awareness + specific ladder.",
         weak:"I adjust based on age and maturity.",
         wNote:"Says nothing about how."
       },wt:150},
      {id:"teaching",title:"Teaching Philosophy",
       trigger:"After Section 4 — Curriculum Design and Annual Planning",
       desc:"How do you teach the Bible to young people? What is your approach to interpreting and applying Scripture in a youth context? How do you balance depth and accessibility? How do you move from text to life? What does faithful teaching look like when your audience is 13?",
       ph:"My teaching approach is... because... The balance between depth and accessibility looks like...",
       ai:`After writing your draft:

"In Section 4 I studied curriculum design and annual planning — including how to develop message focus and purpose, how to build lesson plans that align with spiritual formation goals rather than just delivering content, and how to plan an annual teaching calendar that creates a cohesive journey. Here is my teaching philosophy: [PASTE YOURS]

(1) Section 4 emphasized that message focus means choosing what a single teaching moment is actually supposed to accomplish — does my philosophy reflect a conviction about what one teaching is for, or is it vague about intent? (2) The section distinguished between topical and expository teaching approaches — have I named my approach and explained why I use it with this age group, or have I described a process without naming a conviction underneath it? (3) Curriculum design in Section 4 was explicitly tied to the developmental stages from Section 3 — does my teaching philosophy reflect that alignment, or does it describe a method without saying who it's designed for? What's the memorable phrase or conviction that makes this distinctly mine?"`,
       guide:{
         what:"How you handle God's Word — method, conviction, and process. Not just tools.",
         qs:["Style and why?","How do you handle the depth vs. accessibility tension?"],
         strong:"Narrative exposition. Prep starts with text, not topic. I sit in a passage a week before illustrations. Clarity over cleverness.",
         sNote:"Memorable phrase, real process.",
         weak:"I teach in a relevant and engaging way using media and interactive elements.",
         wNote:"Methods listed, never explained."
       },wt:150},
      {id:"pentecostal",title:"Pentecostal Distinctives",
       trigger:"After Section 5 — Pentecostal Emphasis on the Holy Spirit",
       desc:"What makes your ministry distinctly Pentecostal — not in doctrine but in practice? How do you create space for the Spirit without manufacturing emotion? How do you disciple a student through a genuine encounter with God? How do you handle the planning/spontaneity tension?",
       ph:"Spirit-empowered ministry in my context looks like... I create space by...",
       ai:`After writing your draft:

"In Section 5 I studied the Pentecostal emphasis on the Holy Spirit in NextGen ministry — including how to develop an atmosphere for revival, how to lead students into the baptism of the Holy Spirit without manufacturing pressure, and how to equip volunteers to facilitate Spirit-empowered moments rather than performing them solo. Here is my Pentecostal distinctives section: [PASTE YOURS]

(1) Section 5 covered developing an atmosphere for revival — not engineering emotion, but creating genuine expectation. Does my distinctives section describe an atmosphere I intentionally cultivate, or does it restate the doctrine of Spirit baptism without describing what I actually do on a Wednesday night to create space for it? (2) The section specifically addressed how to lead students into Spirit baptism — does my philosophy show pastoral wisdom about removing pressure while still leaving genuine room for the Spirit to move? (3) The material pushed leaders to train volunteers to facilitate Spirit-led moments — is my team equipped to create and sustain these environments without me being present, or does the Spirit-emphasis depend entirely on me? What would a non-Pentecostal pastor NOT be able to write in this section?"`,
       guide:{
         what:"AG identity in practice — not what you believe, but how it shapes what happens.",
         qs:["How do you protect space for the Spirit?","How do you handle Spirit baptism without pressure?"],
         strong:"I protect space — don't script every minute. Worship team sensitive to the Spirit, not just finishing the set list. I never pressure tongues — that's the Spirit's work.",
         sNote:"\"Protecting space\" — pastoral instinct. Maturity.",
         weak:"I believe in Spirit baptism with evidence of tongues. I incorporate worship.",
         wNote:"Doctrine restated, not practiced."
       },wt:150},
      {id:"family",title:"Family Partnership Philosophy",
       trigger:"After Section 7 — Family Discipleship and Parent Partnership",
       desc:"What is the family's role in spiritual formation vs. your role? Where does the church's responsibility begin and end? How do you partner with engaged parents? How do you serve students whose parents are absent or disengaged? Avoid clichés — say what you actually mean.",
       ph:"The family's role is... My role is... For engaged parents I... For absent/disengaged parents I...",
       ai:`After writing your draft:

"In Section 7 I studied family discipleship and parent partnership — the biblical case that parents are the primary disciplers of their children, not the church, and the practical strategies for equipping both engaged parents and students from absent or fractured homes. Here is my family partnership philosophy: [PASTE YOURS]

(1) Section 7 made the case that the church comes alongside the family rather than replacing it — does my philosophy reflect that hierarchy, or does it position me as the primary spiritual formation agent with parents as supporters of my program? (2) The section covered specific equipping strategies: parent workshops, home discipleship resources, and regular communication channels. Does my philosophy name any specific equipping tools, or does it stay at the level of 'we partner with parents'? (3) Section 7 directly addressed students whose families are absent or disengaged — not as an edge case, but as a ministry reality. What is my actual plan for the student whose family is not a partner? Have I drawn a clear line between where the church's responsibility begins and where it cannot go?"`,
       guide:{
         what:"Parents as partners + the reality of unchurched and fractured families.",
         qs:["How do you equip parents?","What happens when the family is the problem, not the partner?"],
         strong:"Communication, equipping nights, available content. For unsupported students: mentors, host homes, open-door policy. Where family is absent, church becomes family.",
         sNote:"Idealism + realism. Specific strategies.",
         weak:"I believe in partnering with parents. Communication is key.",
         wNote:"Logistics, not philosophy."
       },wt:150},
      {id:"scope",title:"Scope of Ministry",
       trigger:"After Section 7 — Family Discipleship and Parent Partnership (closing reflection)",
       desc:"Define the boundaries of your role. What is your lane? What is not? Write 3–5 sentences that draw a clear line between what you will own and what you will refer, delegate, or decline. This protects your calling, your family, and your longevity.",
       ph:"My lane is... What is not my lane: ... This boundary protects...",
       ai:`After writing your draft:

"I have now completed Course 1 — working through ministry vitals, biblical literacy, developmental theory, curriculum design, Pentecostal distinctives, spiritual disciplines, and family partnership. Here is my scope of ministry: [PASTE YOURS]

(1) My calling statement (from Section 1) named a specific burden. Does my scope of ministry protect that burden — does it draw boundaries that make space for the work I said mattered most, or have I already let scope creep in without naming it? (2) Is this specific enough that my senior pastor could read it and know without ambiguity what I will own, what I will refer, and what I will decline — or does it still require a conversation to clarify? (3) The hardest boundary for most NextGen leaders is the one that costs relational capital to hold. Have I named that specific boundary honestly, and written what I will actually say when someone asks me to cross it?"`,
       guide:{
         what:"The lane you'll stay in — and what you'll say no to. Prevents burnout.",
         qs:["What are you willing to say no to?","Does this protect what your calling statement said matters most?"],
         strong:"6th–12th grade. I own the spiritual formation of the students in my care — not nursery, not adult small groups, not event coordination for the whole church. I refer mental health crises to licensed counselors and communicate with parents.",
         sNote:"Honest, self-aware, confident.",
         weak:"My ministry is for youth 12–18. I hope to reach as many as possible.",
         wNote:"No actual scope defined."
       },wt:100}
    ]},
    {id:"d2",num:"Doc 2",title:"Ministry Map",desc:"How You Will Lead & Execute",
     format:"Structured outline / calendar / table",
     secs:[
      {id:"pathway",title:"Formation Pathway Overlay",
       trigger:"After Section 1 — Vitals of NextGen Ministry",
       desc:"Sketch a quarterly formation arc for the year. What is being formed each season? Suggested: Fall → Identity, Winter → Scripture, Spring → Spirit, Summer → Mission. Adapt as needed, but name what's being formed each quarter. This overlay sits above your teaching calendar.",
       ph:"Fall (Identity): ... Winter (Scripture): ... Spring (Spirit): ... Summer (Mission): ...",
       ai:`After sketching your pathway:

"In Section 1 I studied the vitals of NextGen ministry — what spiritual health looks like in a youth or children's ministry, and what formation actually means (not just attendance or behavior, but who a student is becoming). Here is my formation pathway overlay: [PASTE YOURS]

(1) Each quarter should name what is being formed — not just a teaching topic. Does 'Fall → Identity' describe a formation goal (students come to a settled sense of who they are in Christ) or just a theme (we talked about identity)? Make me articulate the difference for each quarter. (2) The vitals framework from Section 1 included biblical engagement, community, prayer, giving, and serving — does my formation arc address all of these over the year, or does it privilege some vitals while neglecting others? (3) Does the arc build — does the formation work of Fall genuinely set up and require the Winter quarter, or are these four independent blocks that could be shuffled without loss?"`,
       guide:{what:"A quarterly formation arc that gives the whole year a theological shape.",qs:["What is being formed each season?","Does the arc build progressively?"]},wt:100},
      {id:"calendar",title:"Annual Teaching Calendar v1",
       trigger:"After Section 4 — Curriculum Design and Annual Planning",
       desc:"Draft your first annual teaching calendar. Map series or themes by semester/quarter. For each series: working title, approximate length, primary Scripture, and which formation pathway quarter it falls under. This is version 1 — you'll refine it in the capstone module.",
       ph:"Q1 Series: [Title] | [Length] | [Scripture] | Formation goal: ...\nQ2 Series: ...",
       ai:`After drafting your calendar:

"In Section 4 I studied curriculum design and annual planning — including how to build a teaching calendar that creates a cohesive annual journey rather than a series of disconnected messages, how to align series with the spiritual formation goals of the ministry, and how to balance topical and expository approaches. Here is my teaching calendar draft: [PASTE YOURS]

(1) Section 4 taught that each teaching series should have a clear message focus and purpose — not just a topic. For each series on my calendar, can I state in one sentence what this series is supposed to accomplish in a student? Or is each one just a subject? (2) The section covered the topical vs. expository tension — does my year include both, or does it default entirely to one approach? If all topical, what does a student miss? If all expository, what felt needs go unaddressed? (3) Section 4 tied curriculum design to the developmental stages from Section 3 — does my calendar show awareness of what my specific age group can handle, or would this calendar work for any audience regardless of age?"`,
       guide:{what:"Series mapped to quarters with formation pathway alignment.",qs:["Does each series have a Scripture anchor?","Does the calendar align with your formation pathway?"]},wt:150},
      {id:"milestones",title:"Spiritual Milestones",
       trigger:"After Section 5 — Pentecostal Emphasis on the Holy Spirit",
       desc:"Identify the spiritual milestones your ministry will intentionally cultivate and celebrate: salvation, water baptism, baptism in the Holy Spirit, first time serving, first time leading, first time sharing faith. For each: when in the year it's most likely to happen and how you create space for it.",
       ph:"Salvation: [when/how] ... Water Baptism: ... Spirit Baptism: ... First Serve: ... First Lead: ...",
       ai:`After drafting your milestones:

"In Section 5 I studied the Pentecostal emphasis on the Holy Spirit — including how to create an atmosphere where genuine spiritual encounters happen, how to lead students into Spirit baptism without creating pressure, and how to help students understand that spiritual milestones are not endpoints but entry points into deeper formation. Here are my spiritual milestones: [PASTE YOURS]

(1) Section 5 showed that Spirit encounters require an intentional environment, not just a spontaneous moment. For each milestone on my list — where on the calendar does my ministry intentionally create the conditions for this milestone to happen? If it's not on the calendar, when does it occur? (2) The section raised the question of what happens after a student has a significant spiritual experience — not just celebration, but discipleship through the moment. For each milestone, do I have a specific follow-up plan for the 72 hours after it happens, or does the student's experience evaporate without integration? (3) Is Spirit baptism on my milestone list treated as something I lead students toward through invitation and teaching, or as something that just happens if the environment is good enough? Does my plan reflect what I learned about leading students into this experience?"`,
       guide:{what:"Milestones your ministry cultivates — placed on the calendar, not just listed.",qs:["Are milestones calendar-anchored?","What's the follow-up system after each?"]},wt:120},
      {id:"agelevel",title:"Age-Level Strategy",
       trigger:"After Section 3 — Age-Appropriate Hermeneutics",
       desc:"Translate your Doc 1 developmental strategy into an operational format. For each age level (kids, middle, high school): environment design, communication approach, and key activities. This is the operational layer underneath your teaching calendar.",
       ph:"Kids: Environment: ... Communication: ... Activities: ...\nMiddle: ...\nHigh School: ...",
       ai:`After drafting:

"In Section 3 I studied age-appropriate hermeneutics — how to interpret and present Scripture through the lens of developmental stage. I worked through Piaget's cognitive stages (concrete vs. abstract), Erikson's psychosocial stages (trust, autonomy, initiative, identity), and Bronfenbrenner's ecological model (the student in family, school, peer, and cultural systems). Here is my age-level strategy: [PASTE YOURS]

(1) Piaget tells us kids operate in concrete thinking while teens can handle abstraction — looking at my kids environment design vs. my high school environment, do the physical space and activities reflect this difference, or do they just use smaller chairs? (2) Erikson's identity stage (ages 12–18) means my middle and high school students are actively constructing who they are — does my communication approach for those ages leave room for question, doubt, and exploration, or does it assume students just need correct information delivered clearly? (3) Could a brand-new volunteer with no youth ministry background read my age-level strategy and walk into a 4th grade class or a 10th grade small group and know concretely how to communicate differently in each setting?"`,
       guide:{what:"The operational translation of your developmental strategy.",qs:["Does each level genuinely differ?","Could a substitute implement this?"]},wt:150},
      {id:"discipleship_sys",title:"Discipleship Systems",
       trigger:"After Section 6 — Spiritual Disciplines and Mentoring",
       desc:"Draft the systems that make discipleship happen: small group structure (who, when, how), mentoring pairings (how matched and guided?), spiritual disciplines introduction (what practices, at what age?), and follow-up systems (what happens after camp, altar call, salvation?).",
       ph:"Small Groups: ... Mentoring: ... Spiritual Disciplines by age: ... Follow-up system: what happens Monday after camp?",
       ai:`After drafting:

"In Section 6 I studied spiritual disciplines and mentoring in depth — prayer practices, how to teach students to pray for others (not just be prayed for), building mentoring relationships across age groups, rites of passage as intentional formation transitions, and how structured practice over time produces genuine faith development rather than emotional peaks. Here are my discipleship systems: [PASTE YOURS]

(1) Section 6 showed that spiritual disciplines require triggers — specific moments that activate them. For each system I've drafted (small groups, mentoring, disciplines, follow-up), what is the specific event or calendar moment that activates it? If a student shows up for the first time on a random Wednesday, which systems engage immediately and which require them to be invited in? (2) The section on teaching students to pray for others showed that intercession is a learned skill, not a natural habit — is prayer practice embedded in my small group structure and mentoring relationships with a specific format, or is it assumed to happen without structure? (3) Is my follow-up system after a significant moment (camp, altar call, first time here) specific enough that a volunteer could execute it without me? Walk me through what happens between the moment and the following Sunday — who does what, in what order?"`,
       guide:{what:"The pipes underneath the calendar. Systems that have triggers and owners.",qs:["Does each system have a trigger?","Could it run without you?"]},wt:150},
      {id:"parent_rhythm",title:"Parent Engagement Rhythm",
       trigger:"After Section 7 — Family Discipleship and Parent Partnership",
       desc:"Draft your parent engagement rhythm. What communication do parents receive and when (weekly updates, monthly newsletters, quarterly meetings)? What events include families? When do you equip parents with resources for home discipleship? Be specific — 'monthly parent email' beats 'regular communication.'",
       ph:"Weekly: ... Monthly: ... Quarterly: ... Family events: ... Parent equipping: ...",
       ai:`After drafting:

"In Section 7 I studied family discipleship and parent partnership — including the principle that parents are the primary disciplers of their children, and the church's role is to equip and reinforce, not to replace. The section covered practical equipping strategies: workshops, home discipleship resources, communication systems, and how to engage both highly involved parents and absent or disengaged ones. Here is my parent engagement rhythm: [PASTE YOURS]

(1) Section 7 drew a clear line between informing parents (telling them what we did) and equipping parents (giving them tools to continue the work at home). Looking at each communication cadence in my rhythm — is it informing, equipping, or both? Flag any item that is only informing. (2) The section addressed parents who are disengaged or absent — does my engagement rhythm have a specific pathway for the student whose parents never open the weekly email and never attend a family event, or does my rhythm assume parental engagement as a baseline? (3) Does this rhythm appear on my teaching calendar, or is it a separate document that will be disconnected from the actual ministry year? Name which calendar months include which parent touchpoints."`,
       guide:{what:"Specific communication cadence, family events, parent equipping touchpoints on calendar.",qs:["Are touchpoints calendar-anchored?","Is there equipping, not just informing?"]},wt:120}
    ]},
    {id:"dx",num:"Reflection",title:"AI Interaction Reflection",desc:"Required with submission",
     format:"½ page • Honest engagement required",
     secs:[
      {id:"ai_reflect",title:"AI Interaction Reflection",
       trigger:"Complete before final submission",
       desc:"Required with every submission. Answer all three: (1) What did AI help you clarify in your thinking? (2) What did you reject from AI's suggestions, and why? (3) What remained uniquely yours — ideas, convictions, or language that no AI could have generated?\n\nFull marks for honest reflection. This is about teaching you to use AI without losing your voice.",
       ph:"1. AI helped me clarify...\n2. I rejected... because...\n3. What remained uniquely mine: my calling story, my conviction about...",
       ai:`This section is about reflecting on your OWN use of AI. No AI prompt needed here — this must come entirely from you.`,
       guide:{what:"Honest reflection on how AI was (or wasn't) used in your process.",qs:["What did AI help with?","What did you reject and why?","What is irreducibly yours?"]},wt:200,noAI:true}
    ]}
  ]
},
2:{
  id:2, title:"Course 2 Capstone", subtitle:"Community, Safety & Sending",
  tagline:"Culture, Mission & the World Beyond Your Walls",
  key:"c2",
  docs:[
    {id:"d3",num:"Doc 3",title:"Protection + Culture Covenant",desc:"Child & Youth Protection Policy + Ministry Culture",
     format:"2 pages • District interview required",
     interviewReq:true,
     secs:[
      {id:"culture_values",title:"Ministry Culture Values + Small Group Philosophy",
       trigger:"After Sections 1–2 — Culture & Small Groups",
       desc:"(1) Name 3–5 ministry culture values with 2–3 sentence descriptions of what each looks like in practice — not dictionary definitions, but what a visitor would feel on a Wednesday night. Think: visible artifacts, espoused values, underlying assumptions. (2) Draft your small group philosophy: structure, purpose, leader expectations, how groups build the culture you described.",
       ph:"Value 1: [Name] — In practice this looks like...\nValue 2: ...\n\nSmall Group Philosophy: Our groups exist to... They meet [frequency]. Leader expectations: ...",
       ai:`After writing your values:

"In Sections 1–2 I studied how ministry culture is built — including Edgar Schein's three layers (visible artifacts, espoused values, and underlying assumptions), how psychological safety shapes whether people actually show up as themselves in a ministry environment, and how small groups are the primary delivery system for lived culture rather than programmed culture. Here are my ministry culture values and small group philosophy: [PASTE YOURS]

(1) Schein's framework says culture operates at three levels — what you can see, what you say you believe, and what you actually assume. For each of my values, am I writing at the artifact level (what would a visitor see on a Wednesday night) or am I staying at the espoused level (what we say we believe)? Push me to describe the artifact — the observable, physical, behavioral evidence — of each value. (2) Section 1 on psychological safety showed that culture is revealed when things go wrong — when a student asks a hard question, when a leader fails, when someone on the fringe shows up. Does my culture description account for those moments, or does it only describe the ministry at its best? (3) Does my small group philosophy actually deliver my culture values — can I trace a direct line from each value to a specific small group practice, or are the values and the small group structure disconnected documents?"`,
       guide:{what:"Culture is felt before it's named. Values should describe reality, not aspiration.",qs:["What would a first-time visitor feel?","Do the values show up in small groups?"]},wt:200},
      {id:"conflict",title:"Conflict Resolution Process",
       trigger:"After Section 3 — Conflict Resolution & Peacemaking",
       desc:"Draft a step-by-step conflict resolution process for your ministry. Cover at least three types: peer-to-peer (student conflicts), leader-to-student, and parent-to-leader. Make it restorative, not punitive. A parent reading this should know exactly what will happen when relational breakdown occurs. Incorporate impact listening principles.",
       ph:"Peer-to-Peer Conflicts:\nStep 1: ... Step 2: ... Step 3: ...\n\nLeader-to-Student:\n...\n\nParent-to-Leader:\n...",
       ai:`After drafting your process:

"In Section 3 I studied conflict resolution and peacemaking — including the difference between restorative and punitive approaches, impact listening as a structured skill for de-escalation, and the specific dynamics of peer-to-peer, leader-to-student, and parent-to-leader conflicts. Here is my conflict resolution process: [PASTE YOURS]

(1) Section 3 drew a sharp line between restorative (repairing the relationship and addressing the harm) and punitive (punishing the behavior). Reading each step of my process: is the goal restoration or compliance? Where does it drift punitive? (2) Impact listening was a specific technique from the section — the practice of naming the impact of an action before moving to resolution. Is there a structured moment in my process where both parties are heard about impact before anyone moves to solution? Or does my process jump to fixing before anyone feels understood? (3) A parent bringing a concern about a leader is one of the most charged conflict types in ministry — does my process for that scenario have a clear escalation path that includes someone other than me, or does it depend entirely on me to self-police? Who holds me accountable in my own conflict process?"`,
       guide:{what:"A step-by-step restorative process covering three conflict types.",qs:["Is it restorative, not punitive?","Is it specific enough for a parent to follow?"]},wt:200},
      {id:"digital",title:"Digital Communication Policy + Social Media Guidelines",
       trigger:"After Section 4 — Digital & Online Guidelines",
       desc:"(1) Digital communication policy: the Rule of Three (all digital communication includes at least three parties), platform guidelines, documentation requirements, AI use boundaries. (2) Social media guidelines for staff, volunteers, and students: private messaging rules, tagging, content sharing, personal vs. ministry accounts, and your digital discipleship philosophy.",
       ph:"Rule of Three: all digital communication with youth must include...\nApproved platforms: ...\nPrivate messaging: NEVER...\nSocial media guidelines: ...\nDigital discipleship philosophy: ...",
       ai:`After drafting your policy:

"In Section 4 I studied digital and online guidelines for ministry — including the Rule of Three (all digital communication with a minor must include at least three parties), platform-specific guidelines, documentation requirements, and the distinction between digital safety policy and digital discipleship philosophy. Here is my digital communication policy: [PASTE YOURS]

(1) The Rule of Three from Section 4 is non-negotiable — does it apply without exception to every platform I have listed, including DMs on platforms I use personally? Name any platform in my policy where a volunteer could have a one-on-one private text exchange with a student without technically violating my written policy. (2) Section 4 pushed leaders to think about gray areas — the edge cases that a policy didn't anticipate. Read my policy as a volunteer who wants to bend it without breaking it. What's the easiest workaround? Have I closed that gap? (3) The section distinguished between digital safety rules and a digital discipleship philosophy — the conviction about how online spaces can be intentional formation environments, not just liability risks. Does my policy include a discipleship philosophy section, or is it entirely prohibitive? What do I actually believe about online ministry as a formation tool?"`,
       guide:{what:"Both protection (safety rules) AND discipleship (how you use digital spaces intentionally).",qs:["Does Rule of Three cover every platform?","Is there a discipleship philosophy, not just restrictions?"]},wt:200},
      {id:"protection",title:"Child Protection Policy + Volunteer Covenant",
       trigger:"After Section 4 + District Official Interview",
       interviewReq:true,
       desc:"Using your interview notes, draft the full child protection section: (1) Policy preamble and theological foundation, (2) Screening and background checks (AG-aligned), (3) Two-person rule with enforcement strategies, (4) Appropriate touch standards, (5) Mandatory reporting protocol with state-specific requirements, (6) Incident response procedure (first 24 hours), (7) Volunteer covenant — signable, with signature lines.",
       ph:"Preamble: This ministry commits to protecting every child in our care because...\n\nBackground Checks: We use [provider]. Renewal: every [X] years.\n\nTwo-Person Rule: No adult will be alone with a child under any circumstances except...\n\nMandatory Reporting: In [state], all ministry workers are mandated reporters. If abuse is suspected: Step 1...\n\nVolunteer Covenant:\nI, [name], commit to...\nSignature: _______________ Date: ______",
       ai:`After drafting your protection policy:

"In Section 4 I studied child and youth protection policies — including the theological foundation for protecting the vulnerable, AG-aligned background check requirements, the two-person rule and enforcement strategies, mandatory reporting obligations, incident response protocols, and volunteer covenant design. I also completed a real interview with a district official. Here is my child protection policy draft: [PASTE YOURS]

(1) Section 4 required seven specific elements — preamble and theological foundation, background checks, two-person rule with enforcement, appropriate touch standards, mandatory reporting (state-specific), incident response (first 24 hours), and volunteer covenant with signature lines. Are all seven present and substantive, or are any of them a single sentence that names the requirement without describing what I will actually do? (2) The mandatory reporting protocol must name my specific state's law — not 'in our state' but the actual statute name and reporting timeline. Does it, or is it generic enough to apply to any state? (3) The district official interview was the most important part of this section — the gaps they identified, the enforcement strategies they've seen work, the common mistakes they see in local churches. Have those specific insights from my interview shaped this document throughout, or are the interview notes sitting in a separate section without being integrated?"`,
       guide:{
         what:"The most legally critical document in the certificate. Every element must be present.",
         qs:["Is mandatory reporting state-specific?","Could a new volunteer execute this without you?","Did your interview inform this?"],
         strong:"Uses interview insights throughout. State-specific reporting law named. Two-person rule has specific enforcement strategy. Volunteer covenant has actual signature lines.",
         sNote:"Interview integrated, not appended. Specific, not generic.",
         weak:"We believe children are a gift from God. All volunteers must pass a background check.",
         wNote:"Preamble without substance. No specifics."
       },wt:400},
      {id:"interview_notes",title:"District Official Interview Notes",
       trigger:"Complete before Section 4 capstone work — schedule early",
       interviewReq:true,
       desc:"Record your interview with a district official (Secretary, District Youth Director, or Sectional Presbyter). Minimum 15–20 minutes. Include: name, title, date, and detailed notes from each question. These notes are submitted with your final capstone.\n\nSuggested questions:\n1. Most common gaps in local church child protection policies?\n2. What happens when a report reaches the district?\n3. Recommended background check provider and renewal cycle?\n4. Enforcement strategies for two-person rule in smaller churches?\n5. First 24-hour response after a report?\n6. Digital communication expectations for credentialed ministers?\n7. What do you wish every new youth pastor knew?",
       ph:"Interviewee: [Name], [Title]\nDate: [Date]\nChurch/District: [Name]\n\nQ1: Most common gaps?\nA: ...\n\nQ2: What happens when a report reaches the district?\nA: ...\n\nQ3: Background check provider / renewal?\nA: ...\n\nQ4: Two-person rule enforcement?\nA: ...\n\nQ5: First 24-hour response?\nA: ...\n\nQ6: Digital communication expectations?\nA: ...\n\nQ7: What do you wish every new youth pastor knew?\nA: ...",
       ai:`This section is your interview notes — it must come entirely from your real conversation.

No AI prompt for this section. If you haven't scheduled the interview yet, do it now — this conversation itself is a formational experience.`,
       guide:{what:"A real conversation with a real district official. Not research, not AI — a relationship.",qs:["Have you scheduled the interview?","Do you have name, title, and date recorded?"]},wt:300,noAI:true}
    ]},
    {id:"d4",num:"Doc 4",title:"Outreach & Missions Strategy",desc:"Local, Global & Cultural Engagement",
     format:"2 pages",
     secs:[
      {id:"cultural",title:"Cultural Landscape Analysis",
       trigger:"After Sections 5–6 — Gen Z/Alpha & Social Justice",
       desc:"Who are the young people you're trying to reach — not generically, but in your town, your school district, your neighborhood? What are their assumptions about church, faith, and Christianity? What cultural values shape them? How does your ministry speak to those values without compromising the gospel? This is reconnaissance for mission, not a sociology paper.",
       ph:"My ministry context: [town/neighborhood, school district]\nThe young people here are shaped by...\nTheir assumptions about church/faith: ...\nCultural values: ...\nHow we engage without compromising: ...",
       ai:`After writing your analysis:

"In Sections 5 and 6 I studied who Gen Z and Alpha actually are — their assumptions about institutions, faith, and church; what they value (authenticity, belonging, justice); how they process information; and how social justice concerns shape the questions they bring to faith. I also studied how a polarized cultural moment affects the space a youth pastor has to speak. Here is my cultural landscape analysis: [PASTE YOURS]

(1) Section 5 gave a general picture of Gen Z and Alpha — but what I need to produce here is specific to my zip code, not a generational profile. What specific assumptions about Christianity do the young people in my town, school district, or neighborhood hold — not what Gen Z believes generically, but what I've observed or heard in my actual community? The section gave me a framework; does my analysis use it with local data? (2) Section 6 on social justice in a polarized world raised the question: what are the specific justice concerns that animate the students in my community? Have I named them — not 'students care about justice' but 'in my context, students are shaped by [specific issue or tension]'? (3) Does my ministry actually address the assumptions and values I've named, or does it proceed as though the culture is neutral? Where is the specific entry point — the 'in' — for the gospel in my particular community context?"`,
       guide:{what:"Reconnaissance for mission. Specific to YOUR zip code, not generic Gen Z data.",qs:["Is this about your actual community?","Have you named specific assumptions about faith?"],
         strong:"Suburban Sacramento valley. Majority unchurched, culturally Christian at best. Students assume church = rules and performance. Highest value: authenticity. Our in is 'we're not pretending.' The gospel lands hardest through friendship and story, not argument.",
         sNote:"Specific location, specific assumptions, specific entry point.",
         weak:"Gen Z is diverse and technologically driven. They value authenticity and social justice.",
         wNote:"Could describe any Gen Z population anywhere."
       },wt:200},
      {id:"evangelism",title:"Evangelism & Apologetics Approach",
       trigger:"After Sections 6 & 9 — Social Justice & Kids Evangelism",
       desc:"How does your ministry share the gospel with young people who may never have been in a church? Address: the friendship model, how you contextualize without diluting, how you equip students to defend their faith among peers, age-level adaptation (gospel with an 8-year-old looks different than with a 16-year-old). Name specific objections your students encounter and how you prepare them.",
       ph:"Friendship model: ...\nContextualization approach: ...\nApologetics equipping for students: ...\nFor 8-year-olds: ... For 16-year-olds: ...\nTop objections we prepare for: 1)... 2)... 3)...",
       ai:`After drafting:

"In Sections 6 and 9 I studied the intersection of social justice and evangelism — how the gospel speaks to the justice concerns that young people carry, and the practical dimension of students sharing faith with peers at school. Section 9 specifically focused on equipping students to defend and articulate their faith in everyday settings, not just in church. Here is my evangelism and apologetics approach: [PASTE YOURS]

(1) Section 9 was clear that the student is the missionary — not just the audience for my evangelism. Does my approach actually equip students to share their faith, or am I still the primary person who does the evangelizing while students observe? What specifically am I doing to develop students as evangelists? (2) The section covered apologetics — the skill of engaging specific objections to faith. Have I named the actual objections my students hear at their school — not 'why does God allow suffering' generically, but the specific challenges that come up in my community's schools and social settings? (3) Sharing the gospel with an 8-year-old is categorically different from sharing with a 16-year-old — cognitively, emotionally, and relationally. Does my approach actually differ by age, or is it essentially the same message delivered with different vocabulary?"`,
       guide:{what:"Friendship-based, age-adapted, apologetically informed. Students are the missionaries.",qs:["Are objections specific to your community?","Are students the evangelists or just the audience?"]},wt:200},
      {id:"local_outreach",title:"Local Outreach Strategy",
       trigger:"After Section 8 — Local & Global Missions",
       desc:"How does your ministry engage the community beyond church walls? Cover: regular local service rhythms (embedded practices, not one-off events), partnerships with schools and community organizations, how outreach is discipleship (not an add-on but a formation tool), and how students are missionaries, not just participants. Be specific to your community: what needs exist within a 5-mile radius?",
       ph:"Regular rhythms (not just events): ...\nSchool/community partnerships: ...\nNeeds within 5 miles of our church: ...\nHow outreach forms students: ...\nHow students lead (not just attend): ...",
       ai:`After drafting:

"In Section 8 I studied local and global missions — with a strong emphasis that outreach is not an add-on to discipleship but is itself a formation tool. The section showed that students who serve become different kinds of disciples than students who only receive, and that local outreach works best when embedded in ministry rhythms rather than organized as occasional events. Here is my local outreach strategy: [PASTE YOURS]

(1) Section 8 distinguished between embedded rhythms (outreach built into regular ministry life) and annual events (a service project once a year). Looking at each item in my strategy: is it a rhythm that happens regardless of calendar pressure, or is it an event that depends on someone having the capacity to organize it? Be specific — what makes each one a rhythm rather than an event? (2) The section argued that students are the missionaries, not just participants in the leader's outreach vision. In my strategy, who is doing the work — am I leading service projects that students participate in, or am I developing students who initiate and own outreach themselves? (3) What specific need within a 5-mile radius of my church have I named — not 'serving the community' but a real, identifiable gap that real people in my neighborhood experience? If I removed the address from my strategy, could it describe any church anywhere?"`,
       guide:{what:"Regular rhythms tied to real community needs. Students as missionaries, outreach as discipleship.",qs:["Are these rhythms or events?","What's the specific need in your 5-mile radius?"]},wt:200},
      {id:"global_missions",title:"Global Missions Integration",
       trigger:"After Sections 7–8 — Sending & Missions",
       desc:"How does your ministry connect young people to what God is doing beyond their neighborhood? Cover: AG missions resources (BGMC, Speed the Light, AGWM partnerships), how you build global awareness into regular programming (not just a missions Sunday), short-term mission trip philosophy and progression (local → domestic → international), and how global missions shapes identity formation.",
       ph:"AG resources we'll use: BGMC (how)... STL (how)... AGWM (how)...\nGlobal awareness in regular programming: ...\nMission trip progression: Local: ... Domestic: ... International: ...\nHow missions shapes student identity: ...",
       ai:`After drafting:

"In Sections 7 and 8 I studied sending and global missions — including the AG missions ecosystem (BGMC, Speed the Light, AGWM partnerships, Youth Alive, Chi Alpha), the local-to-domestic-to-international progression for mission trips, and how global missions shapes student identity formation rather than just providing service experiences. Here is my global missions integration plan: [PASTE YOURS]

(1) The section covered specific AG resources — BGMC, Speed the Light, AGWM, Youth Alive, Chi Alpha. For each resource I've listed, do I name a specific integration point — a calendar month, a programming moment, a giving goal — or have I just listed the resource as something I'll 'use'? Listing without integration is not a plan. (2) Section 7's 'Sending Sons and Daughters' framing argued that missions shapes identity when it's a rhythm, not a once-a-year trip. Looking at my plan: how many months of the year include some form of global missions engagement? If the answer is one or two, it's an event. (3) The mission trip progression (local → domestic → international) was a specific framework from the section — does my plan show a clear progression where students grow in their missions engagement over multiple years, or is every trip essentially the same experience for whoever signs up?"`,
       guide:{what:"AG resources engaged specifically. Missions as rhythm, not event. Identity-shaping, not just trip-taking.",qs:["Are AG resources named with integration points?","Is missions on the calendar year-round?"]},wt:200}
    ]},
    {id:"d5",num:"Doc 5",title:"Raising Sons & Daughters",desc:"A Vision for Sending Missionaries",
     format:"1 page",
     secs:[
      {id:"sending",title:"Sending Identity + Missionary Development Pipeline",
       trigger:"After Section 7 — Sending Sons & Daughters",
       desc:"(1) Write a sending identity statement: one paragraph declaring that your ministry exists not only to form young people, but to launch them. The local church is a greenhouse, not a museum. (2) Draft a missionary development pipeline: How do you identify students with a missions calling? What's the progression from 'interested' to 'sent'? Include mentoring, exposure experiences, mission trip progression, and connection to AG structures (AGWM, Chi Alpha, AG institutions).",
       ph:"Sending Identity:\nThis ministry exists not only to protect and form young people, but to launch them...\n\nMissionary Pipeline:\nIdentification: how we spot calling early...\nProgression: Interested → Exposed → Formed → Sent\nMentoring: ...\nAG connections: ...",
       ai:`After drafting:

"In Section 7 — Sending Sons and Daughters — I studied the theological and practical case that a NextGen ministry's ultimate goal is to release young people into vocation and mission, not to retain them as permanent participants. The section used the greenhouse (not museum) framing: a healthy ministry produces things it releases into the world. Here is my sending vision: [PASTE YOURS]

(1) The 'greenhouse not museum' image from Section 7 is a theological conviction before it's a program strategy — does my sending identity statement read like a conviction I've internalized, or does it describe a pipeline I'm going to implement? The difference is whether you hear urgency or administration in the language. (2) Section 7 emphasized connection to AG structures — AGWM, Chi Alpha, AG universities, district networks — as the handoff points where my pipeline connects to something larger than my local church. Does my pipeline name specific AG structures with specific handoff moments, or does it send students into the world without a receiving network? (3) Is this pipeline honest about where I am right now — the size of my ministry, the stage of my leadership — or is it written for a ministry five times larger than the one I actually lead? A realistic pipeline for a small church looks different from one for a large one. Which is this?"`,
       guide:{what:"A theological conviction about launching, not just a program. Greenhouse, not museum.",qs:["Does the pipeline connect to AG structures?","Is this realistic for your ministry size?"]},wt:200},
      {id:"missions_rhythm",title:"Annual Missions Rhythm + AG Resource Map",
       trigger:"After Sections 8–9 — Missions & Evangelism",
       desc:"(1) An annual missions rhythm showing when and how missional activities are embedded in the ministry year: BGMC emphasis months, Speed the Light campaigns, mission trip preparation windows, Youth Alive campus launches, missionary guest schedules, and local service rhythms. Not add-ons — woven into the calendar. (2) An AG resource map: list every AG missions resource you will leverage and how — BGMC, STL, AGWM, Youth Alive, Fine Arts, NYC/AGYC, Chi Alpha, district camps. For each, name the specific integration point.",

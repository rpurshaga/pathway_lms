       ph:"Annual Rhythm:\nSeptember: ... October: ... November: BGMC push... December: STL campaign...\nJanuary: ... February: ... March: mission prep...\n\nAG Resource Map:\nBGMC: [integration point]\nSpeed the Light: ...\nAGWM partner: ...\nYouth Alive: ...",
       ai:`After drafting:

"In Sections 8 and 9 I studied how to build missions into the annual rhythm of ministry — not as special events but as habits. I learned the specific AG missions resources (BGMC, Speed the Light, AGWM, Youth Alive, Fine Arts, NYC/AGYC, Chi Alpha) and studied how each one has a natural calendar integration point rather than requiring a special ministry season to activate it. Here is my annual missions rhythm and AG resource map: [PASTE YOURS]

(1) The section made the case that missions becomes a habit when it appears in most months — not clustered in one missions Sunday or one annual trip. Looking at my rhythm month by month: how many months have no missional activity at all? If it's more than two, what would need to change to embed something — even small — in those gaps? (2) For each AG resource I've listed, do I name a specific integration point (e.g., 'BGMC: November emphasis with a giving thermometer in the room every Wednesday') or have I just mapped which resources exist? Listing is not integration. (3) Does my missions rhythm in this document align with and expand on my outreach strategy from Doc 4 — or are these two documents describing parallel tracks that never intersect? Name one specific place where they connect."`,
       guide:{what:"Month-by-month missions rhythm with specific AG resource integration points.",qs:["Is it calendar-embedded or add-on?","Are integration points specific?"]},wt:200}
    ]},
    {id:"dx2",num:"Disclosure",title:"AI Disclosure Statement",desc:"Required with every document",
     format:"3–5 sentences",
     secs:[
      {id:"ai_disclosure2",title:"AI Disclosure Statement",
       trigger:"Complete before final submission",
       desc:"Required with every submitted document. Answer in 3–5 sentences: (1) What AI tools did you use? (2) How did you use them? (3) What remained uniquely yours — especially your cultural landscape analysis and local community knowledge that AI could not have generated?",
       ph:"Tools used: ...\nHow I used them: ...\nWhat remained uniquely mine: especially my knowledge of [community], my interview with [name], my specific context of...",
       ai:`This section is about your own honest reflection on AI use. It must come entirely from you.`,
       guide:{what:"Honest disclosure — full marks for transparency, deductions for undisclosed use.",qs:["Were you honest about what AI helped with?","Did you name what AI could NOT have known?"]},wt:100,noAI:true}
    ]}
  ]
},
3:{
  id:3, title:"Course 3 Capstone", subtitle:"Leadership & Ministry Practicum",
  tagline:"The 12-Month Ministry Operations Plan",
  key:"c3",
  docs:[
    {id:"d6",num:"Doc 6",title:"Volunteer System",desc:"Recruitment, Training & Retention",
     format:"2 pages narrative + appended templates",
     secs:[
      {id:"vol_roles",title:"Volunteer Role Descriptions",
       trigger:"After Section 3 — Team Development",
       desc:"Draft role descriptions for at least four volunteer positions (e.g., small group leader, greeter, worship team, tech/AV, check-in). For each: title, purpose, time commitment, key responsibilities, who they report to, and qualifications/spiritual requirements.",
       ph:"Role 1: Small Group Leader\nPurpose: ...\nTime commitment: ...\nResponsibilities: ...\nReports to: ...\nQualifications: ...\n\nRole 2: ...",
       ai:`After drafting your role descriptions:

"In Section 3 I studied team development — how to build a team culture, clarify roles, delegate with accountability, and create structures that keep a team healthy and aligned. Here are my volunteer role descriptions: [PASTE YOURS]

(1) Section 3 showed that role clarity is the primary driver of both retention and performance — a volunteer who doesn't know exactly what they're responsible for will underperform and eventually leave. Reading each of my role descriptions: could someone sign up without a single follow-up conversation? Or does each role require me to explain it in person before it makes sense? (2) The section on delegation emphasized time commitment as a non-negotiable in any delegated role — have I included both meeting time AND prep time for each role, or just the visible hours? A small group leader who needs 2 hours of prep for a 1-hour group is signing up for 3 hours. Does my description reflect that? (3) Section 3 covered the difference between staff expectations and volunteer expectations — are my qualifications written for real volunteers (someone who works a full-time job outside the church and gives 4–6 hours per week), or have I written them for a part-time staff member?"`,
       guide:{what:"At least four complete role descriptions, immediately usable for recruitment.",qs:["Does each role have time commitment?","Are qualifications realistic?"]},wt:250},
      {id:"vol_recruit",title:"Recruitment Pipeline",
       trigger:"After Section 4 — Volunteer Management and Mobilization",
       desc:"Draft your recruitment pipeline. Where do volunteers come from? How do you identify potential leaders? What does the 'ask' look like — who makes it, when, and how? Include proactive recruitment (you approach them) and responsive pathways (they express interest). Address the cold-start problem: how do you recruit when you have no existing team?",
       ph:"Proactive recruitment:\n- Where I look: ...\n- How I identify potential: ...\n- What the ask looks like: ...\n\nResponsive pathway:\n- When someone expresses interest: ...\n\nCold-start strategy:\n- Starting from zero: ...",
       ai:`After drafting:

"In Section 4 I studied volunteer management and mobilization — including how to identify potential leaders in a congregation, how to make a recruitment ask that is specific and role-based rather than generic, and how to manage the cold-start problem of building a team when no team exists yet. Here is my recruitment pipeline: [PASTE YOURS]

(1) Section 4 emphasized that the single most common reason people don't volunteer is that they were never asked specifically — not 'we need volunteers' from the stage, but 'I thought of you for this role because of what I've observed in you.' Does my pipeline include a specific, personalized ask, or is it still a broadcast appeal? (2) The section covered both proactive (I identify and approach them) and responsive (they raise their hand) pathways — do I have a clear process for each, or does my pipeline only handle one scenario? (3) The cold-start problem was a major theme: how do you recruit when you have no credibility, no existing team, and no track record in a new church? Does my pipeline have a specific first-30-days strategy for this, or does it assume I already have a foundation to build from?"`,
       guide:{what:"Proactive + responsive pathways with a specific ask and cold-start strategy.",qs:["Is the ask scripted?","What's the cold-start strategy?"]},wt:200},
      {id:"vol_onboard",title:"Onboarding Process",
       trigger:"After Section 4 — Volunteer Management and Mobilization",
       desc:"Draft your onboarding process as a step-by-step checklist. From the moment someone says yes to their first day serving: application, background check, reference check, orientation meeting, training schedule, pairing with a mentor volunteer, and first-serve shadow period. Should be usable by a church administrator.",
       ph:"Step 1: Application form sent within [X days]\nStep 2: Background check initiated via [provider]\nStep 3: Reference check (2 references, [who calls them?])\nStep 4: Orientation meeting — covers: ...\nStep 5: Paired with mentor volunteer: [who? how?]\nStep 6: Shadow period: [how long?]\nStep 7: First independent serve — debrief within [X days]",
       ai:`After drafting:

"In Section 4 I studied volunteer management and mobilization — including the principle that the period between 'yes' and 'first serve' is the highest dropout point in the volunteer lifecycle, and that a clear onboarding process directly reduces that dropout. Here is my onboarding checklist: [PASTE YOURS]

(1) Section 4 was clear that every step in a system needs an owner — not 'we send the application' but '[person/role] sends the application within 48 hours of the yes.' For each step in my checklist, is there a named owner and a time window, or does 'we' appear anywhere? Every 'we' is a gap. (2) Background checks were covered specifically in Section 4 — is the provider named, the turnaround time expected, and who initiates the check? Could my church administrator initiate a background check based on my checklist alone, without calling me? (3) Add up the time from yes to first independent serve in my checklist. Is that a realistic window — long enough to be thorough, short enough that the volunteer doesn't lose momentum and quietly opt out?"`,
       guide:{what:"A step-by-step checklist from yes → first serve that a church admin could execute.",qs:["Is every step assigned to someone?","Is background check process named specifically?"]},wt:200},
      {id:"vol_develop",title:"Ongoing Development",
       trigger:"After Section 3 — Team Development",
       desc:"Draft your ongoing development plan. How do you invest in volunteers after onboarding? Cover: monthly leader huddles (format, frequency, content), training resources and delivery, spiritual care rhythms (how do you pastor your team?), and annual or seasonal development opportunities (retreats, conferences, book studies).",
       ph:"Monthly huddles: [format, length, typical content]\nTraining resources: ...\nSpiritual care: how I pastor volunteers...\nAnnual development: [retreat? conference? book study?]\nFrequency: ...",
       ai:`After drafting:

"In Section 3 I studied team development — including the distinction between managing a team (assigning tasks, monitoring performance) and developing a team (investing in who they're becoming). The section made the case that volunteers stay and grow when they feel pastored, not just managed, and that team culture is built or eroded in the small, repeated moments rather than the annual retreats. Here is my ongoing development plan: [PASTE YOURS]

(1) Section 3 drew a clear line between training (ministry skills) and pastoral care (the volunteer as a person with a life outside this ministry). Does my plan include both — or does it schedule training and hope that care happens relationally? If there's no specific rhythm for spiritual investment in my team, name what's missing. (2) My monthly huddle format: is it specific enough that a volunteer who's been coming for a year could describe what typically happens — the structure, the length, the content — or is 'huddle' just a vague word for a meeting? (3) Section 3 showed that annual retreats and conference experiences are the moments that dramatically shift team culture — not the weekly huddle alone. Is there at least one annual moment in my plan that goes significantly deeper than a 45-minute huddle?"`,
       guide:{what:"After onboarding — the investment that keeps volunteers growing and staying.",qs:["Do you pastor volunteers, not just manage them?","Is there annual depth, not just monthly maintenance?"]},wt:200},
      {id:"vol_retain",title:"Appreciation & Retention Rhythms",
       trigger:"After Section 4 — Volunteer Management and Mobilization",
       desc:"Draft your appreciation and retention rhythms. How are volunteers honored and sustained over time? Include: regular encouragement practices (not just annual banquets), how you manage burnout and sabbaticals from serving, how you celebrate milestones, and how you create a culture where serving feels like privilege rather than obligation.",
       ph:"Regular encouragement (not just annual banquet): ...\nBurnout prevention: how I watch for it, what I do...\nSabbatical policy: ...\nMilestone celebrations: ...\nWhat makes serving feel like privilege here: ...",
       ai:`After drafting:

"In Section 4 I studied volunteer management and mobilization — including the research showing that the primary reason volunteers leave is not burnout from the work itself, but feeling unseen, undervalued, or like they're filling a slot rather than contributing to a mission. The section also covered the ministry-specific challenge of honoring volunteers who need rest without making them feel like they're abandoning the team. Here is my appreciation and retention plan: [PASTE YOURS]

(1) Section 4 showed that annual recognition events (banquets, awards, volunteer Sunday) are necessary but not sufficient — volunteers need to feel valued in the ordinary weeks, not just the celebration moments. What does my plan include that happens in a regular Wednesday or Sunday, not just at an event? (2) The section covered burnout as something that's visible before the volunteer announces it — specific warning signs that a leader who's paying attention will notice. Have I named the specific behavioral signs I watch for (withdrawing from conversations, showing up but not engaging, declining invitations they'd previously accept), or have I written 'watch for burnout' as a concept without defining what I'm watching for? (3) Is there a sabbatical policy — can a volunteer take a semester off and return without guilt or loss of standing? Have I written what that policy actually says?"`,
       guide:{what:"Regular rhythms of honor. Burnout prevention. Sabbatical culture.",qs:["Is this year-round, not just annual?","Is there a real sabbatical policy?"]},wt:150},
      {id:"vol_exit",title:"Exit / Offboarding Procedure",
       trigger:"After Section 4 — Volunteer Management and Mobilization",
       desc:"Draft your exit and offboarding procedure. What happens when a volunteer needs to step down — by choice, life circumstance, or performance concern? Include: how you have the conversation, transition of responsibilities, return of materials/access, exit interview questions, and how you maintain the relationship after someone stops serving.",
       ph:"For voluntary exits:\n- The conversation: ...\n- Transition of responsibilities: ...\n- Return of materials/access: ...\nFor performance concerns:\n- Process: ...\nExit interview questions:\n1. ...\nMaintaining the relationship after: ...",
       ai:`After drafting:

"In Section 4 I studied volunteer management and mobilization — including the reality that exits are inevitable and that how a volunteer leaves often determines whether they return, whether they speak well of the ministry, and whether they bring others in. The section covered both graceful voluntary exits and the harder performance-based exits that every leader will eventually face. Here is my exit and offboarding procedure: [PASTE YOURS]

(1) Section 4 was clear that voluntary exits and performance exits require completely different processes — the conversation, the tone, the next steps. Does my procedure distinguish between these two types with different language and steps for each, or is it one generic process that doesn't account for the difference? (2) Access removal was a specific item in the section — removing someone from planning apps, group chats, and child protection databases when they step down. Is there a specific list of access points to remove, or is this still vague? Who executes it and in what timeframe? (3) Exit interview questions are only valuable if they surface real feedback rather than polite farewell comments. Do my questions actually probe the volunteer experience — what made staying hard, what would have changed the outcome — or do they ask questions that will only produce positive responses?"`,
       guide:{what:"Graceful endings — voluntary and performance exits — with relational continuity.",qs:["Is there a performance exit process?","Is there an exit interview?"]},wt:150}
    ]},
    {id:"d7",num:"Doc 7",title:"Ministry Budget & Resources",desc:"Budget Planning & Stewardship Communication",
     format:"Working .xlsx spreadsheet + 1-page narrative",
     spreadsheetNote:true,
     secs:[
      {id:"budget_cats",title:"Annual Budget Categories",
       trigger:"After Section 2 — Budgeting, Communication, and Serving the Vision",
       desc:"Draft your annual budget with line-item categories and realistic dollar amounts for your church context. Required categories: curriculum/resources, weekly programming, special events, volunteer appreciation, missions giving (BGMC/STL), equipment & supplies, food/hospitality, training & conferences, contingency fund. Note: the working .xlsx spreadsheet with formulas is a separate deliverable — use these notes to populate it.",
       ph:"Curriculum/Resources: $...\nWeekly Programming: $...\nSpecial Events (list): $...\nVolunteer Appreciation: $...\nMissions Giving (BGMC/STL): $...\nEquipment & Supplies: $...\nFood/Hospitality: $...\nTraining & Conferences: $...\nContingency (5–10%): $...\nTOTAL: $...\n\nContext: church of [size], current budget allocation: ...",
       ai:`After drafting your budget:

"In Section 2 I studied budgeting, communication, and serving the vision — including how to build a budget that reflects ministry priorities rather than just line items inherited from whoever had the role before, how to have budget conversations with a senior pastor, and how to communicate the story of resource stewardship to leadership. Here are my budget categories and amounts: [PASTE YOURS]

Note: do NOT ask AI to generate the actual numbers for you. Your numbers must come from real research into your church context.

(1) Section 2 taught that a budget is a theological document — it reflects what the ministry actually values, not what it says it values. Looking at where the largest line items fall in my budget: do they reflect my stated ministry priorities from Doc 8, or do they reflect habit and inertia from what was budgeted before? (2) The section emphasized that every budget category should be justifiable in terms of ministry outcome, not just ministry activity. Can I articulate in one sentence what each line item produces in the life of a student or volunteer? If a line item exists because 'we've always done it,' that's the one to examine first. (3) Are my numbers from real research — actual vendor quotes, real curriculum costs, real camp fees — or have I rounded to the nearest hundred and hoped it's close enough? Section 2 was clear: a budget built on guesses is not a stewardship tool."`,
       guide:{what:"Real numbers from your real church context. Formulas in spreadsheet, narrative in this tool.",qs:["Are numbers from real research?","Does budget reflect ministry priorities?"]},wt:250},
      {id:"event_cost",title:"Per-Event Cost Tracking",
       trigger:"After Section 2 — Budgeting, Communication, and Serving the Vision",
       desc:"Build a per-event cost template. Choose two events from your ministry calendar (one weekly program night, one annual event like camp or retreat) and break down every cost: venue, food, supplies, speaker/guest, transportation, promotional materials, insurance, miscellaneous. Show unit costs and totals. This template should be reusable for any event.",
       ph:"Event 1: Weekly Program Night\nVenue: $... Food: $... Supplies: $... AV/Tech: $...\nTotal per event: $... Annual total (52x): $...\n\nEvent 2: Annual Camp/Retreat\nVenue/lodging: $... Food: $... Transportation: $... Speaker: $... Supplies: $... Insurance: $...\nTotal: $...\nCost per student: $...",
       ai:`After drafting your cost breakdown:

"In Section 2 I studied budgeting and resource stewardship — including how to think about events as budget commitments with real cost structures, not just as ministry moments. The section covered the difference between knowing what an event costs and actually tracking what it costs, and why the per-student cost of major events is a critical stewardship metric. Here is my per-event cost template: [PASTE YOURS]

(1) Section 2 showed that the most common budget mistakes come from hidden cost categories — the ones nobody tracks because they seem small. Looking at my weekly program night breakdown: have I included AV/tech supplies replacement, printed handouts, and leader communication (group text apps, planning tools)? What about setup and teardown time for paid staff? For the annual event: have I included insurance, transportation fuel, and the cost of promotional materials? (2) Does my weekly program cost — multiplied by 52 — fall within a reasonable percentage of my total annual budget? If that math doesn't work, something in the annual budget needs to adjust. (3) Cost-per-student for the annual event is the number that makes a board member's eyes open — it makes abstract spending concrete. Is there a cost-per-student figure in my template, and is it a number I'm prepared to defend as a good investment?"`,
       guide:{what:"A reusable template showing every cost. Annualizable for budget planning.",qs:["Is every cost category included?","Is there a cost-per-student calculation?"]},wt:200},
      {id:"fundraising",title:"Fundraising Policy",
       trigger:"After Section 2 — Budgeting, Communication, and Serving the Vision",
       desc:"Draft your fundraising policy and procedures. Cover: what types of fundraising are permitted (and what is not), approval process (who authorizes a fundraiser?), financial handling and accounting procedures, transparency requirements, and how funds are designated and tracked. Distinguish between church-budgeted funds and student-raised funds (e.g., Speed the Light, mission trips).",
       ph:"Permitted fundraising types: ...\nNot permitted: ...\nApproval process: ...\nFinancial handling: cash is never handled by one person...\nTransparency requirements: ...\nSTL/Mission Trip funds designation: ...",
       ai:`After drafting:

"In Section 2 I studied budgeting, communication, and serving the vision — including the financial ethics required for ministry leaders: approval chains, two-person cash handling, designated fund management, and the transparency that protects both the ministry and the leader. Here is my fundraising policy: [PASTE YOURS]

(1) Section 2 covered the approval chain as a protection mechanism — not bureaucracy, but accountability that keeps a leader from being accused of financial mismanagement. Does my policy state explicitly who must approve a fundraiser before it is announced, and what happens if a fundraiser happens without approval? (2) The two-person financial handling principle from the section was non-negotiable — cash should never be counted, transported, or deposited by a single person. Does my policy state this explicitly for every cash-handling scenario, including small fundraisers and weekly giving? (3) Speed the Light and mission trip funds are designated funds — they belong to a specific purpose and cannot be redirected. Does my policy make the designated nature of these funds explicit, including what happens to leftover mission trip funds if a student doesn't go?"`,
       guide:{what:"Clear procedures, approval chain, and transparency. Two-person financial handling.",qs:["Is there an approval chain?","Are designated funds (STL, missions) handled separately?"]},wt:200},
      {id:"stewardship_comm",title:"Stewardship Communication Template",
       trigger:"After Section 2 — Budgeting, Communication, and Serving the Vision",
       desc:"Draft a one-page stewardship report template for quarterly presentation to your senior pastor and church board. Include: budget vs. actual spending, key investments and their ministry impact, upcoming financial needs, and any budget adjustments you're requesting. This is a narrative — it tells the story of how resources became ministry.",
       ph:"QUARTERLY MINISTRY STEWARDSHIP REPORT\nPeriod: [Q1/Q2/Q3/Q4] [Year]\n\nBudget Summary:\n- Allocated: $... | Spent: $... | Remaining: $...\n\nKey Investments This Quarter:\n- [Line item]: $... → Impact: ...\n\nUpcoming Needs:\n- ...\n\nAdjustments Requested:\n- ...",
       ai:`After drafting your template:

"In Section 2 I studied budgeting, communication, and serving the vision — including how to speak the language of a church board, how to make ministry investment legible to people who think in terms of stewardship and organizational health, and how to use financial reporting as a trust-building tool rather than just a compliance requirement. Here is my stewardship report template: [PASTE YOURS]

(1) Section 2 taught that a board member's primary question is not 'what did you spend?' but 'what did it produce?' Does my report template answer that second question for every significant line item, or does it present spending without connecting it to outcome? (2) The section on serving the vision of the senior pastor showed that financial reporting is a form of communication — it either builds confidence or raises questions. Would a board member who has never attended a youth event read this report and understand what the ministry is doing and why it's worth investing in? Or would they need a translation? (3) Is there a section in my template for upcoming needs — not requests, but forward-looking stewardship communication that helps leadership make decisions before a crisis, not after?"`,
       guide:{what:"A narrative that tells the story of how dollars became ministry. Not just numbers.",qs:["Does it tell a story, not just list numbers?","Would a non-ministry board member understand it?"]},wt:200},
      {id:"budget_case",title:"The Budget Case",
       trigger:"After Section 1 — Developing Yourself as a Leader",
       desc:"Draft a persuasive 1–2 paragraph argument for why your church should invest in NextGen ministry at the level you're proposing. Connect budget lines to ministry outcomes. A board member reading this should understand what the money buys and why it matters. This is the document you pull out when someone asks 'Why does youth group need that much?'",
       ph:"Every dollar invested in NextGen ministry at [church name] accomplishes...\n\nSpecifically, [line item] produces [outcome]. [Line item] enables [outcome]...\n\nThe return on investment is not measured in..., but in...",
       ai:`After writing your budget case:

"In Section 1 I studied developing yourself as a leader — including how to cast vision for a ministry in a way that enlists others rather than just informing them, and how to advocate for the NextGen ministry within the larger church ecosystem. Here is my budget case: [PASTE YOURS]

(1) Section 1 covered vision-casting as a leadership skill — the ability to describe a preferred future in terms that move people to invest. Does my budget case describe a preferred future (what students and families will experience because of this investment) or does it defend a current allocation (why we spent what we spent)? Vision versus justification — which is this? (2) The section on leading within a church ecosystem taught that senior pastors and boards are moved by specifics, not generalities. Does my case include at least one specific line item mapped to a specific, describable outcome — not 'curriculum produces growth' but '$X for curriculum produces [specific outcome] in [specific number] of students'? (3) Read my budget case as a board member who has doubts about whether youth ministry is worth the investment. Am I persuaded? What's the weakest sentence — the one most likely to prompt a skeptical question — and have I addressed it?"`,
       guide:{
         what:"A persuasive argument connecting dollars to outcomes. Vision, not justification.",
         qs:["Does it connect specific lines to outcomes?","Does it inspire or just defend?"],
         strong:"Every dollar invested in NextGen at Valley Assembly produces the next generation of disciples, leaders, and missionaries. The $800 small group training budget develops 8 volunteers who collectively invest 4,000 hours into 60 students per year.",
         sNote:"Specific line → specific outcome → compelling math.",
         weak:"Youth ministry is important and we need funding to run a good program.",
         wNote:"No connection to outcomes. No specifics."
       },wt:150}
    ]},
    {id:"d8",num:"Doc 8",title:"12-Month Ministry Plan",desc:"The Vitals-Based Integrating Capstone",
     format:"3 pages • Integrating capstone of the full certificate",
     secs:[
      {id:"vision_yr",title:"Vision Statement for the Year",
       trigger:"After Section 1 — Developing Yourself as a Leader",
       desc:"Write a vision statement for your ministry's upcoming year. Not a mission statement (that's permanent) — a year-specific vision: What is God calling this ministry to focus on, grow into, or step toward in the next 12 months? Write 1–2 paragraphs you could read to your team on the first night of the year.",
       ph:"This year, God is calling [ministry name] to...\n\nWe will know we've stepped toward this vision when...\n\nThis year's anchor: ...",
       ai:`After writing your vision statement:

"In Section 1 of Course 3 I studied developing myself as a leader — including how to set a vision that is specific enough to lead toward rather than manage around, how vision differs from mission (mission is permanent, vision is seasonal), and how a NextGen leader casts vision within a larger church ecosystem rather than in isolation. Here is my year vision statement: [PASTE YOURS]

(1) Section 1 made the distinction between a mission statement (permanent, directional) and a year vision (specific, time-bound, different from last year). Is my statement genuinely year-specific — could it only describe the next 12 months of this particular ministry in this particular season — or is it timeless enough to apply to any year? (2) The section covered how vision functions as a rallying point — it gives a team something to aim toward together. Does my statement include enough concrete specificity that a volunteer reading it would know what to prioritize differently this year than last year? (3) Would a 15-year-old student hear this statement read on the first night of the year and understand what's going to be different — what they'll experience or be invited into that they haven't experienced before? Or is it internal leadership language that doesn't translate to the people being served?"`,
       guide:{what:"Year-specific, team-rallying, distinct from your permanent mission statement.",qs:["Is it this-year specific?","Would a student know what's different?"]},wt:150},
      {id:"teach_plan",title:"Biblical Truth — Teaching Plan",
       trigger:"After Section 4 — Curriculum Design and Annual Planning (NXT-001) + Section 1 — Developing Yourself as a Leader (NXT-003)",
       desc:"Draft your annual teaching plan. Map the year's teaching calendar: series titles or themes by month/quarter, how series connect to the annual vision, what curriculum resources you'll use, and how you balance topical teaching with biblical exposition. Reference your Teaching Philosophy from Doc 1/Doc 2. Include how teaching is evaluated.",
       ph:"Q1 Series: [Title] | [Months] | [Primary Scripture] | [Vision connection]\nQ2 Series: ...\nQ3 Series: ...\nQ4 Series: ...\n\nCurriculum resources: ...\nExpository vs. topical balance: ...\nHow teaching is evaluated: ...",
       ai:`After drafting:

"This document draws on Section 4 — Curriculum Design and Annual Planning (NXT-001) and Section 1 — Developing Yourself as a Leader (NXT-003). In those sections I studied how to build a teaching calendar that serves a formation arc rather than just filling weeks, how to align series to a year vision, and how to evaluate whether teaching is producing the outcomes it was designed to produce. Here is my annual teaching plan: [PASTE YOURS]

(1) Section 4 in NXT-001 taught that a series should have a clear purpose — not just a topic but a formation intention. For each series in my plan, can I state in one sentence what this series is designed to produce in a student who engages with it? If I can only name the subject, not the intended change, the purpose isn't clear enough yet. (2) The curriculum design material covered topical and expository teaching as complementary — topical addresses felt needs, expository builds biblical literacy. Does my year include both? If it's all topical, what biblical navigation capacity am I not developing? If all expository, which pressing questions in students' lives go unaddressed? (3) NXT-003 Section 1 on leadership development included evaluation as a leadership discipline. What is my actual evaluation mechanism for teaching — how will I know six months into the year whether my teaching plan is working, and what will I do if it isn't?"`,
       guide:{what:"Teaching calendar aligned to annual vision and Doc 1 teaching philosophy.",qs:["Does every series connect to the year vision?","Is there a teaching evaluation mechanism?"]},wt:200},
      {id:"encounter",title:"Spiritual Transformation — Encounter Strategy",
       trigger:"After Section 5 — Pentecostal Emphasis on the Holy Spirit (NXT-001) + Section 6 — Spiritual Disciplines and Mentoring (NXT-001)",
       desc:"Draft your spiritual transformation strategy. How does your ministry create space for encounters with God? Cover: altar/response time philosophy, prayer culture (when, how, who leads), Spirit-emphasis integration in weekly programming (not just special services), and how you disciple students through spiritual experiences rather than treating them as isolated events.",
       ph:"Altar/response philosophy: we create space by...\nPrayer culture: ...\nSpirit-emphasis in weekly programming: ...\nHow we disciple through (not just celebrate) spiritual experiences: ...",
       ai:`After drafting:

"This document draws on Section 5 — Pentecostal Emphasis on the Holy Spirit and Section 6 — Spiritual Disciplines and Mentoring (both NXT-001). Section 5 covered how to create environments where genuine Spirit encounters happen, not manufactured emotion. Section 6 covered how to disciple students through spiritual experiences — not just celebrate the moment but build on it through structured practice. Here is my encounter strategy: [PASTE YOURS]

(1) Section 5 showed that Spirit-emphasis requires intentional weekly environment design, not just the presence of a worship band. Looking at a typical Wednesday in my ministry: what specific elements create space for a genuine response to God — and are these present every week, or only when the calendar is cleared for a 'special service'? (2) Section 6 on spiritual disciplines showed that a spiritual experience without follow-up discipleship produces emotional peaks, not lasting formation. For each type of encounter in my strategy (altar response, prayer for healing, Spirit baptism, salvation), what is the specific next step for that student in the following 72 hours — and who is responsible for making it happen? (3) Does my encounter strategy connect explicitly to my Pentecostal Distinctives from Doc 1, or are these two documents describing the same conviction in different language without referencing each other?"`,
       guide:{what:"Weekly Spirit-emphasis, altar philosophy, and discipleship THROUGH (not just after) encounters.",qs:["Is this weekly, not just for special services?","Is there follow-up after spiritual experiences?"]},wt:150},
      {id:"small_grp_plan",title:"Healthy Community — Small Group Plan",
       trigger:"After Section 2 — Small Groups and Discipleship Environments (NXT-002)",
       desc:"Draft your healthy community plan. How are small groups structured (age, gender, interest, neighborhood)? How often do they meet? Who leads them and how are they trained? How does your Community Covenant (from Doc 3/Doc 4) get implemented in practice — not just read aloud but lived? Include your conflict resolution protocols by reference.",
       ph:"Small group structure: grouped by [age/gender/interest?]\nMeeting frequency: ...\nLeader qualifications and training: ...\nSize: ... groups of ... students\nCommunity Covenant implementation: ...\nConflict resolution: see [Doc 3/4] process",
       ai:`After drafting:

"This document draws on Section 2 — Small Groups and Discipleship Environments (NXT-002), where I studied how small groups function as the primary delivery system for culture and discipleship — and why they fail when they're treated as programming rather than community. Here is my small group plan: [PASTE YOURS]

(1) Section 2 showed that community covenants only work when they're referenced in moments of tension, not just read at the beginning of the year. Does my plan describe how the Community Covenant from Doc 3 is actually invoked — in a conflict, in a hard conversation, in a moment when a student breaks the community norm? Or does it get signed and filed? (2) The section covered small group leader training as the single highest-leverage investment in group health — a well-trained leader produces a well-formed group, regardless of the curriculum. Does my leader training pathway in this plan have a specific format, frequency, and content — or is 'trained leaders' still an aspiration without a system? (3) Trace a direct line from my small group plan to my discipleship system in Doc 1/2. Where specifically does small group participation move a student along the discipleship progression I described? If I can't trace that line, the two documents are parallel tracks, not an integrated system."`,
       guide:{what:"Small groups that implement the Community Covenant, with trained leaders and conflict protocols.",qs:["Is the covenant lived, not just recited?","Do leaders have a training pathway?"]},wt:150},
      {id:"missions_cal",title:"Missional Living — Engagement Calendar",
       trigger:"After Section 8 — Local and Global Missions (NXT-002) + Doc 5 complete",
       desc:"Draft your missional engagement calendar. Pull from your Raising Sons & Daughters vision (Doc 5) and expand it month by month: which months feature which missional activities? How do local service projects, BGMC, Speed the Light, Youth Alive, and mission trip preparation fit into the year? Show how missions is a rhythm, not a once-a-year trip.",
       ph:"September: ... October: ... November: BGMC push...\nDecember: STL campaign... January: local service...\nFebruary: ... March: mission trip prep...\nApril: ... May: ... June: mission trip...\nJuly: ... August: ...\n\nMissions is a rhythm because: ...",
       ai:`After drafting:

"This document integrates my work from Section 8 — Local and Global Missions (NXT-002) and the full Doc 5 — Raising Sons and Daughters. Section 8 taught that missions becomes a ministry identity marker when it's embedded monthly rather than scheduled annually. Doc 5 asked me to articulate a pipeline from interested to sent. Here is my missional engagement calendar: [PASTE YOURS]

(1) Count the months in my calendar that have no missional activity — local or global. If the number is more than two, something is wrong. Section 8 showed that an annual missions trip is not a missions culture — it's a missions event. What would need to change to embed something (even small: a BGMC moment, a local service hour, a missionary video) in the months that are currently empty? (2) Does this calendar directly expand on the AG resource map from Doc 5 — can I draw a line from each AG resource I named there to a specific calendar month here? Or did Doc 5 describe the resources while this document describes something different? (3) Local service should appear year-round as a formation rhythm, not just on a 'service Sunday.' Looking at my calendar: how many local service touchpoints appear, and are they connected to real community relationships or are they one-off events?"`,
       guide:{what:"Month-by-month missions rhythm that makes missions a habit, not an event.",qs:["Is missions present in most months?","Does this expand Doc 5's vision?"]},wt:200},
      {id:"leadership_dev",title:"Leadership Development Plan",
       trigger:"After Section 5 — NextGen Leadership Pipeline Development (NXT-003)",
       desc:"Draft your student leadership development plan. When are student leaders identified? What training do they receive and when? What's the progression (attender → participant → student leader → intern)? Add leadership touchpoints to your calendar: training nights, retreats, commissioning.",
       ph:"Progression: Attender → Participant → Student Leader → Intern\nHow identified: ... Training schedule: ... Calendar touchpoints: ...",
       ai:`After drafting:

"In Section 5 — NextGen Leadership Pipeline Development (NXT-003) I studied how to build the early stages of a student leadership system — identifying potential, defining a progression, and creating training structures that develop leaders rather than just use them. Here is my leadership development plan: [PASTE YOURS]

(1) Section 5 showed that the most common failure in student leadership is undefined transitions — students stay at the same stage indefinitely because no one has said what readiness for the next step looks like. For each transition in my plan (attender → participant → student leader → intern), what specific, observable marker signals readiness? Not time served — what can be seen and named? (2) Who is doing the mentoring in this pipeline? If the answer is only me, my pipeline is capped at my personal bandwidth. Section 5 pushed leaders to build mentoring structures where adult volunteers invest in student leaders — does my plan include that layer? (3) Which training nights, retreats, or commissioning moments appear on my actual calendar — or is this pipeline aspirational with no calendar anchor?"`,
       guide:{what:"A concrete progression from attender to intern — observable markers, trained mentors, calendar dates.",qs:["Are stage transitions defined by observable markers?","Are dates on the calendar?"]},wt:150},
      {id:"leadership_pipe",title:"Leadership Development — Student & Volunteer Pipeline",
       trigger:"After Section 5 — NextGen Leadership Pipeline Development (NXT-003)",
       desc:"Draft a student leadership pipeline. How do you identify emerging student leaders? What's the progression (attender → participant → student leader → intern → sent)? What training do student leaders receive? How does this pipeline connect to your volunteer development plan in Doc 6? Include a volunteer development summary that cross-references Doc 6.",
       ph:"Student Pipeline:\nAttender → identified by: ...\nParticipant → how moved: ...\nStudent Leader → training: ...\nIntern → role: ...\nSent → into: ...\n\nVolunteer pipeline cross-reference: see Doc 6 for [recruitment / onboarding / development]",
       ai:`After drafting:

"In Section 5 — NextGen Leadership Pipeline Development (NXT-003) I studied the full arc of developing student leaders — from identifying early potential to establishing a progression where students move from participation to ownership to deployment. The section covered what marks readiness at each stage, how to structure leadership training, and how a student pipeline connects to the volunteer system that sustains a ministry long-term. Here is my leadership development pipeline: [PASTE YOURS]

(1) Section 5 was clear that the most common pipeline failure is undefined transitions — students stay at a stage indefinitely because no one has said what readiness for the next stage looks like. For each transition in my pipeline (attender → participant → student leader → intern), what are the specific, observable markers that signal readiness? Not time served, not 'we sense it' — what can be observed and named? (2) The section connected the student pipeline to the volunteer pipeline as a natural progression — your best student leaders become your best volunteers and eventually your referrals for ministry roles. Does my pipeline explicitly name the handoff point where a student leader could become a volunteer leader, and is that connection visible in Doc 6? (3) Is there at least one calendar date in this pipeline — a specific leadership training night, retreat, or commissioning moment — or is this pipeline entirely aspirational with no calendar anchor?"`,
       guide:{what:"Clear progression from attender to sent, with calendar touchpoints and Doc 6 cross-reference.",qs:["Are stage transitions defined?","Does it cross-reference Doc 6?"]},wt:200},
      {id:"family_integ",title:"Family Integration Touchpoints",
       trigger:"After Section 7 — Family Discipleship and Parent Partnership (NXT-001)",
       desc:"Draft your family integration touchpoints. How and when does the ministry communicate with parents? What events include families? How do you equip parents to disciple their own children at home? Address: regular parent communication rhythms, family events in the calendar, parent resource provision, and how you handle the parent who is disengaged vs. the one who is over-involved.",
       ph:"Weekly communication: ...\nMonthly: ...\nQuarterly family events: ...\nParent equipping resources: ...\n\nFor the disengaged parent: ...\nFor the over-involved parent: ...",
       ai:`After drafting:

// APP STATE
// ══════════════════════════════════════════
let courseId=null, mode='build', docIdx=0, secIdx=0;
let answers={};

function storageKey(){return 'pathway_'+COURSES[courseId].key+'_answers'}
function loadAnswers(){try{answers=JSON.parse(localStorage.getItem(storageKey()))||{}}catch(e){answers={}}}
function saveAnswers(){localStorage.setItem(storageKey(),JSON.stringify(answers))}
function getAnswer(id){return answers[id]||''}
function setAnswer(id,v){answers[id]=v;saveAnswers();updateSidebar();updateStatus()}

function getCourse(){return COURSES[courseId]}
function getDocs(){return getCourse().docs}
function getCurrentDoc(){return getDocs()[docIdx]}
function getCurrentSec(){return getCurrentDoc().secs[secIdx]}
function allSections(){const a=[];getDocs().forEach(d=>d.secs.forEach(s=>a.push({...s,docId:d.id})));return a}
function sectionState(sid){const v=(answers[sid]||'').trim();if(!v)return'empty';const wc=v.split(/\s+/).length;return wc>=20?'done':'partial'}
function totalProgress(){const all=allSections();const done=all.filter(s=>sectionState(s.id)==='done').length;return{done,total:all.length}}

function navigate(dIdx,sIdx){
  docIdx=dIdx;secIdx=sIdx;
  renderMode();
  document.querySelector('.main-panel')&&(document.querySelector('.main-panel').scrollTop=0);
}

// ══════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════
function renderApp(){
  const p=new URLSearchParams(window.location.search);
  const cid=parseInt(p.get('course'));
  const secsParam=p.get('secs'); // e.g. "calling,win,pathway"
  const compile=p.get('view')==='compile';
  if(cid&&COURSES[cid]){
    courseId=cid;loadAnswers();
    if(secsParam){renderMini(secsParam.split(',').map(s=>s.trim()).filter(Boolean))}
    else if(compile){renderMain();setMode('download')}
    else renderMain();
  } else renderSelector();
}

// ── MINI WIDGET (per-section embed) ────────────────────────────
function findSec(id){
  for(const doc of getDocs()){const s=doc.secs.find(x=>x.id===id);if(s) return{sec:s,doc}}
  return null;
}

function renderMini(secIds){
  const c=getCourse();
  const found=secIds.map(id=>findSec(id)).filter(Boolean);
  if(!found.length){document.getElementById('app').innerHTML=`<p style="padding:16px;color:red">Section not found: ${secIds.join(',')}</p>`;return;}

  let html=`<div class="mini-wrap">
  <div class="mini-header outset">
    <div class="tbar"><span class="tbar-txt">📘 ${c.title} — Capstone Builder</span>
    <div class="tbar-btns"><button class="tbtn">_</button><button class="tbtn">□</button><button class="tbtn">✕</button></div></div>
  </div>`;

  found.forEach(({sec,doc},i)=>{
    html+=`<div class="mini-card outset" id="miniCard_${sec.id}">
    <div class="mini-card-hdr">
      <span class="mini-doc-badge">${doc.num}</span>
      <span class="mini-sec-title">${sec.title}</span>
      <span class="mini-wc-chip" id="mwc_${sec.id}">0 wds</span>
    </div>
    <div class="mini-trigger">⏰ <em>${sec.trigger}</em></div>
    <div class="mini-desc">${sec.desc.replace(/\n/g,'<br>')}</div>
    <div class="mini-field-lbl">✍️ Your Notes First <span class="req-badge">THINK FIRST</span></div>
    <textarea class="mini-ta" id="mta_${sec.id}" rows="3" placeholder="${sec.ph}">${esc(getAnswer(sec.id))}</textarea>
    <div class="mini-wc-row">
      <span id="mwclbl_${sec.id}">0 words</span>
      <div class="wc-bar-outer" style="flex:1;margin:0 8px"><div class="wc-bar-inner" id="mwcbar_${sec.id}" style="width:0%"></div></div>
      <span style="color:var(--muted)">~${sec.wt} target</span>
    </div>
    ${!sec.noAI?`<div class="ai-block outset" style="margin-top:8px">
      <div class="ai-hdr" onclick="toggleAI(this)">🤖 Thinking Partner Prompt <span style="font-size:10px;font-weight:normal">(use AFTER writing above) ▼</span></div>
      <div class="ai-body">
        <div class="ai-ethics-note"><strong>Write your own notes first.</strong> Use this prompt to test and deepen your thinking — not to generate content from scratch.</div>
        <div class="ai-prompt-box">${esc(sec.ai)}</div>
        <button class="copy-btn" onclick="copyPrompt('mta_${sec.id}',this)">📋 Copy Prompt</button>
      </div>
    </div>`:`<div class="ai-block outset" style="margin-top:8px"><div class="ai-hdr">🚫 No AI Prompt — This section must come entirely from you</div></div>`}
    </div>`;
  });

  const prog=totalProgress();
  html+=`<div class="mini-footer outset">
    <span>💾 Auto-saved · ${prog.done}/${prog.total} sections complete across this course</span>
    <span class="mini-footer-hint">Complete all sections → go to <strong>Final Capstone</strong> to download</span>
  </div></div>`;

  document.getElementById('app').innerHTML=html;

  // Wire up each textarea
  const autoResizeMini=t=>{t.style.height='auto';t.style.height=t.scrollHeight+'px'};
  found.forEach(({sec})=>{
    const ta=document.getElementById('mta_'+sec.id);
    if(ta){
      miniUpdateWC(sec.id,ta.value);
      autoResizeMini(ta);
      ta.addEventListener('input',e=>{
        setAnswer(sec.id,e.target.value);
        miniUpdateWC(sec.id,e.target.value);
        autoResizeMini(e.target);
        // update footer progress
        const p=totalProgress();
        const ft=document.querySelector('.mini-footer span');
        if(ft) ft.textContent=`💾 Auto-saved · ${p.done}/${p.total} sections complete across this course`;
      });
    }
  });
}

function miniUpdateWC(id,v){
  const w=(!v||v.trim()==='')?0:v.trim().split(/\s+/).length;
  const sec=findSec(id);
  const target=sec?sec.sec.wt:100;
  const lbl=document.getElementById('mwclbl_'+id);
  const bar=document.getElementById('mwcbar_'+id);
  const chip=document.getElementById('mwc_'+id);
  if(lbl) lbl.textContent=w+' word'+(w!==1?'s':'');
  if(bar) bar.style.width=Math.min(100,Math.round(w/target*100))+'%';
  if(chip){chip.textContent=w+' wds';chip.style.color=w>=target?'#2e7d32':w>0?'var(--blue-lt)':'var(--muted)'}
}

function copyPrompt(taId,btn){
  const box=btn.parentElement.querySelector('.ai-prompt-box');
  if(box){navigator.clipboard.writeText(box.textContent).then(()=>{btn.textContent='✅ Copied!';setTimeout(()=>btn.textContent='📋 Copy Prompt',2000)});}
}

function renderSelector(){
  document.getElementById('app').innerHTML=`
  <div class="outset">
    <div class="tbar"><span class="tbar-txt">📘 Pathway Capstone Assistant</span><div class="tbar-btns"><button class="tbtn">_</button><button class="tbtn">□</button><button class="tbtn">✕</button></div></div>

}

function startCourse(n){courseId=n;loadAnswers();renderMain()}

function buildSidebarHTML(prefix){
  let html='';
  getDocs().forEach((doc,di)=>{
    const docDone=doc.secs.filter(s=>sectionState(s.id)==='done').length;
    html+=`<div class="doc-group">
      <div class="doc-hdr" onclick="toggleDocSecs('${prefix}',${di})">
        <span>${doc.num}: ${doc.title}</span>
        <span style="font-size:9px;font-weight:normal;color:var(--muted)">${docDone}/${doc.secs.length}</span>
      </div>
      <div id="${prefix}DocSecs_${di}">`;
    doc.secs.forEach((sec,si)=>{
      const st=sectionState(sec.id);
      const active=(di===docIdx&&si===secIdx&&(mode==='build'||mode==='guide'));
      html+=`<div class="sec-item ${active?'active':''}" onclick="navigate(${di},${si});setMode(mode==='guide'?'guide':'build');closeMobileSidebar()">
        <div class="sec-dot ${st}"></div>
        <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${sec.title}</span>
      </div>`;
    });
    html+='</div></div>';
  });
  return html;
}

function updateSidebar(){
  if(!courseId) return;
  const prog=totalProgress();
  // Desktop sidebar
  const sbp=document.getElementById('sbProg');
  if(sbp) sbp.textContent=prog.done+'/'+prog.total;
  const sb=document.getElementById('sbScroll');
  if(sb) sb.innerHTML=buildSidebarHTML('sb');
  // Mobile drawer
  const dp=document.getElementById('drawerProg');
  if(dp) dp.textContent=prog.done+'/'+prog.total;
  const dr=document.getElementById('drawerScroll');
  if(dr) dr.innerHTML=buildSidebarHTML('dr');
  // Mobile top nav labels
  const sec=getCurrentSec(),doc=getCurrentDoc();
  const ml=document.getElementById('mobileDocLabel');
  const mt=document.getElementById('mobileSectionTitle');
  const mp=document.getElementById('mobileProg');
  if(ml) ml.textContent=doc.num;
  if(mt) mt.textContent=sec.title;
  if(mp) mp.textContent=prog.done+'/'+prog.total;
}

function toggleDocSecs(prefix,di){
  const el=document.getElementById(prefix+'DocSecs_'+di);
  if(el) el.style.display=el.style.display==='none'?'':'none';
}

function openMobileSidebar(){
  document.getElementById('sbOverlay').classList.add('open');
  document.getElementById('sbDrawer').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeMobileSidebar(){
  document.getElementById('sbOverlay').classList.remove('open');
  document.getElementById('sbDrawer').classList.remove('open');
  document.body.style.overflow='';
}

function toggleDoc(di){
  const el=document.getElementById('docSecs_'+di);
  if(el) el.style.display=el.style.display==='none'?'':'none';
}

function setMode(m){mode=m;renderMode();updateSidebar()}

function renderMode(){
  const mc=document.getElementById('mainContent');
  if(!mc) return;
  document.querySelectorAll('.mbtn').forEach((b,i)=>{
    const modes=['guide','build','preview','download'];
    b.classList.toggle('active',modes[i]===mode);
  });
  if(mode==='build') mc.innerHTML=renderBuild();
  else if(mode==='guide') mc.innerHTML=renderGuide();
  else if(mode==='preview') mc.innerHTML=renderPreview();
  else if(mode==='download') mc.innerHTML=renderDownload();
  if(mode==='build'){
    const ta=document.getElementById('secTA');
    if(ta){
      const autoResize=t=>{t.style.height='auto';t.style.height=t.scrollHeight+'px'};
      ta.addEventListener('input',e=>{setAnswer(getCurrentSec().id,e.target.value);updateWC(e.target.value,getCurrentSec().wt);autoResize(e.target)});
      autoResize(ta);
    }
  }
  updateStatus();
}

function renderBuild(){
  const doc=getCurrentDoc(), sec=getCurrentSec();
  const val=getAnswer(sec.id);
  let html=`<div class="build-wrap">`;
  if(doc.interviewReq&&sec.interviewReq){
    html+=`<div class="interview-req"><strong>⚠️ Interview Required</strong> — Before completing this section, you must interview a district official (Secretary, DYD, or Sectional Presbyter). Minimum 15–20 minutes. Schedule early in the course.</div>`;
  }
  if(doc.spreadsheetNote){
    html+=`<div class="spreadsheet-note"><strong>📊 Spreadsheet Note</strong> — Doc 7 includes a working .xlsx spreadsheet as a separate deliverable. Use this tool to draft your narrative content. The spreadsheet with formulas and real dollar amounts is submitted alongside these notes.</div>`;
  }
  html+=`<div class="sec-badge">${doc.num} › Section ${secIdx+1}</div>
  <div class="sec-title">${sec.title}</div>
  <div class="trigger-box">⏰ <em>${sec.trigger}</em></div>
  <div class="sec-desc">${sec.desc.replace(/\n/g,'<br>')}</div>
  <div class="field-label">✍️ Your Notes First <span class="req-badge">THINK FIRST</span></div>
  <textarea id="secTA" rows="3" placeholder="${sec.ph}">${esc(val)}</textarea>
  <div class="wc-row">
    <span id="wcLabel">0 words</span>
    <div class="wc-bar-outer"><div class="wc-bar-inner" id="wcBar" style="width:0%"></div></div>
    <span style="color:var(--muted)">target: ~${sec.wt}</span>
  </div>`;

  if(!sec.noAI){
    html+=`<div class="ai-block outset">
      <div class="ai-hdr" onclick="toggleAI(this)">
        🤖 Thinking Partner Prompt <span style="font-size:10px;font-weight:normal">(use AFTER writing above) ▼</span>
      </div>
      <div class="ai-body" id="aiBody">
        <div class="ai-ethics-note"><strong>Ethical use:</strong> Write your own notes first. Use this prompt to test and deepen your thinking — not to generate content from scratch. AI cannot know your story, your community, or your convictions.</div>
        <div class="ai-prompt-box">${esc(sec.ai)}</div>
        <button class="copy-btn" onclick="copyAI()">📋 Copy Prompt</button>
      </div>
    </div>`;
  } else {
    html+=`<div class="ai-block outset">
      <div class="ai-hdr">🚫 No AI Prompt for This Section</div>
      <div class="ai-body open" style="display:block">
        <div class="ai-ethics-note"><strong>This section must come entirely from you.</strong> ${sec.ai||'No AI prompt available for this section.'}</div>
      </div>
    </div>`;
  }

  // Navigation
  const allSecs=allSections();
  const flatIdx=allSecs.findIndex(s=>s.id===sec.id);
  const prevSec=flatIdx>0?allSecs[flatIdx-1]:null;
  const nextSec=flatIdx<allSecs.length-1?allSecs[flatIdx+1]:null;
  let prevDocIdx=docIdx,prevSecIdx=secIdx-1;
  if(prevSecIdx<0){if(docIdx>0){prevDocIdx=docIdx-1;prevSecIdx=getDocs()[prevDocIdx].secs.length-1}}
  let nextDocIdx=docIdx,nextSecIdx=secIdx+1;
  if(nextSecIdx>=getCurrentDoc().secs.length){nextDocIdx=docIdx+1;nextSecIdx=0}

  html+=`<div class="nav-row">
    <button class="win-btn" onclick="navigate(${prevDocIdx},${prevSecIdx})" ${!prevSec?'disabled':''}>‹ Previous</button>
    <button class="win-btn" onclick="setMode('guide')">📖 Guide</button>
    <button class="win-btn primary" onclick="${nextSec?`navigate(${nextDocIdx},${nextSecIdx})`:`setMode('preview')`}">${nextSec?'Next ›':'👁️ Preview'}</button>
  </div>`;
  html+='</div>';

  setTimeout(()=>{
    const ta=document.getElementById('secTA');
    if(ta){ta.addEventListener('input',e=>{setAnswer(sec.id,e.target.value);updateWC(e.target.value,sec.wt)});updateWC(getAnswer(sec.id),sec.wt)}
  },0);
  return html;
}

function renderGuide(){
  const doc=getCurrentDoc(),sec=getCurrentSec();
  const g=sec.guide||{};
  let html=`<div class="guide-wrap">
  <h2>${sec.title}</h2>
  <div style="font-size:10px;color:var(--muted);margin-bottom:8px;font-style:italic">⏰ ${sec.trigger}</div>`;
  if(g.what) html+=`<p>${g.what}</p>`;
  if(g.qs&&g.qs.length){
    html+=`<div class="kq-box"><strong>🔑 Ask Yourself:</strong><ul>${g.qs.map(q=>`<li>${q}</li>`).join('')}</ul></div>`;
  }
  if(g.strong){
    html+=`<div class="ex-box good"><div class="ex-label">✅ STRONG</div>${g.strong}${g.sNote?`<div class="ex-note">💡 ${g.sNote}</div>`:''}`;
    html+=`</div>`;
  }
  if(g.weak){
    html+=`<div class="ex-box bad"><div class="ex-label">❌ WEAK</div>${g.weak}${g.wNote?`<div class="ex-note">💡 ${g.wNote}</div>`:''}`;
    html+=`</div>`;
  }
  html+=`<h3>Format</h3><p style="font-size:10px;color:var(--muted)">${doc.format}</p>`;
  html+=`<div style="margin-top:12px"><button class="win-btn primary" onclick="setMode('build')">✍️ Write This Section</button></div>`;
  html+='</div>';
  return html;
}

function renderPreview(){
  const c=getCourse();
  let html=`<div class="preview-wrap">`;
  getDocs().forEach((doc,di)=>{
    if(doc.id.startsWith('dx')&&di>0) html+=`<div style="margin-top:8px"></div>`;
    html+=`<div class="page">
    <div class="page-title">${doc.title}</div>
    <div class="page-sub">${c.title} — ${doc.desc}</div>
    <div class="page-meta">Pathway Ministry Institute · Northern California & Nevada District · Assemblies of God</div>
    <hr>`;
    doc.secs.forEach(sec=>{
      const val=(answers[sec.id]||'').trim();
      html+=`<div class="page-sh">${sec.title}</div>`;
      html+=val?`<p class="page-body">${esc(val).replace(/\n/g,'<br>')}</p>`:`<p class="page-empty">[Complete this section in Build mode]</p>`;
    });
    const wc=doc.secs.reduce((t,s)=>{const v=(answers[s.id]||'').trim();return t+(v?v.split(/\s+/).length:0)},0);
    html+=`<div class="page-num">Word count: ${wc} | ${doc.num}: ${doc.title}</div></div>`;
  });
  html+='</div>';
  return html;
}

function renderDownload(){
  const c=getCourse();
  const prog=totalProgress();
  return`<div class="dl-wrap">
  <h2 style="font-family:'VT323',monospace;font-size:16px;color:var(--blue);margin-bottom:8px">Download Your Draft</h2>
  <p style="font-size:11px;color:var(--muted);margin-bottom:10px">Sections complete: <strong>${prog.done}/${prog.total}</strong></p>
  ${c.docs.filter(d=>!d.id.startsWith('dx')).map((doc,i)=>`
  <button class="dl-btn" onclick="dlDoc(${i})">
    <div class="dl-icon">💾</div>
    <div class="dl-info"><strong>Download ${doc.num}: ${doc.title}</strong><span>${doc.desc} · ${doc.format}</span></div>
  </button>`).join('')}
  <button class="dl-btn" onclick="dlAll()" style="margin-top:4px">
    <div class="dl-icon">📦</div>
    <div class="dl-info"><strong>Download All Documents</strong><span>Complete capstone package as one .docx file</span></div>
  </button>
  <div class="steps-box">
    <h3>📋 Next Steps After Downloading</h3>
    <ol>
      <li><strong>Open in Word or Google Docs</strong> — your draft is a starting point, not a finished paper.</li>
      <li><strong>Rewrite into polished paragraphs</strong> — turn raw notes into connected, flowing prose that sounds like you.</li>
      <li><strong>Voice check:</strong> read every paragraph aloud. If it doesn't sound like how you actually talk, rewrite it.</li>
      <li><strong>Check format:</strong> ${c.id===1?'Doc 1: paragraph form, 1–2 pages, double-spaced, 12pt TNR. Doc 2: structured outline/table.':c.id===2?'Doc 3: 2 pages with district interview notes attached. Doc 4: 2 pages. Doc 5: 1 page.':'Doc 6: 2 pages + appended templates. Doc 7: narrative + .xlsx spreadsheet. Doc 8: 3 pages.'}</li>
      <li><strong>Complete peer/pastor review</strong> as required by your instructor.</li>
      <li><strong>Submit in Talent LMS</strong> using the upload button in your course — NOT back to this tool.</li>
    </ol>
  </div>
  <div class="remind-card">
    <div class="remind-tbar">⚠️ Submit in Talent LMS — Not Here</div>
    <div class="remind-body">
      <div class="remind-icon">📤</div>
      <div class="remind-txt"><strong>Upload your final edited version to Talent LMS</strong>
      <p>This tool helps you collect and draft your ideas. After downloading and editing your final document in Word or Google Docs, submit it using the assignment upload button in your Talent LMS course. Your instructor will grade it there.</p></div>
    </div>
  </div>
  </div>`;
}

// ══════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════
function esc(t){return(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function toggleAI(hdr){const b=hdr.nextElementSibling;b.classList.toggle('open')}
function copyAI(){const box=document.querySelector('.ai-prompt-box');if(box){navigator.clipboard.writeText(box.textContent).then(()=>{const btn=document.querySelector('.copy-btn');if(btn){btn.textContent='✅ Copied!';setTimeout(()=>btn.textContent='📋 Copy Prompt',2000)}})}}
function updateWC(v,target){
  const w=(v||'').trim()===''?0:(v||'').trim().split(/\s+/).length;
  const wcl=document.getElementById('wcLabel');
  const wcb=document.getElementById('wcBar');
  if(wcl) wcl.textContent=w+' word'+(w!==1?'s':'');
  if(wcb) wcb.style.width=Math.min(100,Math.round(w/(target||100)*100))+'%';
}
function updateStatus(){
  const sl=document.getElementById('stLeft'),sr=document.getElementById('stRight');
  if(!sl||!courseId) return;
  const sec=getCurrentSec();
  sl.textContent=(mode==='build'||mode==='guide')?sec.title:'Mode: '+mode;
  const allWC=allSections().reduce((t,s)=>{const v=(answers[s.id]||'').trim();return t+(v?v.split(/\s+/).length:0)},0);
  if(sr) sr.textContent=allWC+' wds total';
}

// ══════════════════════════════════════════
// DOCX GENERATION
// ══════════════════════════════════════════
function buildDocx(docs){
  const D=docx,ch=[];
  const c=getCourse();
  ch.push(new D.Paragraph({alignment:D.AlignmentType.CENTER,spacing:{after:60},children:[new D.TextRun({text:c.title,bold:true,size:32,font:'Times New Roman'})]}));
  ch.push(new D.Paragraph({alignment:D.AlignmentType.CENTER,spacing:{after:40},children:[new D.TextRun({text:c.subtitle,size:24,font:'Times New Roman',color:'444444'})]}));
  ch.push(new D.Paragraph({alignment:D.AlignmentType.CENTER,spacing:{after:40},children:[new D.TextRun({text:c.tagline,size:20,font:'Times New Roman',color:'888888',italics:true})]}));
  ch.push(new D.Paragraph({alignment:D.AlignmentType.CENTER,spacing:{after:200},children:[new D.TextRun({text:'Pathway Ministry Institute · Northern California & Nevada District · Assemblies of God',size:18,font:'Times New Roman',color:'888888'})]}));
  ch.push(new D.Paragraph({spacing:{after:240},border:{bottom:{style:'single',size:6,color:'CCCCCC',space:1}},children:[]}));

  docs.forEach((doc,di)=>{
    if(di>0) ch.push(new D.Paragraph({pageBreakBefore:true,children:[new D.TextRun({text:''})]}));
    ch.push(new D.Paragraph({spacing:{before:200,after:80},children:[new D.TextRun({text:`${doc.num}: ${doc.title}`,bold:true,size:28,font:'Times New Roman'})]}));
    ch.push(new D.Paragraph({spacing:{after:200},border:{bottom:{style:'single',size:4,color:'CCCCCC',space:1}},children:[new D.TextRun({text:doc.desc+' · '+doc.format,size:18,font:'Times New Roman',color:'888888',italics:true})]}));
    doc.secs.forEach(sec=>{
      const val=(answers[sec.id]||'').trim();
      ch.push(new D.Paragraph({spacing:{before:240,after:80},children:[new D.TextRun({text:sec.title,bold:true,size:24,font:'Times New Roman'})]}));
      if(val){
        val.split(/\n\n+/).forEach((p,pi)=>{const t=p.trim();if(t) ch.push(new D.Paragraph({spacing:{line:480},indent:pi>0?{firstLine:720}:undefined,children:[new D.TextRun({text:t,size:24,font:'Times New Roman'})]}))});
      } else {
        ch.push(new D.Paragraph({spacing:{line:480},children:[new D.TextRun({text:'[Complete this section]',size:24,font:'Times New Roman',color:'BBBBBB',italics:true})]}));
      }
    });
  });

  return new D.Document({sections:[{properties:{page:{size:{width:12240,height:15840},margin:{top:1440,right:1440,bottom:1440,left:1440}}},children:ch}]});
}

function dlDoc(docIdx){
  const doc=getDocs()[docIdx];
  const wc=doc.secs.reduce((t,s)=>{const v=(answers[s.id]||'').trim();return t+(v?v.split(/\s+/).length:0)},0);
  if(wc===0){alert('Complete some sections first.');return}
  const d=buildDocx([doc]);
  docx.Packer.toBlob(d).then(b=>saveAs(b,`Pathway_${getCourse().key}_${doc.id}.docx`)).catch(e=>{console.error(e);alert('Download error. Try again.')});
}

function dlAll(){
  const prog=totalProgress();
  if(prog.done===0){alert('Complete some sections first.');return}
  const d=buildDocx(getDocs());
  docx.Packer.toBlob(d).then(b=>saveAs(b,`Pathway_${getCourse().key}_Capstone_All.docx`)).catch(e=>{console.error(e);alert('Download error. Try again.')});
}

renderApp();

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pathway Coach — W98 Edition</title>
<style>
  :root {
    --w98-bg: #c0c0c0;
    --w98-face: #c0c0c0;
    --w98-dark: #808080;
    --w98-darker: #404040;
    --w98-white: #ffffff;
    --w98-title: #000080;
    --w98-title-text: #ffffff;
    --w98-black: #000000;
    --w98-teal: #008080;
    --w98-field: #ffffff;
    --w98-field-text: #000000;
    --w98-font: Tahoma, 'Segoe UI', Geneva, Verdana, sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: transparent;
    font-family: var(--w98-font);
    color: var(--w98-black);
  }
  body {
    padding: 20px 12px 0;
    display: flex;
    justify-content: center;
    overflow: visible;
  }
  .w98-window {
    width: 100%; max-width: 780px;
    background: var(--w98-face);
    border: 2px solid;
    border-color: var(--w98-white) var(--w98-black) var(--w98-black) var(--w98-white);
    box-shadow: 1px 1px 0 var(--w98-darker);
    margin-bottom: 8px;
  }
  .w98-titlebar {
    height: 22px;
    background: linear-gradient(90deg, var(--w98-title), #1084d0);
    display: flex; align-items: center;
    padding: 0 3px; gap: 4px; user-select: none;
  }
  .w98-titlebar-icon {
    width: 16px; height: 16px;
    display: flex; align-items: center; justify-content: center;
  }
  .w98-titlebar-icon svg { width: 14px; height: 14px; }
  .w98-titlebar-text {
    flex: 1; font-family: var(--w98-font);
    font-size: 12px; color: var(--w98-title-text); font-weight: 700;
    letter-spacing: 0.5px; white-space: nowrap; overflow: hidden;
  }
  .w98-titlebar-btns { display: flex; gap: 2px; }
  .w98-tbtn {
    width: 16px; height: 14px; background: var(--w98-face);
    border: 1px solid;
    border-color: var(--w98-white) var(--w98-darker) var(--w98-darker) var(--w98-white);
    display: flex; align-items: center; justify-content: center;
    cursor: default; font-family: var(--w98-font);
    font-size: 10px; line-height: 1; padding: 0; color: var(--w98-black);
  }
  .w98-tbtn:active {
    border-color: var(--w98-darker) var(--w98-white) var(--w98-white) var(--w98-darker);
  }
  .w98-content { padding: 6px; }

  /* Body: portrait + speech area */
  .w98-coach-body {
    display: flex;
    gap: 8px;
    align-items: stretch;
  }
  .w98-portrait {
    flex: 0 0 auto;
    width: 112px; height: 112px;
    background: #000;
    border: 2px solid;
    border-color: var(--w98-darker) var(--w98-white) var(--w98-white) var(--w98-darker);
    overflow: hidden;
    position: relative;
    image-rendering: pixelated;
  }
  .w98-portrait img {
    width: 100%; height: 100%;
    /* Crop the 1024×1024 character PNG to a face/torso avatar so the
       character reads at small sizes instead of shrinking to a thumbnail */
    object-fit: cover;
    object-position: center 18%;
    image-rendering: pixelated;
    display: block;
  }
  /* Very subtle "talking" bob so it reads as alive but stays Win98-calm */
  .w98-portrait.is-talking img {
    animation: w98-bob 0.32s steps(2) infinite;
  }
  @keyframes w98-bob {
    0%   { transform: translateY(0); }
    100% { transform: translateY(-2px); }
  }

  .w98-speech {
    flex: 1 1 auto;
    min-width: 0;
    display: flex;
    flex-direction: column;
  }
  .w98-speech-label {
    font-family: var(--w98-font);
    font-size: 12px;
    font-weight: 700;
    color: var(--w98-black);
    margin-bottom: 5px;
    padding-bottom: 4px;
    border-bottom: 1px solid var(--w98-dark);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .w98-speech-label::before {
    content: "💬";
    font-size: 12px;
    line-height: 1;
  }
  .w98-speech-field {
    flex: 1;
    font-family: var(--w98-font);
    font-size: 12px;
    line-height: 1.5;
    color: var(--w98-field-text);
    background: var(--w98-field);
    border: 2px solid;
    border-color: var(--w98-darker) var(--w98-white) var(--w98-white) var(--w98-darker);
    padding: 6px 8px;
    min-height: 52px;
    white-space: pre-wrap;
    word-wrap: break-word;
    overflow-wrap: break-word;
    position: relative;
  }
  .w98-cursor {
    display: inline-block;
    width: 7px;
    height: 12px;
    background: var(--w98-field-text);
    vertical-align: text-bottom;
    margin-left: 1px;
    animation: w98-blink 0.9s step-end infinite;
  }
  @keyframes w98-blink {
    50% { opacity: 0; }
  }
  .w98-continue {
    align-self: flex-end;
    font-family: var(--w98-font);
    font-size: 10px;
    color: var(--w98-dark);
    margin-top: 4px;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .w98-continue.is-visible {
    opacity: 1;
    animation: w98-blink 1.1s step-end infinite;
  }

  /* Fallback portrait if no image is provided — pixel silhouette */
  .w98-portrait[data-empty="1"] {
    background:
      linear-gradient(180deg, #3a4a66 0 60%, #222 60% 100%);
  }
  .w98-portrait[data-empty="1"]::after {
    content: "";
    position: absolute;
    inset: 22% 30% 10% 30%;
    background: rgba(255,255,255,0.15);
    clip-path: polygon(30% 0, 70% 0, 78% 28%, 85% 65%, 70% 100%, 30% 100%, 15% 65%, 22% 28%);
  }

  /* ══ DARK MODE — mirrors the player ══ */
  @media (prefers-color-scheme: dark) {
    :root {
      --w98-bg: #3a3a3a;
      --w98-face: #3a3a3a;
      --w98-dark: #1a1a1a;
      --w98-darker: #0a0a0a;
      --w98-white: #5a5a5a;
      --w98-title: #000060;
      --w98-title-text: #ffffff;
      --w98-black: #000000;
      --w98-teal: #00a0a0;
      --w98-field: #1e1e1e;
      --w98-field-text: #d0d0d0;
    }
    html, body { color: #d0d0d0; }
    .w98-titlebar {
      background: linear-gradient(90deg, #000060, #0a5090);
    }
    .w98-tbtn { color: #d0d0d0; }
    .w98-speech-label { color: #d0d0d0; border-bottom-color: var(--w98-dark); }
    .w98-speech-field { background: var(--w98-field); color: var(--w98-field-text); }
    .w98-cursor { background: var(--w98-field-text); }
    .w98-continue { color: #888; }
  }

  @media (max-width: 480px) {
    body { padding: 8px 4px 0; }
    .w98-portrait { width: 88px; height: 88px; }
    .w98-speech-field { font-size: 12px; }
  }
</style>
</head>
<body>
<div class="w98-window" id="w98Window">
  <div class="w98-titlebar">
    <div class="w98-titlebar-icon">
      <svg viewBox="0 0 16 16" fill="none">
        <rect x="2" y="3" width="12" height="9" fill="var(--w98-title-text)" stroke="var(--w98-title-text)" stroke-width="0.5"/>
        <rect x="3" y="4" width="10" height="6" fill="var(--w98-title)"/>
        <circle cx="5" cy="6" r="0.7" fill="var(--w98-title-text)"/>
        <rect x="4" y="7.5" width="8" height="0.6" fill="var(--w98-title-text)"/>
        <rect x="4" y="8.6" width="6" height="0.6" fill="var(--w98-title-text)"/>
      </svg>
    </div>
    <span class="w98-titlebar-text" id="w98Title">coach_message.exe</span>
    <div class="w98-titlebar-btns">
      <button class="w98-tbtn" type="button" id="w98Min">_</button>
      <button class="w98-tbtn" type="button" id="w98Close">✕</button>
    </div>
  </div>
  <div class="w98-content">
    <div class="w98-coach-body">
      <div class="w98-portrait" id="w98Portrait" data-empty="1"></div>
      <div class="w98-speech">
        <div class="w98-speech-label" id="w98SpeakerLabel">Coach</div>
        <div class="w98-speech-field" id="w98SpeechText"></div>
        <div class="w98-continue" id="w98Continue">▼ click to replay</div>
      </div>
    </div>
  </div>
</div>

<script>
(function () {
  "use strict";

  // ─── URL-param config (mirrors the player's base64 convention) ────────────
  var params = new URLSearchParams(window.location.search);
  function decodeB64Text(p) {
    var v = params.get(p);
    if (!v) return "";
    try { return decodeURIComponent(escape(atob(v))); } catch (e) {
      try { return decodeURIComponent(atob(v)); } catch (_) { return ""; }
    }
  }
  function decodeB64(p) {
    var v = params.get(p);
    if (!v) return "";
    try { return atob(v); } catch (e) { return ""; }
  }

  // Char 1 = soccer, 2 = umpire, 3 = boxer. User puts PNGs in ./characters/
  var charNum  = parseInt(params.get("char") || "1", 10);
  if ([1,2,3].indexOf(charNum) === -1) charNum = 1;

  var defaults = {
    1: { name: "COACH MARA",
         img:         "https://pathway.training/wp-content/uploads/2026/04/Untitled-design-1.png",
         imgFallback: "characters/course1.png",
         text: "Watch her plant foot on the strike. Non-kicking foot next to the ball, toes pointed at target. That's where accuracy comes from." },
    2: { name: "UMP BUCK",    img: "characters/course2.png",
         text: "Keep your eyes on the runner's foot AND the base. Don't commit to the call until you see both in the same frame." },
    3: { name: "COACH DEE",   img: "characters/course3.png",
         text: "His hands stay glued to his cheeks between combos. That's the habit you're building this week — hands up, always." }
  };
  var d = defaults[charNum] || defaults[1];

  var imgUrl      = decodeB64("img") || params.get("imgSrc") || d.img;
  var imgFallback = d.imgFallback || "";
  var name   = decodeB64Text("name") || params.get("name") || d.name;
  var text   = decodeB64Text("text") || params.get("text") || d.text;
  var speed  = parseInt(params.get("speed") || "30", 10);  // ms / char
  var startDelay = parseInt(params.get("delay") || "400", 10);
  var loop   = params.get("loop") === "1" || params.get("loop") === "true";
  var title  = decodeB64Text("title") || ("coach_message_" + charNum + ".exe");

  // ─── Wire up DOM ──────────────────────────────────────────────────────────
  var portraitEl = document.getElementById("w98Portrait");
  var labelEl    = document.getElementById("w98SpeakerLabel");
  var textEl     = document.getElementById("w98SpeechText");
  var contEl     = document.getElementById("w98Continue");
  var titleEl    = document.getElementById("w98Title");
  var minBtn     = document.getElementById("w98Min");
  var closeBtn   = document.getElementById("w98Close");
  var windowEl   = document.getElementById("w98Window");

  titleEl.textContent = title;
  labelEl.textContent = name;

  if (imgUrl) {
    var img = document.createElement("img");
    img.alt = name;
    var triedFallback = false;
    img.onload = function () { portraitEl.removeAttribute("data-empty"); };
    img.onerror = function () {
      // If the local/user-provided URL 404s, try the CDN fallback once.
      if (!triedFallback && imgFallback && img.src !== imgFallback) {
        triedFallback = true;
        img.src = imgFallback;
      }
      // Else: leave the silhouette placeholder
    };
    img.src = imgUrl;
    portraitEl.appendChild(img);
  }

  // ─── Typewriter ───────────────────────────────────────────────────────────
  var cancel = null;
  function typewrite(fullText) {
    if (cancel) cancel();
    textEl.textContent = "";
    contEl.classList.remove("is-visible");
    portraitEl.classList.add("is-talking");

    var cursor = document.createElement("span");
    cursor.className = "w98-cursor";
    textEl.appendChild(cursor);

    var i = 0, cancelled = false;
    function step() {
      if (cancelled) return;
      if (i >= fullText.length) {
        portraitEl.classList.remove("is-talking");
        contEl.classList.add("is-visible");
        notifyHeight();
        return;
      }
      var ch = fullText.charAt(i++);
      cursor.remove();
      textEl.appendChild(document.createTextNode(ch));
      textEl.appendChild(cursor);
      var pause = ",.!?;:".indexOf(ch) >= 0 ? speed * 5 : speed;
      setTimeout(step, pause);
      notifyHeight();
    }
    setTimeout(step, startDelay);
    cancel = function () { cancelled = true; };
  }

  // ─── Title-bar button behavior (cosmetic, matches player) ────────────────
  minBtn.addEventListener("click", function () {
    windowEl.querySelector(".w98-content").style.display =
      windowEl.querySelector(".w98-content").style.display === "none" ? "" : "none";
    notifyHeight();
  });
  closeBtn.addEventListener("click", function () {
    windowEl.style.display = "none";
    notifyHeight();
  });

  // Click the speech area (after typing finishes, or always if loop) to replay
  textEl.parentElement.addEventListener("click", function () {
    if (loop || contEl.classList.contains("is-visible")) typewrite(text);
  });

  // ─── Auto-start when the iframe comes into view ──────────────────────────
  if ("IntersectionObserver" in window) {
    var io = new IntersectionObserver(function (entries) {
      entries.forEach(function (en) {
        if (en.isIntersecting) { typewrite(text); io.disconnect(); }
      });
    }, { threshold: 0.3 });
    io.observe(windowEl);
  } else {
    typewrite(text);
  }

  // ─── Post height to parent so the iframe can auto-resize ─────────────────
  var lastH = 0;
  function notifyHeight() {
    var h = document.documentElement.scrollHeight;
    if (h === lastH) return;
    lastH = h;
    try {
      window.parent.postMessage(
        { type: "pathway-coach-height", height: h, charNum: charNum },
        "*"
      );
    } catch (e) {}
  }
  window.addEventListener("load", notifyHeight);
  window.addEventListener("resize", notifyHeight);
})();
</script>
</body>
</html>

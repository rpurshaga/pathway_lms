<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Course Completion</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: transparent;
    }

    #pathway-container {
      position: relative;
      width: 100vw;
      margin-left: calc(-50vw + 50%);
      aspect-ratio: 9 / 16;
      overflow: hidden;
    }

    #pathway-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    #pathway-container .pway {
      position: absolute;
      cursor: pointer;
      display: block;
      border-radius: 8px;
    }

    /* Button positions */
    #pathway-container .celebrate  { left: 34%; top: 31.3%; width: 30%; height: 8.6%; border-radius: 20px; }
    #pathway-container .instagram  { left: 34%; top: 59.5%; width: 30%; height: 8.3%; border-radius: 20px; }
    #pathway-container .facebook   { left: 34%; top: 69.7%; width: 30%; height: 8.3%; border-radius: 20px; }
    #pathway-container .youtube    { left: 34%; top: 79.8%; width: 30%; height: 8.3%; border-radius: 20px; }
    #pathway-container .catalog    { left: 14%; top: 94.7%; width: 20%; height: 3.3%; border-radius: 0px; }
    #pathway-container .transcript { left: 39%; top: 94.7%; width: 20%; height: 3.3%; border-radius: 0px; }
    #pathway-container .catvids    { left: 64%; top: 94.7%; width: 20%; height: 3.3%; border-radius: 0px; }
  </style>
</head>
<body>
  <div id="pathway-container">
    <video id="pathway-video" autoplay loop muted playsinline>
      <source src="https://pathway.training/wp-content/uploads/2026/03/This_game_uses_isometric_pixel_art___a_top_down__angled_view_that_creates_a_pseudo_3D_office_world_w.mp4" type="video/mp4">
    </video>
    <a class="pway celebrate"  href="https://www.youtube.com/watch?v=3GwjfUFyY6M" target="_blank" rel="noopener noreferrer"></a>
    <a class="pway instagram"  href="https://www.instagram.com/pathway_ed" target="_blank" rel="noopener noreferrer"></a>
    <a class="pway facebook"   href="https://www.facebook.com/PathwayMinistries/" target="_blank" rel="noopener noreferrer"></a>
    <a class="pway youtube"    href="https://www.youtube.com/channel/UCyNaN3LbsuxPwBTxdmBCydw" target="_blank" rel="noopener noreferrer"></a>
    <a class="pway catalog"    href="https://courses.pathway.training/catalog/index?_gl=1*1eckzsh*_gcl_au*MTM3NTkyMzY0NC4xNzY1NDgzNTY3" target="_blank" rel="noopener noreferrer"></a>
    <a class="pway transcript" href="https://form.typeform.com/to/i13lUVOL" target="_blank" rel="noopener noreferrer"></a>
    <a class="pway catvids"    href="https://www.youtube.com/watch?v=bv3hXOCfdAw" target="_blank" rel="noopener noreferrer"></a>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Course Completion</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: transparent; overflow: hidden; }
    #pathway-container {
      position: relative;
      width: 100vw;
      margin-left: calc(-50vw + 50%);
      aspect-ratio: 9 / 16;
      overflow: hidden;
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
  </style>
</head>
<body>
  <div id="pathway-container">
    <video id="vid" autoplay loop muted playsinline webkit-playsinline>
      <source src="https://pathway.training/wp-content/uploads/2026/03/This_game_uses_isometric_pixel_art___a_top_down__angled_view_that_creates_a_pseudo_3D_office_world_w.mp4" type="video/mp4">
    </video>
  </div>
  <script>
    var vid = document.getElementById('vid');
    vid.muted = true;
    vid.play().catch(function() {
      document.addEventListener('click', function() {
        vid.play();
      }, { once: true });
    });
  </script>
</body>
</html>
